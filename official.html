<style>

.ai-summon {

}
.ai-summon::before {
  content: "";

  inset: -7px;
  border-radius: inherit;
  border: 1px solid rgba(22,183,123,0.18);
  animation: summonPulse 2.4s ease-out infinite;
  pointer-events: none;
}
@keyframes summonPulse {

  70%,100% { opacity: 0; transform: scale(1.12); }
}
.hero {

}

}
.hero-actions {

}
.hero-points {

.point {

  box-shadow: 0 28px 70px rgba(20, 54, 88, 0.22);
}
.screen {

}
.ai-card img {

.ai-card strong {

.ai-card p {

}
.bubble.user {

}
.bubble.ai {

  border: 1px solid rgba(15,40,70,0.09);

}
.section {
  width: min(1120px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 70px 0;
}
.section h2 {
  margin: 0;
  font-size: clamp(28px, 4vw, 44px);

}
.section-lead {

}
.cards {
  margin-top: 28px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 22px;
  min-height: 190px;
}
.card-icon {
  width: 44px;
  height: 44px;
  display: grid;

}
.card h3 {

}
.card p {

  margin: 10px 0 0;
  font-size: 14px;
}
.band {

}
.band .section-lead,

.band .card {

}
.band .card-icon { background: rgba(255,255,255,0.1); }
.video-strip {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 18px;
  align-items: center;
  margin-top: 26px;
  padding: 22px;

  border-radius: 22px;
  background: #fff;
}
.video-strip strong {
  display: block;
  font-size: 22px;

}
.video-strip p {
  color: var(--muted);
  line-height: 1.75;
  margin: 8px 0 0;
}
.cta {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 28px;
  align-items: center;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 28px;
}
.cta h2 { margin-bottom: 12px; }
.cta p {
  color: var(--muted);

}
.qr {
  text-align: center;
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px;
  background: #f8fbfa;
}
.qr img {
  width: 190px;
  height: 190px;
  object-fit: contain;
  display: block;
  margin: 0 auto 10px;
}
footer {
  border-top: 1px solid var(--line);

}
.footer-inner {

}

}
.identity-logo {

}
.identity-home h1 {
  margin-top: 24px;
  max-width: 760px;
}
.identity-tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 28px;
}
.identity-tab {
  min-height: 44px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 999px;
  padding: 0 18px;
  font: inherit;
  font-size: 15px;
  font-weight: 950;
  cursor: pointer;
}
.identity-tab.active {
  border-color: transparent;
  color: #03150e;
  background: linear-gradient(135deg, #2bd18e, #41c5ef);
  box-shadow: 0 12px 28px rgba(22,183,123,0.18);
}
.identity-panel {
  width: min(760px, 100%);
  margin-top: 24px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background: rgba(255,255,255,0.82);
  padding: 28px;
  text-align: left;
  box-shadow: 0 18px 50px rgba(16,32,51,0.08);
}
.identity-panel h2 {
  margin: 0;
  font-size: clamp(24px, 4vw, 36px);
  line-height: 1.22;
}
.identity-panel p {
  margin: 14px 0 0;
  color: var(--muted);
  font-size: 17px;
  line-height: 1.82;
}
.identity-list {
  display: grid;
  gap: 10px;
  margin: 20px 0 0;
  padding: 0;
  list-style: none;
}
.identity-list li {
  border: 1px solid rgba(15,40,70,0.09);
  border-radius: 14px;
  background: #f8fbfa;
  padding: 13px 14px;
  color: #25394e;
  line-height: 1.65;
}
.identity-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 24px;
}
@media (max-width: 860px) {
  .nav-inner { min-height: 62px; }
  .nav-link { display: none; }
  .nav-actions .btn:not(.primary) { display: none; }
  .hero { grid-template-columns: 1fr; min-height: auto; padding-top: 34px; }
  .phone-wrap { order: -1; }
  .phone { max-width: 320px; }
  .hero-points, .cards, .cta, .video-strip { grid-template-columns: 1fr; }
  .section { padding: 48px 0; }
  .qr { width: min(260px, 100%); }
  .ai-summon { right: 14px; bottom: 14px; padding-right: 10px; }
  .ai-summon span { display: none; }
  .identity-home { padding-top: 32px; justify-content: flex-start; }
  .identity-logo { width: 74px; height: 74px; border-radius: 21px; }
  .identity-panel { padding: 22px; }
  .identity-actions .btn { width: 100%; }
}
</style>
</head>
<body>
<main>
  <section class="identity-home" aria-label="华伴 AI+ 首页">
    <img class="identity-logo" src="assets/brand/huaban-logo-v1.png" alt="华伴">
    <h1>我能用华伴 AI 做什么？</h1>
    <div class="identity-tabs" role="tablist" aria-label="选择身份">
      <button class="identity-tab active" type="button" data-role="student">年轻人 / 留学生</button>
      <button class="identity-tab" type="button" data-role="family">爸爸妈妈</button>
      <button class="identity-tab" type="button" data-role="supplier">事业 / 小生意</button>
      <button class="identity-tab" type="button" data-role="creator">创意工作者</button>
    </div>
    <article class="identity-panel" aria-live="polite">
      <h2 id="identityTitle"></h2>
      <p id="identityLead"></p>
      <ul class="identity-list" id="identityList"></ul>
      <div class="identity-actions">
        <a class="btn primary" id="identityAction" href="/ai?ref=student_free">打开华伴 AI+</a>
        <a class="btn" href="app-download.html?ref=identity_home">下载 / 添加到屏幕</a>
      </div>
    </article>
  </section>
</main>

<footer>
  <div class="footer-inner">
    <span>华伴 AI+ · 一个有脑、有手的 AI 工具</span>
    <span>huabanapp.com</span>
  </div>
</footer>
<script>
const identityCopy = {
  student: {
    title: '不想被红点、广告和推荐流拖着走？',
    lead: '华伴 AI+，你主动，它才出现。一个安静、有用、听你指挥的 AI 工具。',
    href: '/ai?ref=student_free',
    items: [
      '学习、生活、行程、情绪和创意，都可以先跟华伴聊。',
      '不铺开复杂页面，不把你拽进碎片信息里。',
      '想静静做自己想做的事，华伴帮你整理下一步。'
    ]
  },
  family: {
    title: '全家用 AI，就用华伴 AI+。',
    lead: '爸爸妈妈宝宝都能用。它会先问你是谁，再推荐适合你的 AI 角色。',
    href: '/ai?ref=family_ai',
    items: [
      '爸爸妈妈可以用它安排家庭、生活、提醒和本地事务。',
      '宝宝和学生可以用它学习 AI、找灵感、快乐成长。',
      '一家人的悄悄话，私密，不被一排排红点淹没。'
    ]
  },
  supplier: {
    title: '让更多需求找到你。',
    lead: '华伴能当你的事业助手：帮你把能力、产品和服务整理清楚，打磨介绍，生成推广内容，记录线索，让事业成型，并推向更大的市场。',
    href: '/ai?ref=supplier_income',
    items: [
      '把你能提供的服务、商品、城市、时间、价格和联系方式整理清楚。',
      '帮你生成名片、推广文案、海报话术、客户回复和业务表格。',
      '有人需要时，华伴帮你被看见；有线索时，帮你提醒、跟进、整理下一步。'
    ]
  },
  creator: {
    title: '你负责创意，华伴陪你完成。',
    lead: '做图片、视频、产品、文案、个人网站和推广内容，都可以让华伴当创意总监。',
    href: '/ai?ref=creative_director',
    items: [
      '把一个想法整理成脚本、海报、视频文案或产品说明。',
      '帮你把生活、生意和表达变成可以传播的内容。',
      '灵感来了就说，华伴帮你把它落到下一步。'
    ]
  }
};

function renderIdentity(role) {
  const copy = identityCopy[role] || identityCopy.student;
  document.getElementById('identityTitle').textContent = copy.title;
  document.getElementById('identityLead').textContent = copy.lead;
  document.getElementById('identityList').innerHTML = copy.items.map(item => `<li>${item}</li>`).join('');
  document.getElementById('identityAction').href = copy.href;
  document.querySelectorAll('.identity-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.role === role);
  });
}

document.querySelectorAll('.identity-tab').forEach(tab => {
  tab.addEventListener('click', () => renderIdentity(tab.dataset.role));
});

const refRole = new URLSearchParams(location.search).get('ref');
const roleByRef = {
  student_free: 'student',
  family_ai: 'family',
  supplier_income: 'supplier',
  creative_director: 'creator'
};
renderIdentity(roleByRef[refRole] || 'student');
</script>
