<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>旅游广场 · 澳洲出行AI管家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f7f4;--surface:#ffffff;--border:#d0e8dc;
  --text:#1a3a2a;--text2:#5a8a6a;--accent:#27ae60;
  --gold:#c8a020;--red:#ff3b30;--blue:#0096c7;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;}

/* 顶部 */
.header{
  background:linear-gradient(135deg,#0d2818,#1a4a2e);
  padding:16px 16px 0;
  position:sticky;top:0;z-index:100;
}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.back-btn{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);border-radius:10px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit;}
.header-title{flex:1;text-align:center;font-size:17px;font-weight:900;color:white;}
.post-btn{background:var(--accent);border:none;color:white;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

/* 标签切换 */
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.1);}
.tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab.active{color:white;border-bottom-color:var(--accent);}

/* 筛选栏 */
.filter-bar{
  background:white;padding:10px 14px;
  display:flex;gap:8px;align-items:center;
  border-bottom:1px solid var(--border);
}
.filter-select{
  flex:1;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;padding:8px 12px;font-size:13px;
  color:var(--text);font-family:inherit;outline:none;
}

/* 帖子列表 */
.post-list{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:80px;}

/* 帖子卡片 */
.post-card{
  background:white;border-radius:18px;
  padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);
  border:1.5px solid var(--border);
}
.post-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.post-type-badge{
  font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;
}
.badge-charter{background:#fff8e8;color:#c8a020;}
.badge-group{background:#e8f8ee;color:#27ae60;}
.post-date{font-size:12px;color:var(--text2);}
.post-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:6px;}
.post-route{
  display:flex;align-items:center;gap:6px;
  font-size:13px;color:var(--text2);margin-bottom:10px;
}
.post-route-arrow{color:var(--accent);}
.post-meta{display:flex;gap:12px;margin-bottom:12px;}
.post-meta-item{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;}
.post-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;background:var(--bg);border-radius:10px;padding:10px 12px;}
.post-footer{display:flex;justify-content:space-between;align-items:center;}
.post-author{font-size:12px;color:var(--text2);}
.seats-bar{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--text2);
}
.seat-dot{width:10px;height:10px;border-radius:50%;}
.seat-filled{background:var(--accent);}
.seat-empty{background:var(--border);}
.contact-btn{
  background:var(--accent);color:white;border:none;
  border-radius:10px;padding:8px 16px;font-size:13px;
  font-weight:700;cursor:pointer;font-family:inherit;
}
.contact-btn.full{background:#ccc;}
.status-full{
  font-size:11px;font-weight:800;color:var(--red);
  background:#fff0f0;padding:3px 8px;border-radius:6px;
}

/* 发帖弹窗 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{
  background:white;border-radius:28px 28px 0 0;
  padding:24px 20px 40px;width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;
}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:17px;font-weight:900;color:var(--text);margin-bottom:18px;}
.form-field{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:700;}
.form-input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-select{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.type-btns{display:flex;gap:8px;}
.type-btn{flex:1;padding:10px;background:var(--bg);border:2px solid var(--border);border-radius:10px;text-align:center;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;}
.type-btn.selected{border-color:var(--accent);color:var(--accent);background:#f0fff5;}
.submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),#1e8449);color:white;border:none;border-radius:14px;font-size:16px;font-weight:900;font-family:inherit;cursor:pointer;margin-top:8px;}

/* 空状态 */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:14px;}
</style>
</head>
<body>

<!-- 顶部 -->
<div class="header">
  <div class="header-top">
    <button class="back-btn" onclick="window.location.href='welcome.html'">← 返回</button>
    <div class="header-title">🌿 旅游广场</div>
    <button class="post-btn" onclick="openPostModal()">+ 发布</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('all',this)">全部</div>
    <div class="tab" onclick="switchTab('charter',this)">🚌 包车</div>
    <div class="tab" onclick="switchTab('group',this)">👥 组团拼车</div>
  </div>
</div>

<!-- 筛选栏 -->
<div class="filter-bar">
  <select class="form-select" id="city-filter" onchange="loadPosts()" style="flex:1;">
    <option value="">全部城市</option>
    <option value="墨尔本">🏙️ 墨尔本</option>
    <option value="悉尼">🌆 悉尼</option>
    <option value="布里斯班">🌇 布里斯班</option>
    <option value="珀斯">🌅 珀斯</option>
    <option value="阿德莱德">🏛️ 阿德莱德</option>
    <option value="堪培拉">🏛️ 堪培拉</option>
    <option value="塔斯马尼亚">🏔️ 塔斯马尼亚</option>
  </select>
</div>

<!-- 帖子列表 -->
<div class="post-list" id="post-list">
  <div class="empty-state">
    <div class="empty-icon">🌿</div>
    <div class="empty-text">加载中...</div>
  </div>
</div>

<!-- 发帖弹窗 -->
<div class="modal-overlay" id="post-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📝 发布旅游需求</div>

    <div class="form-field">
      <label class="form-label">类型</label>
      <div class="type-btns">
        <div class="type-btn selected" onclick="selectType('charter',this)">🚌 包车出游</div>
        <div class="type-btn" onclick="selectType('group',this)">👥 组团拼车</div>
      </div>
    </div>

    <div class="form-field">
      <label class="form-label">城市</label>
      <select class="form-select" id="f-city">
        <option value="墨尔本">🏙️ 墨尔本</option>
        <option value="悉尼">🌆 悉尼</option>
        <option value="布里斯班">🌇 布里斯班</option>
        <option value="珀斯">🌅 珀斯</option>
        <option value="阿德莱德">🏛️ 阿德莱德</option>
        <option value="堪培拉">🏛️ 堪培拉</option>
        <option value="塔斯马尼亚">🏔️ 塔斯马尼亚</option>
      </select>
    </div>

    <div class="form-field">
      <label class="form-label">目的地</label>
      <input class="form-input" id="f-destination" placeholder="如：大洋路、菲利普岛、蓝山">
    </div>

    <div class="form-field">
      <label class="form-label">出发地（选填）</label>
      <input class="form-input" id="f-departure" placeholder="如：墨尔本CBD、南区">
    </div>

    <div class="form-field">
      <label class="form-label">出行日期</label>
      <input class="form-input" id="f-date" type="date">
    </div>

    <div class="form-field" id="f-seats-group" style="display:none;">
      <label class="form-label">总座位数</label>
      <select class="form-select" id="f-seats">
        <option value="4">4人</option>
        <option value="6">6人</option>
        <option value="8">8人</option>
        <option value="10">10人</option>
        <option value="13">13人</option>
      </select>
    </div>

    <div class="form-field" id="f-budget-group">
      <label class="form-label" id="f-price-label">预算（包车总价）</label>
      <input class="form-input" id="f-budget" type="number" placeholder="如：500">
    </div>

    <div class="form-field">
      <label class="form-label">行程说明</label>
      <textarea class="form-input" id="f-desc" rows="3" placeholder="简单描述行程、人数、特殊需求..."></textarea>
    </div>

    <div class="form-field">
      <label class="form-label">你的称呼</label>
      <input class="form-input" id="f-name" placeholder="姓名或昵称">
    </div>

    <div class="form-field">
      <label class="form-label">联系微信</label>
      <input class="form-input" id="f-wechat" placeholder="微信号">
    </div>

    <button class="submit-btn" onclick="submitPost()">🌿 发布</button>
    <button onclick="closePostModal()" style="width:100%;padding:12px;background:none;border:none;font-size:13px;color:#bbb;cursor:pointer;margin-top:8px;">取消</button>
  </div>
</div>

<script>
const SUPA_URL='https://gxocvpmgfjvmmkkbswgo.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4b2N2cG1nZmp2bW1ra2Jzd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDc4NzAsImV4cCI6MjA5NTgyMzg3MH0.ExUNuOP8YyHQmItY6cdl1Euj7nOXqQq-rQT5-7aNerE';
const TENANT_ID='00000000-0000-0000-0000-000000000001';

let currentTab = 'all';
let currentType = 'charter';

async function supaFetch(path, opts={}) {
  const res = await fetch(SUPA_URL+'/rest/v1/'+path, {
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(opts.headers||{})
    },
    ...opts
  });
  if (!res.ok) { const e=await res.json(); throw new Error(e.message||'error'); }
  return res.json();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadPosts();
}

async function loadPosts() {
  const list = document.getElementById('post-list');
  list.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">加载中...</div></div>';

  try {
    const city = document.getElementById('city-filter').value;
    let query = `tour_plaza?status=eq.open&order=created_at.desc&limit=30`;
    if (currentTab !== 'all') query += `&post_type=eq.${currentTab}`;
    if (city) query += `&city=eq.${encodeURIComponent(city)}`;

    const posts = await supaFetch(query);

    if (!posts.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">🌿</div><div class="empty-text">暂无帖子，来发第一条吧！</div></div>';
      return;
    }
    list.innerHTML = posts.map(renderPost).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">加载失败，请刷新重试</div></div>';
  }
}

function renderPost(p) {
  const isCharter = p.post_type === 'charter';
  const isFull = p.status === 'full' || p.filled_seats >= p.total_seats;
  const date = new Date(p.travel_date).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
  const daysLeft = Math.ceil((new Date(p.travel_date)-new Date())/86400000);

  // 座位进度
  let seatsHtml = '';
  if (!isCharter) {
    const dots = Array.from({length:p.total_seats}, (_,i) =>
      `<div class="seat-dot ${i<p.filled_seats?'seat-filled':'seat-empty'}"></div>`
    ).join('');
    seatsHtml = `<div class="seats-bar">${dots}<span>${p.filled_seats}/${p.total_seats}人</span></div>`;
  }

  return `
  <div class="post-card">
    <div class="post-header">
      <span class="post-type-badge ${isCharter?'badge-charter':'badge-group'}">${isCharter?'🚌 包车':'👥 组团'}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        ${isFull?'<span class="status-full">已满</span>':''}
        <span class="post-date">${date} ${daysLeft>0?'('+daysLeft+'天后)':'(今天)'}</span>
      </div>
    </div>
    <div class="post-title">${p.destination}</div>
    <div class="post-route">
      <span>${p.city}</span>
      ${p.departure?`<span>${p.departure}</span><span class="post-route-arrow">→</span>`:''}
      <span class="post-route-arrow">→</span>
      <span>${p.destination}</span>
    </div>
    ${p.description?`<div class="post-desc">${p.description}</div>`:''}
    <div class="post-meta">
      ${isCharter&&p.budget?`<div class="post-meta-item">💰 预算 $${p.budget}</div>`:''}
      ${!isCharter&&p.price_per_person?`<div class="post-meta-item">💰 人均 $${p.price_per_person}</div>`:''}
      <div class="post-meta-item">📍 ${p.city}</div>
    </div>
    <div class="post-footer">
      <div>
        ${seatsHtml}
        <div class="post-author" style="margin-top:4px;">👤 ${p.author_name}</div>
      </div>
      <button class="contact-btn ${isFull?'full':''}" onclick="${isFull?'alert(\'已满员\')':
        `copyWechat('${p.contact_wechat}','${p.id}')`}">
        ${isFull?'已满员':'💬 联系'}
      </button>
    </div>
  </div>`;
}

async function copyWechat(wechat, postId) {
  if (navigator.clipboard) {
    await navigator.clipboard.writeText(wechat);
  }
  alert('微信号已复制：' + wechat + '\n请打开微信→添加朋友→粘贴搜索');
  // 更新filled_seats
  try {
    const posts = await supaFetch(`tour_plaza?id=eq.${postId}`);
    if (posts.length && posts[0].post_type === 'group') {
      const newFilled = Math.min(posts[0].filled_seats + 1, posts[0].total_seats);
      const newStatus = newFilled >= posts[0].total_seats ? 'full' : 'open';
      await supaFetch(`tour_plaza?id=eq.${postId}`, {
        method: 'PATCH',
        body: JSON.stringify({ filled_seats: newFilled, status: newStatus })
      });
      loadPosts();
    }
  } catch(e) {}
}

// 发帖
function openPostModal() {
  document.getElementById('f-date').min = new Date().toISOString().split('T')[0];
  document.getElementById('post-modal').classList.add('show');
}
function closePostModal() {
  document.getElementById('post-modal').classList.remove('show');
}

function selectType(type, el) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  // 显示/隐藏相关字段
  document.getElementById('f-seats-group').style.display = type==='group'?'block':'none';
  document.getElementById('f-price-label').textContent = type==='charter'?'预算（包车总价）':'人均费用';
  document.getElementById('f-budget').placeholder = type==='charter'?'如：500':'如：80';
}

async function submitPost() {
  const name = document.getElementById('f-name').value.trim();
  const wechat = document.getElementById('f-wechat').value.trim();
  const dest = document.getElementById('f-destination').value.trim();
  const date = document.getElementById('f-date').value;
  const city = document.getElementById('f-city').value;

  if (!name||!wechat||!dest||!date) { alert('请填写必填项：目的地、日期、称呼、微信'); return; }

  const data = {
    tenant_id: TENANT_ID,
    post_type: currentType,
    title: dest,
    city: city,
    travel_date: date,
    destination: dest,
    departure: document.getElementById('f-departure').value.trim()||null,
    total_seats: parseInt(document.getElementById('f-seats').value)||4,
    filled_seats: 1,
    description: document.getElementById('f-desc').value.trim()||null,
    author_name: name,
    contact_wechat: wechat,
    status: 'open'
  };

  const budget = document.getElementById('f-budget').value;
  if (budget) {
    if (currentType==='charter') data.budget = parseFloat(budget);
    else data.price_per_person = parseFloat(budget);
  }

  try {
    await supaFetch('tour_plaza', { method:'POST', body:JSON.stringify(data) });
    closePostModal();
    loadPosts();
    alert('✅ 发布成功！');
  } catch(e) {
    alert('发布失败：'+e.message);
  }
}

// 启动
loadPosts();
</script>
</body>
</html>
