<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>旅游广场 · 澳洲出行AI管家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f7f4;--surface:#fff;--border:#d0e8dc;
  --text:#1a3a2a;--text2:#5a8a6a;--accent:#27ae60;
  --gold:#c8a020;--red:#ff3b30;--blue:#0096c7;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;}

.header{background:linear-gradient(135deg,#0d2818,#1a4a2e);padding:14px 16px 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.back-btn{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);border-radius:10px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit;}
.header-title{flex:1;text-align:center;font-size:17px;font-weight:900;color:white;}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.1);}
.tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:white;border-bottom-color:var(--accent);}

.publish-bar{background:white;padding:12px 14px;display:flex;gap:8px;border-bottom:1px solid var(--border);}
.pub-btn{flex:1;padding:10px;border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
.pub-btn-driver{background:linear-gradient(135deg,#1a4a2e,#27ae60);color:white;}
.pub-btn-tourist{background:linear-gradient(135deg,#0d2040,#0096c7);color:white;}

.filter-bar{background:white;padding:10px 14px;border-bottom:1px solid var(--border);}
.form-select{width:100%;padding:8px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}

.post-list{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:30px;}

/* 帖子卡片 */
.post-card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:1.5px solid var(--border);}
.post-body{padding:16px;}
.post-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;}
.badge-charter{background:#fff8e8;color:#c8a020;}
.badge-group{background:#e8f8ee;color:#27ae60;}
.badge-driver{background:#e8f0ff;color:#5856d6;}
.post-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px;}
.post-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.meta-tag{font-size:12px;color:var(--text2);background:var(--bg);padding:4px 10px;border-radius:8px;}
.post-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;background:var(--bg);border-radius:10px;padding:10px 12px;}
.post-date{font-size:12px;color:var(--text2);}

/* 进度条 */
.progress-section{padding:0 16px 14px;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px;}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px;}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.5s;}
.participants-row{display:flex;gap:6px;flex-wrap:wrap;}
.participant-chip{background:var(--bg);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text2);border:1px solid var(--border);}
.participant-chip.paid{background:#e8f8ee;color:var(--accent);border-color:var(--accent);}

/* 操作栏 */
.post-actions{display:flex;gap:0;border-top:1px solid var(--border);}
.action-btn{flex:1;padding:12px;background:none;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text2);}
.action-btn.join{color:white;background:var(--accent);}
.action-btn.join-charter{color:white;background:var(--gold);}
.action-btn.full{color:#bbb;cursor:default;}
.action-btn + .action-btn{border-left:1px solid var(--border);}

/* 跟帖区 */
.comments-section{background:var(--bg);padding:12px 16px;border-top:1px solid var(--border);}
.comment-item{margin-bottom:10px;}
.comment-author{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.comment-text{font-size:13px;color:var(--text2);line-height:1.5;}
.comment-time{font-size:10px;color:#bbb;margin-top:2px;}
.comment-input-row{display:flex;gap:8px;margin-top:10px;}
.comment-input{flex:1;background:white;border:1.5px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;color:var(--text);font-family:inherit;outline:none;}
.comment-submit{background:var(--accent);border:none;border-radius:50%;width:34px;height:34px;color:white;font-size:16px;cursor:pointer;flex-shrink:0;}

/* 弹窗 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:white;border-radius:28px 28px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:17px;font-weight:900;color:var(--text);margin-bottom:6px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:18px;}
.form-field{margin-bottom:13px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;font-weight:700;}
.form-input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-row{display:flex;gap:8px;}
.form-row .form-field{flex:1;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:10px;padding:10px 14px;}
.toggle-label{font-size:13px;color:var(--text);font-weight:600;}
.toggle{width:44px;height:24px;background:#ccc;border-radius:12px;cursor:pointer;position:relative;transition:background 0.2s;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:left 0.2s;}
.toggle.on::after{left:23px;}
.submit-btn{width:100%;padding:15px;color:white;border:none;border-radius:14px;font-size:16px;font-weight:900;font-family:inherit;cursor:pointer;margin-top:8px;}
.submit-btn.green{background:linear-gradient(135deg,#27ae60,#1e8449);}
.submit-btn.blue{background:linear-gradient(135deg,#0096c7,#0077a0);}
.cancel-btn{width:100%;padding:12px;background:none;border:none;font-size:13px;color:#bbb;cursor:pointer;margin-top:6px;}
.section-divider{font-size:11px;font-weight:800;color:var(--text2);letter-spacing:1px;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}

/* 加入弹窗 */
.join-modal .modal-sheet{background:white;}
.join-info{background:var(--bg);border-radius:14px;padding:14px;margin-bottom:16px;}
.join-info-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:8px;}
.join-info-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:4px;}
.join-info-row span:last-child{font-weight:700;color:var(--text);}
.price-highlight{font-size:28px;font-weight:900;color:var(--accent);text-align:center;margin:16px 0;}

.empty-state{text-align:center;padding:40px 20px;color:var(--text2);}
.empty-icon{font-size:48px;margin-bottom:12px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <button class="back-btn" onclick="window.location.href='index.html'">← 返回</button>
    <div class="header-title">🌿 旅游广场</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('all',this)">全部</div>
    <div class="tab" onclick="switchTab('charter',this)">
      🚌 包车
      <span id="charter-count-dot" style="display:none;background:#ff3b30;color:white;border-radius:10px;font-size:10px;font-weight:800;padding:1px 6px;margin-left:4px;"></span>
    </div>
    <div class="tab" onclick="switchTab('group',this)">👥 组团</div>
  </div>
</div>

<div class="publish-bar">
  <button class="pub-btn pub-btn-driver" onclick="openDriverModal()">🧑‍✈️ 我要发布包车</button>
  <button class="pub-btn pub-btn-tourist" onclick="openTouristModal()">👥 我要组团</button>
</div>

<div class="filter-bar">
  <select class="form-select" id="city-filter" onchange="loadPosts()">
    <option value="">全部城市</option>
    <option value="墨尔本">🏙️ 墨尔本</option>
    <option value="悉尼">🌆 悉尼</option>
    <option value="布里斯班">🌇 布里斯班</option>
    <option value="珀斯">🌅 珀斯</option>
    <option value="阿德莱德">🏛️ 阿德莱德</option>
    <option value="堪培拉">🏛️ 堪培拉</option>
    <option value="塔斯马尼亚">🏔️ 塔斯马尼亚</option>
  </select>
</div>

<div class="post-list" id="post-list">
  <div class="empty-state"><div class="empty-icon">⏳</div><div>加载中...</div></div>
</div>

<!-- ══ 司机发布包车弹窗 ══ -->
<div class="modal-overlay" id="driver-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🚌 发布包车服务</div>
    <div class="modal-sub">填写车辆信息，游客来预约包车</div>
    <div class="section-divider">车辆信息</div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">车辆品牌</label>
        <input class="form-input" id="d-brand" placeholder="如：Toyota">
      </div>
      <div class="form-field">
        <label class="form-label">车型</label>
        <input class="form-input" id="d-model" placeholder="如：Tarago">
      </div>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">座位数</label>
        <select class="form-input" id="d-seats">
          <option value="4">4座</option>
          <option value="6">6座</option>
          <option value="8" selected>8座</option>
          <option value="13">13座</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">城市</label>
        <select class="form-input" id="d-city">
          <option value="墨尔本">墨尔本</option>
          <option value="悉尼">悉尼</option>
          <option value="布里斯班">布里斯班</option>
          <option value="珀斯">珀斯</option>
          <option value="阿德莱德">阿德莱德</option>
          <option value="堪培拉">堪培拉</option>
          <option value="塔斯马尼亚">塔斯马尼亚</option>
        </select>
      </div>
    </div>
    <div class="section-divider">服务与报价</div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">每小时报价（含油）$</label>
        <input class="form-input" id="d-hourly" type="number" placeholder="如：80">
      </div>
      <div class="form-field">
        <label class="form-label">可出车日期</label>
        <input class="form-input" id="d-avail-date" type="date">
      </div>
    </div>
    <div class="form-field">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">提供中文讲解服务</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px;">额外收费</div>
        </div>
        <div class="toggle" id="guide-toggle" onclick="toggleGuide(this)"></div>
      </div>
    </div>
    <div class="form-field" id="guide-rate-field" style="display:none;">
      <label class="form-label">讲解额外报价（每小时）$</label>
      <input class="form-input" id="d-guide-rate" type="number" placeholder="如：30">
    </div>
    <div class="section-divider">行程擅长</div>
    <div class="form-field">
      <textarea class="form-input" id="d-desc" rows="3" placeholder="擅长路线：大洋路、菲利普岛、雅拉河谷酒庄..."></textarea>
    </div>
    <div class="section-divider">你的信息</div>
    <div class="form-field">
      <label class="form-label">称呼（显示在帖子）</label>
      <input class="form-input" id="d-name" placeholder="姓名或昵称">
    </div>
    <button class="submit-btn green" onclick="submitCharterRequest()">🚌 发布包车需求</button>
    <button class="cancel-btn" onclick="closeDriverModal()">取消</button>
  </div>
</div>

<!-- ══ 游客组团弹窗 ══ -->
<div class="modal-overlay" id="tourist-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">👥 发布组团需求</div>
    <div class="modal-sub">找同伴一起出行，凑够人数平台派车</div>
    <div class="section-divider">行程信息</div>
    <div class="form-field">
      <label class="form-label">目的地</label>
      <input class="form-input" id="t-destination" placeholder="如：大洋路、菲利普岛、雪山">
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">出发城市</label>
        <select class="form-input" id="t-city">
          <option value="墨尔本">墨尔本</option>
          <option value="悉尼">悉尼</option>
          <option value="布里斯班">布里斯班</option>
          <option value="珀斯">珀斯</option>
          <option value="阿德莱德">阿德莱德</option>
          <option value="堪培拉">堪培拉</option>
          <option value="塔斯马尼亚">塔斯马尼亚</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">出行日期</label>
        <input class="form-input" id="t-date" type="date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">已有人数（含自己）</label>
        <select class="form-input" id="t-filled">
          <option value="1">1人</option>
          <option value="2">2人</option>
          <option value="3">3人</option>
          <option value="4">4人</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">希望总人数</label>
        <select class="form-input" id="t-total">
          <option value="4">4人</option>
          <option value="6">6人</option>
          <option value="8">8人</option>
          <option value="10">10人</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label class="form-label">人均预算 $（选填）</label>
      <input class="form-input" id="t-budget" type="number" placeholder="如：80">
    </div>
    <div class="section-divider">行程说明</div>
    <div class="form-field">
      <textarea class="form-input" id="t-desc" rows="3" placeholder="行程计划、偏好、特殊需求..."></textarea>
    </div>
    <div class="section-divider">你的信息</div>
    <div class="form-field">
      <label class="form-label">称呼（显示在帖子）</label>
      <input class="form-input" id="t-name" placeholder="姓名或昵称">
    </div>
    <button class="submit-btn blue" onclick="submitTouristPost()">👥 发布组团需求</button>
    <button class="cancel-btn" onclick="closeTouristModal()">取消</button>
  </div>
</div>

<!-- ══ 加入/预约弹窗 ══ -->
<div class="modal-overlay join-modal" id="join-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="join-modal-title">加入组团</div>
    <div class="modal-sub" id="join-modal-sub">付款后锁定名额，拼团失败自动退款</div>
    <div class="join-info" id="join-info"></div>
    <div class="price-highlight" id="join-price"></div>
    <div class="form-field">
      <label class="form-label">你的称呼</label>
      <input class="form-input" id="j-name" placeholder="姓名或昵称">
    </div>
    <div class="form-field">
      <label class="form-label" id="j-seats-label">加入人数</label>
      <select class="form-input" id="j-seats" onchange="updateJoinPrice()">
        <option value="1">1人</option>
        <option value="2">2人</option>
        <option value="3">3人</option>
      </select>
    </div>
    <div style="background:#fff8e8;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#c8a020;line-height:1.6;">
      ⚠️ 付款后名额锁定。若出行前24小时拼团未满员，平台自动全额退款。
    </div>
    <button class="submit-btn green" id="join-submit-btn" onclick="submitJoin()">💳 立即付款锁定名额</button>
    <button class="cancel-btn" onclick="closeJoinModal()">取消</button>
  </div>
</div>

<script>
const SUPA_URL='https://gxocvpmgfjvmmkkbswgo.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4b2N2cG1nZmp2bW1ra2Jzd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDc4NzAsImV4cCI6MjA5NTgyMzg3MH0.ExUNuOP8YyHQmItY6cdl1Euj7nOXqQq-rQT5-7aNerE';
const TENANT_ID='00000000-0000-0000-0000-000000000001';
let currentTab='all';
let currentJoinPost=null;

async function supaFetch(path,opts={}){
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  if(!res.ok){const e=await res.json();throw new Error(e.message||'error');}
  return res.json();
}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadAll();
}

async function loadPosts(){
  const list=document.getElementById('post-list');
  list.innerHTML='<div class="empty-state"><div class="empty-icon">⏳</div><div>加载中...</div></div>';
  try{
    const city=document.getElementById('city-filter').value;
    let q=`tour_plaza?status=eq.open&order=created_at.desc&limit=20`;
    if(currentTab!=='all') q+=`&post_type=eq.${currentTab}`;
    if(city) q+=`&city=eq.${encodeURIComponent(city)}`;
    const posts=await supaFetch(q);
    if(!posts.length){
      list.innerHTML='<div class="empty-state"><div class="empty-icon">🌿</div><div>暂无帖子，来发第一条！</div></div>';
      return;
    }
    // 加载参与者和留言
    const postIds=posts.map(p=>p.id);
    const [participants,comments]=await Promise.all([
      supaFetch(`tour_participants?post_id=in.(${postIds.join(',')})&order=joined_at.asc`),
      supaFetch(`tour_comments?post_id=in.(${postIds.join(',')})&order=created_at.asc&limit=100`)
    ]);
    list.innerHTML=posts.map(p=>{
      const pList=participants.filter(x=>x.post_id===p.id);
      const cList=comments.filter(x=>x.post_id===p.id);
      return renderPost(p,pList,cList);
    }).join('');
  }catch(e){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div>加载失败，请刷新</div></div>';
  }
}

function renderPost(p,participants,comments){
  const isCharter=p.post_type==='charter';
  const isDriver=!!p.driver_id;
  const paidCount=participants.filter(x=>x.payment_status==='paid').reduce((s,x)=>s+x.seats,0);
  const totalFilled=p.filled_seats+paidCount;
  const isFull=totalFilled>=p.total_seats&&!isCharter;
  const date=new Date(p.travel_date).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
  const daysLeft=Math.ceil((new Date(p.travel_date)-new Date())/86400000);

  // 进度条
  const pct=isCharter?100:Math.min(100,Math.round(totalFilled/p.total_seats*100));
  const participantChips=participants.filter(x=>x.payment_status==='paid')
    .map(x=>`<span class="participant-chip paid">✓ ${x.name} ${x.seats>1?x.seats+'人':''}</span>`).join('');

  // 留言
  const commentsHtml=comments.map(c=>`
    <div class="comment-item">
      <div class="comment-author">${c.author_name}</div>
      <div class="comment-text">${c.content}</div>
      <div class="comment-time">${timeAgo(c.created_at)}</div>
    </div>`).join('');

  const priceInfo=isCharter&&p.hourly_rate
    ?`<span class="meta-tag">💰 $${p.hourly_rate}/小时</span>`
    :p.price_per_person?`<span class="meta-tag">💰 人均 $${p.price_per_person}</span>`:'';
  const guideInfo=p.guide_service?`<span class="meta-tag">🎙️ 含讲解${p.guide_rate?'+$'+p.guide_rate+'/h':''}</span>`:'';
  const vehicleInfo=p.vehicle_brand?`<span class="meta-tag">🚗 ${p.vehicle_brand} ${p.vehicle_model||''} ${p.vehicle_seats||''}座</span>`:'';

  return `
  <div class="post-card">
    <div class="post-body">
      <div class="post-header">
        <div style="display:flex;gap:6px;">
          <span class="badge ${isCharter?'badge-charter':'badge-group'}">${isCharter?'🚌 包车':'👥 组团'}</span>
          ${isDriver?'<span class="badge badge-driver">司机</span>':''}
        </div>
        <span class="post-date">${date}${daysLeft>0?' · '+daysLeft+'天后':' · 今天'}</span>
      </div>
      <div class="post-title">${p.destination}</div>
      <div class="post-meta">
        <span class="meta-tag">📍 ${p.city}</span>
        ${vehicleInfo}${priceInfo}${guideInfo}
      </div>
      ${p.description?`<div class="post-desc">${p.description}</div>`:''}
      <div style="font-size:12px;color:var(--text2);">发布者：${p.author_name}</div>
    </div>

    ${!isCharter?`
    <div class="progress-section">
      <div class="progress-label">
        <span>拼团进度</span>
        <span>${totalFilled} / ${p.total_seats} 人</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="participants-row">${participantChips}</div>
    </div>`:''}

    <div class="post-actions">
      <button class="action-btn" onclick="toggleComments('${p.id}')">💬 留言 ${comments.length>0?'('+comments.length+')':''}</button>
      ${isFull
        ?'<button class="action-btn full">已满员</button>'
        :isCharter
        ?`<button class="action-btn join-charter" onclick="openJoinModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">📅 预约包车</button>`
        :`<button class="action-btn join" onclick="openJoinModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">✅ 加入拼团</button>`
      }
    </div>

    <!-- 留言区（默认隐藏） -->
    <div id="comments-${p.id}" style="display:none;">
      <div class="comments-section">
        ${commentsHtml||'<div style="font-size:12px;color:var(--text2);text-align:center;padding:8px 0;">暂无留言，来说一句吧</div>'}
        <div class="comment-input-row">
          <input class="comment-input" id="ci-${p.id}" placeholder="说点什么...">
          <button class="comment-submit" onclick="submitComment('${p.id}')">➤</button>
        </div>
        <div style="font-size:11px;color:#bbb;margin-top:6px;text-align:center;">留言后填写称呼即可，无需注册</div>
      </div>
    </div>
  </div>`;
}

function toggleComments(postId){
  const el=document.getElementById('comments-'+postId);
  el.style.display=el.style.display==='none'?'block':'none';
}

async function submitComment(postId){
  const input=document.getElementById('ci-'+postId);
  const text=input.value.trim();
  if(!text)return;
  const name=prompt('你的称呼？')||'匿名';
  try{
    await supaFetch('tour_comments',{method:'POST',body:JSON.stringify({
      post_id:postId,tenant_id:TENANT_ID,author_name:name,content:text
    })});
    input.value='';
    loadPosts();
  }catch(e){alert('发送失败');}
}

// ── 加入/预约弹窗 ──
function openJoinModal(post){
  currentJoinPost=post;
  const isCharter=post.post_type==='charter';
  document.getElementById('join-modal-title').textContent=isCharter?'📅 预约包车':'✅ 加入拼团';
  document.getElementById('join-modal-sub').textContent=isCharter
    ?'选择时长，完成付款后确认行程'
    :'付款后锁定名额，拼团失败自动退款';
  document.getElementById('j-seats-label').textContent=isCharter?'包车时长（小时）':'加入人数';

  const infoEl=document.getElementById('join-info');
  infoEl.innerHTML=`
    <div class="join-info-title">${post.destination}</div>
    <div class="join-info-row"><span>📅 日期</span><span>${new Date(post.travel_date).toLocaleDateString('zh-CN')}</span></div>
    <div class="join-info-row"><span>📍 城市</span><span>${post.city}</span></div>
    ${isCharter&&post.hourly_rate?`<div class="join-info-row"><span>💰 报价</span><span>$${post.hourly_rate}/小时</span></div>`:''}
    ${!isCharter&&post.price_per_person?`<div class="join-info-row"><span>💰 人均</span><span>$${post.price_per_person}</span></div>`:''}
    ${post.guide_service?`<div class="join-info-row"><span>🎙️ 讲解</span><span>+$${post.guide_rate||0}/小时</span></div>`:''}
  `;
  updateJoinPrice();
  document.getElementById('join-modal').classList.add('show');
}

function updateJoinPrice(){
  if(!currentJoinPost)return;
  const seats=parseInt(document.getElementById('j-seats').value)||1;
  const isCharter=currentJoinPost.post_type==='charter';
  let price=0;
  if(isCharter){
    price=(currentJoinPost.hourly_rate||0)*seats;
  } else {
    price=(currentJoinPost.price_per_person||0)*seats;
  }
  document.getElementById('join-price').textContent=price>0?'$'+price:'价格待定';
}

function closeJoinModal(){
  document.getElementById('join-modal').classList.remove('show');
  currentJoinPost=null;
}

async function submitJoin(){
  const name=document.getElementById('j-name').value.trim();
  if(!name){alert('请填写你的称呼');return;}
  const seats=parseInt(document.getElementById('j-seats').value)||1;
  const isCharter=currentJoinPost.post_type==='charter';
  let amount=0;
  if(isCharter) amount=(currentJoinPost.hourly_rate||0)*seats;
  else amount=(currentJoinPost.price_per_person||0)*seats;

  // 模拟付款（后续接Stripe/Square）
  const confirm=window.confirm(`确认付款 $${amount}？\n\n付款后名额锁定，拼团失败自动退款。`);
  if(!confirm)return;

  try{
    await supaFetch('tour_participants',{method:'POST',body:JSON.stringify({
      post_id:currentJoinPost.id,
      tenant_id:TENANT_ID,
      name:name,
      seats:seats,
      payment_status:'paid',
      payment_amount:amount
    })});
    // 更新filled_seats
    const newFilled=currentJoinPost.filled_seats+seats;
    const newStatus=!isCharter&&newFilled>=currentJoinPost.total_seats?'full':'open';
    await supaFetch(`tour_plaza?id=eq.${currentJoinPost.id}`,{
      method:'PATCH',
      body:JSON.stringify({filled_seats:newFilled,status:newStatus})
    });
    closeJoinModal();
    loadPosts();
    alert('✅ 名额已锁定！\n\n出行前平台会通知你行程详情。\n若拼团未满，自动全额退款。');
  }catch(e){alert('提交失败：'+e.message);}
}


// 多日期选择
let availDates = [];
function addAvailDate(dateStr) {
  if (!dateStr || availDates.includes(dateStr)) return;
  availDates.push(dateStr);
  availDates.sort();
  renderDateTags();
}
function removeAvailDate(dateStr) {
  availDates = availDates.filter(d => d !== dateStr);
  renderDateTags();
}
function renderDateTags() {
  const wrap = document.getElementById('date-picker-wrap');
  if (!wrap) return;
  wrap.innerHTML = availDates.map(d => {
    const display = new Date(d).toLocaleDateString('zh-CN', {month:'2-digit', day:'2-digit'});
    return `<div style="background:var(--accent);color:white;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;">
      ${display}
      <span onclick="removeAvailDate('${d}')" style="cursor:pointer;opacity:0.7;">×</span>
    </div>`;
  }).join('');
}

function timeAgo(dateStr){
  const diff=(new Date()-new Date(dateStr))/60000;
  if(diff<1)return '刚刚';
  if(diff<60)return Math.floor(diff)+'分钟前';
  if(diff<1440)return Math.floor(diff/60)+'小时前';
  return Math.floor(diff/1440)+'天前';
}

loadPosts();

// ── 包车详情和预约 ──
let currentCharter = null;
let selectedCharterDate = null;
let selectedCharterHours = 4;

async function openCharterDetail(postId) {
  try {
    const posts = await supaFetch(`tour_plaza?id=eq.${postId}`);
    if (!posts.length) return;
    currentCharter = posts[0];
    const p = currentCharter;
    const availDates = JSON.parse(p.available_dates||'[]');
    const bookedDates = JSON.parse(p.booked_dates||'[]');
    selectedCharterDate = null;

    document.getElementById('charter-detail-content').innerHTML = `
      <div style="font-size:17px;font-weight:900;color:var(--text);margin-bottom:4px;">${p.vehicle_brand||''} ${p.vehicle_model||''} ${p.vehicle_seats||''}座</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px;">📍 ${p.city} · 💰 $${p.hourly_rate}/小时（4小时起步）</div>
      ${p.description?`<div style="font-size:13px;color:var(--text2);background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:14px;">${p.description}</div>`:''}

      <div style="font-size:12px;font-weight:800;color:var(--text2);margin-bottom:8px;">选择日期</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;" id="date-selector">
        ${availDates.map(d=>{
          const isBooked=bookedDates.includes(d);
          const display=new Date(d).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
          return `<div onclick="${isBooked?'':`selectCharterDate('${d}',this)`}"
            style="padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:${isBooked?'not-allowed':'pointer'};
            background:${isBooked?'#f0f0f0':'var(--bg)'};color:${isBooked?'#ccc':'var(--text)'};
            border:2px solid ${isBooked?'#e0e0e0':'var(--border)'};">
            ${display}${isBooked?' (已预约)':''}
          </div>`;
        }).join('')}
      </div>

      <div style="font-size:12px;font-weight:800;color:var(--text2);margin-bottom:8px;">预计时长</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;" id="hours-selector">
        ${[4,6,8,10,12].map(h=>`
          <div onclick="selectCharterHours(${h},this)"
            style="flex:1;padding:8px 4px;border-radius:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;
            background:${h===4?'rgba(39,174,96,0.15)':'var(--bg)'};
            color:${h===4?'var(--accent)':'var(--text2)'};
            border:2px solid ${h===4?'var(--accent)':'var(--border)'};">
            ${h}h<br><span style="font-size:10px;">$${p.hourly_rate*h}</span>
          </div>`).join('')}
      </div>

      <div id="charter-summary" style="background:var(--bg);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--text2);">
        请选择日期
      </div>
    `;
    selectedCharterHours = 4;
    document.getElementById('charter-detail-modal').style.display = 'flex';
  } catch(e) { alert('加载失败'); }
}

function selectCharterDate(dateStr, el) {
  selectedCharterDate = dateStr;
  document.querySelectorAll('#date-selector > div').forEach(d=>{ d.style.borderColor='var(--border)'; d.style.background='var(--bg)'; d.style.color='var(--text)'; });
  el.style.borderColor='var(--accent)';el.style.background='rgba(39,174,96,0.12)';el.style.color='var(--accent)';
  updateCharterSummary();
}

function selectCharterHours(h, el) {
  selectedCharterHours = h;
  document.querySelectorAll('#hours-selector > div').forEach(d=>{ d.style.borderColor='var(--border)'; d.style.background='var(--bg)'; d.style.color='var(--text2)'; });
  el.style.borderColor='var(--accent)';el.style.background='rgba(39,174,96,0.15)';el.style.color='var(--accent)';
  updateCharterSummary();
}

function updateCharterSummary() {
  const el = document.getElementById('charter-summary');
  if (!el||!currentCharter) return;
  const rate = currentCharter.hourly_rate;
  const actual = rate * selectedCharterHours;
  const preCollect = rate * 12;
  if (selectedCharterDate) {
    const dateDisplay = new Date(selectedCharterDate).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
    el.innerHTML = `📅 ${dateDisplay} · ⏱ ${selectedCharterHours}小时<br>
      💰 实际费用：<strong style="color:var(--text);">$${actual}</strong><br>
      🔒 预收款：<strong style="color:var(--gold);">$${preCollect}</strong>（完成后退差价 $${preCollect-actual}）`;
  } else {
    el.innerHTML = `请选择日期 · ⏱ ${selectedCharterHours}小时 · 💰 预计$${actual}`;
  }
}

function closeCharterDetail() {
  document.getElementById('charter-detail-modal').style.display = 'none';
  currentCharter = null;
}

async function bookCharter() {
  if (!selectedCharterDate) { alert('请选择日期'); return; }
  const name = prompt('您的姓名');
  const phone = prompt('手机号');
  if (!name||!phone) return;

  const p = currentCharter;
  const rate = p.hourly_rate;
  const preCollect = rate * 12;
  const actual = rate * selectedCharterHours;

  try {
    // 生成订单
    await supaFetch('trips', {
      method:'POST',
      body: JSON.stringify({
        tenant_id: TENANT_ID,
        passenger_name: name,
        passenger_phone: phone,
        direction: 'to_airport',
        trip_type: 'charter',
        vehicle_type: (p.vehicle_brand||'')+' '+(p.vehicle_model||''),
        scheduled_at: selectedCharterDate + 'T09:00:00',
        total_price: preCollect,
        charter_hours: selectedCharterHours,
        hourly_rate: rate,
        status: 'pending',
        driver_id: p.driver_id,
        pickup_address: '出发地待确认',
        dropoff_address: '目的地待确认',
        payment_method: 'wechat',
        payment_status: 'pending'
      })
    });

    // 更新booked_dates
    const bookedDates = JSON.parse(p.booked_dates||'[]');
    if (!bookedDates.includes(selectedCharterDate)) bookedDates.push(selectedCharterDate);
    await supaFetch(`tour_plaza?id=eq.${p.id}`, {
      method:'PATCH',
      body: JSON.stringify({ booked_dates: JSON.stringify(bookedDates) })
    });

    closeCharterDetail();
    loadPosts();
    alert(`✅ 预约成功！
实际费用：$${actual}
预收款：$${preCollect}

请联系司机确认出发地点`);
  } catch(e) { alert('预约失败：'+e.message); }
}

async function submitCharterRequest() {
  const name = document.getElementById('d-name').value.trim();
  const phone = document.getElementById('d-phone').value.trim();
  const date = document.getElementById('d-avail-date').value;
  const city = document.getElementById('d-city').value;
  if (!name||!phone||!date) { alert('请填写称呼、手机号和日期'); return; }

  const seats = parseInt(document.getElementById('d-seats').value);
  const hours = parseInt(document.getElementById('d-hours').value);
  const budget = parseFloat(document.getElementById('d-hourly').value)||null;

  const data = {
    tenant_id: TENANT_ID,
    post_type: 'charter',
    title: `包车需求 · ${city}`,
    city: city,
    travel_date: date,
    destination: document.getElementById('d-desc').value.trim()||'待定',
    total_seats: seats,
    filled_seats: 1,
    budget: budget,
    description: `${seats}人出行，预计${hours}小时${document.getElementById('d-desc').value.trim()?'，'+document.getElementById('d-desc').value.trim():''}`,
    author_name: name,
    contact_wechat: phone, // 用手机号存，不对外显示
    status: 'open'
  };

  try {
    await supaFetch('tour_plaza', { method: 'POST', body: JSON.stringify(data) });
    closeDriverModal();
    loadAll();
    alert('✅ 包车需求已发布！司机看到后会联系您');
  } catch(e) { alert('发布失败：' + e.message); }
}
