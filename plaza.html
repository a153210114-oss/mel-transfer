<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>旅游广场 · 澳洲出行AI管家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f7f4;--surface:#fff;--border:#d0e8dc;
  --text:#1a3a2a;--text2:#5a8a6a;--accent:#27ae60;
  --gold:#c8a020;--red:#ff3b30;--blue:#0096c7;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;}

.header{background:linear-gradient(135deg,#0d2818,#1a4a2e);padding:14px 16px 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.back-btn{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);border-radius:10px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit;}
.header-title{flex:1;text-align:center;font-size:17px;font-weight:900;color:white;}

/* 发布按钮区 */
.publish-bar{
  background:white;padding:12px 14px;
  display:flex;gap:8px;
  border-bottom:1px solid var(--border);
}
.pub-btn{
  flex:1;padding:10px;border:none;border-radius:12px;
  font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;
}
.pub-btn-driver{background:linear-gradient(135deg,#1a4a2e,#27ae60);color:white;}
.pub-btn-tourist{background:linear-gradient(135deg,#0d2040,#0096c7);color:white;}

.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.1);}
.tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:white;border-bottom-color:var(--accent);}

.filter-bar{background:white;padding:10px 14px;border-bottom:1px solid var(--border);}
.form-select{width:100%;padding:8px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}

.post-list{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:30px;}

/* 卡片 */
.post-card{background:white;border-radius:18px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:1.5px solid var(--border);}
.post-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;}
.badge-charter{background:#fff8e8;color:#c8a020;}
.badge-group{background:#e8f8ee;color:#27ae60;}
.badge-driver{background:#e8f0ff;color:#5856d6;}
.post-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px;}
.post-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.meta-tag{font-size:12px;color:var(--text2);background:var(--bg);padding:4px 10px;border-radius:8px;}
.post-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;background:var(--bg);border-radius:10px;padding:10px 12px;}
.post-footer{display:flex;justify-content:space-between;align-items:center;}
.post-author{font-size:12px;color:var(--text2);}
.seats-row{display:flex;gap:4px;align-items:center;margin-bottom:4px;}
.seat-dot{width:9px;height:9px;border-radius:50%;}
.seat-filled{background:var(--accent);}
.seat-empty{background:var(--border);}
.contact-btn{background:var(--accent);color:white;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.contact-btn.full{background:#ccc;cursor:default;}
.post-date{font-size:12px;color:var(--text2);}

/* 弹窗 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:white;border-radius:28px 28px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:17px;font-weight:900;color:var(--text);margin-bottom:6px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:18px;}
.form-field{margin-bottom:13px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;font-weight:700;}
.form-input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-row{display:flex;gap:8px;}
.form-row .form-field{flex:1;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:10px;padding:10px 14px;}
.toggle-label{font-size:13px;color:var(--text);font-weight:600;}
.toggle{width:44px;height:24px;background:#ccc;border-radius:12px;cursor:pointer;position:relative;transition:background 0.2s;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:left 0.2s;}
.toggle.on::after{left:23px;}
.submit-btn{width:100%;padding:15px;color:white;border:none;border-radius:14px;font-size:16px;font-weight:900;font-family:inherit;cursor:pointer;margin-top:8px;}
.submit-btn.green{background:linear-gradient(135deg,#27ae60,#1e8449);}
.submit-btn.blue{background:linear-gradient(135deg,#0096c7,#0077a0);}
.cancel-btn{width:100%;padding:12px;background:none;border:none;font-size:13px;color:#bbb;cursor:pointer;margin-top:6px;}

.section-divider{font-size:11px;font-weight:800;color:var(--text2);letter-spacing:1px;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}

.empty-state{text-align:center;padding:40px 20px;color:var(--text2);}
.empty-icon{font-size:48px;margin-bottom:12px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <button class="back-btn" onclick="window.location.href='welcome.html'">← 返回</button>
    <div class="header-title">🌿 旅游广场</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('all',this)">全部</div>
    <div class="tab" onclick="switchTab('charter',this)">🚌 包车</div>
    <div class="tab" onclick="switchTab('group',this)">👥 组团</div>
  </div>
</div>

<!-- 发布按钮区 -->
<div class="publish-bar">
  <button class="pub-btn pub-btn-driver" onclick="openDriverModal()">🧑‍✈️ 我要发布包车</button>
  <button class="pub-btn pub-btn-tourist" onclick="openTouristModal()">👥 我要组团</button>
</div>

<!-- 城市筛选 -->
<div class="filter-bar">
  <select class="form-select" id="city-filter" onchange="loadPosts()">
    <option value="">全部城市</option>
    <option value="墨尔本">🏙️ 墨尔本</option>
    <option value="悉尼">🌆 悉尼</option>
    <option value="布里斯班">🌇 布里斯班</option>
    <option value="珀斯">🌅 珀斯</option>
    <option value="阿德莱德">🏛️ 阿德莱德</option>
    <option value="堪培拉">🏛️ 堪培拉</option>
    <option value="塔斯马尼亚">🏔️ 塔斯马尼亚</option>
  </select>
</div>

<div class="post-list" id="post-list">
  <div class="empty-state"><div class="empty-icon">⏳</div><div>加载中...</div></div>
</div>

<!-- ══ 司机发布包车弹窗 ══ -->
<div class="modal-overlay" id="driver-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🚌 发布包车服务</div>
    <div class="modal-sub">填写车辆信息和服务内容，游客来找你</div>

    <div class="section-divider">车辆信息</div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">车辆品牌</label>
        <input class="form-input" id="d-brand" placeholder="如：Toyota">
      </div>
      <div class="form-field">
        <label class="form-label">车型</label>
        <input class="form-input" id="d-model" placeholder="如：Tarago">
      </div>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">座位数</label>
        <select class="form-input" id="d-seats">
          <option value="4">4座</option>
          <option value="6">6座</option>
          <option value="8" selected>8座</option>
          <option value="13">13座</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">城市</label>
        <select class="form-input" id="d-city">
          <option value="墨尔本">墨尔本</option>
          <option value="悉尼">悉尼</option>
          <option value="布里斯班">布里斯班</option>
          <option value="珀斯">珀斯</option>
          <option value="阿德莱德">阿德莱德</option>
          <option value="堪培拉">堪培拉</option>
          <option value="塔斯马尼亚">塔斯马尼亚</option>
        </select>
      </div>
    </div>

    <div class="section-divider">服务与报价</div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">每小时报价（含油）</label>
        <input class="form-input" id="d-hourly" type="number" placeholder="如：80">
      </div>
      <div class="form-field">
        <label class="form-label">可出车日期</label>
        <input class="form-input" id="d-avail-date" type="date">
      </div>
    </div>

    <div class="form-field">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">提供中文讲解服务</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px;">额外收费，请填报价</div>
        </div>
        <div class="toggle" id="guide-toggle" onclick="toggleGuide(this)"></div>
      </div>
    </div>
    <div class="form-field" id="guide-rate-field" style="display:none;">
      <label class="form-label">讲解服务额外报价（每小时）</label>
      <input class="form-input" id="d-guide-rate" type="number" placeholder="如：30">
    </div>

    <div class="section-divider">行程擅长</div>
    <div class="form-field">
      <label class="form-label">擅长路线/景点</label>
      <textarea class="form-input" id="d-desc" rows="3" placeholder="如：大洋路、菲利普岛、雅拉河谷酒庄、雪山..."></textarea>
    </div>

    <div class="section-divider">联系方式</div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">你的称呼</label>
        <input class="form-input" id="d-name" placeholder="姓名或昵称">
      </div>
      <div class="form-field">
        <label class="form-label">联系微信</label>
        <input class="form-input" id="d-wechat" placeholder="微信号">
      </div>
    </div>

    <button class="submit-btn green" onclick="submitDriverPost()">🚌 发布包车信息</button>
    <button class="cancel-btn" onclick="closeDriverModal()">取消</button>
  </div>
</div>

<!-- ══ 游客组团弹窗 ══ -->
<div class="modal-overlay" id="tourist-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">👥 发布组团需求</div>
    <div class="modal-sub">找同伴一起出行，凑够人数选车</div>

    <div class="section-divider">行程信息</div>
    <div class="form-field">
      <label class="form-label">目的地</label>
      <input class="form-input" id="t-destination" placeholder="如：大洋路、菲利普岛、雪山">
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">出发城市</label>
        <select class="form-input" id="t-city">
          <option value="墨尔本">墨尔本</option>
          <option value="悉尼">悉尼</option>
          <option value="布里斯班">布里斯班</option>
          <option value="珀斯">珀斯</option>
          <option value="阿德莱德">阿德莱德</option>
          <option value="堪培拉">堪培拉</option>
          <option value="塔斯马尼亚">塔斯马尼亚</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">出行日期</label>
        <input class="form-input" id="t-date" type="date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">已有人数（含自己）</label>
        <select class="form-input" id="t-filled">
          <option value="1">1人</option>
          <option value="2">2人</option>
          <option value="3">3人</option>
          <option value="4">4人</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">希望总人数</label>
        <select class="form-input" id="t-total">
          <option value="4">4人</option>
          <option value="6">6人</option>
          <option value="8">8人</option>
          <option value="10">10人</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label class="form-label">人均预算（选填）</label>
      <input class="form-input" id="t-budget" type="number" placeholder="如：80">
    </div>

    <div class="section-divider">行程说明</div>
    <div class="form-field">
      <textarea class="form-input" id="t-desc" rows="3" placeholder="简单描述行程计划、偏好、特殊需求..."></textarea>
    </div>

    <div class="section-divider">联系方式</div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">你的称呼</label>
        <input class="form-input" id="t-name" placeholder="姓名或昵称">
      </div>
      <div class="form-field">
        <label class="form-label">联系微信</label>
        <input class="form-input" id="t-wechat" placeholder="微信号">
      </div>
    </div>

    <button class="submit-btn blue" onclick="submitTouristPost()">👥 发布组团需求</button>
    <button class="cancel-btn" onclick="closeTouristModal()">取消</button>
  </div>
</div>

<script>
const SUPA_URL='https://gxocvpmgfjvmmkkbswgo.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4b2N2cG1nZmp2bW1ra2Jzd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDc4NzAsImV4cCI6MjA5NTgyMzg3MH0.ExUNuOP8YyHQmItY6cdl1Euj7nOXqQq-rQT5-7aNerE';
const TENANT_ID='00000000-0000-0000-0000-000000000001';
let currentTab='all';

async function supaFetch(path,opts={}){
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  if(!res.ok){const e=await res.json();throw new Error(e.message||'error');}
  return res.json();
}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadPosts();
}

async function loadPosts(){
  const list=document.getElementById('post-list');
  list.innerHTML='<div class="empty-state"><div class="empty-icon">⏳</div><div>加载中...</div></div>';
  try{
    const city=document.getElementById('city-filter').value;
    let q=`tour_plaza?status=eq.open&order=created_at.desc&limit=30`;
    if(currentTab!=='all') q+=`&post_type=eq.${currentTab}`;
    if(city) q+=`&city=eq.${encodeURIComponent(city)}`;
    const posts=await supaFetch(q);
    if(!posts.length){
      list.innerHTML='<div class="empty-state"><div class="empty-icon">🌿</div><div>暂无帖子，来发第一条！</div></div>';
      return;
    }
    list.innerHTML=posts.map(renderPost).join('');
  }catch(e){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div>加载失败，请刷新</div></div>';
  }
}

function renderPost(p){
  const isCharter=p.post_type==='charter';
  const isDriver=!!p.driver_id;
  const isFull=p.status==='full'||(p.filled_seats>=p.total_seats&&!isCharter);
  const date=new Date(p.travel_date).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
  const daysLeft=Math.ceil((new Date(p.travel_date)-new Date())/86400000);

  let seatsHtml='';
  if(!isCharter&&p.total_seats){
    const dots=Array.from({length:p.total_seats},(_,i)=>
      `<div class="seat-dot ${i<p.filled_seats?'seat-filled':'seat-empty'}"></div>`
    ).join('');
    seatsHtml=`<div class="seats-row">${dots}<span style="font-size:11px;color:var(--text2);margin-left:4px;">${p.filled_seats}/${p.total_seats}人</span></div>`;
  }

  const priceInfo = isCharter&&p.hourly_rate
    ? `<span class="meta-tag">💰 $${p.hourly_rate}/小时</span>`
    : p.price_per_person
    ? `<span class="meta-tag">💰 人均 $${p.price_per_person}</span>`
    : '';

  const guideInfo = p.guide_service
    ? `<span class="meta-tag">🎙️ 提供讲解${p.guide_rate?'+$'+p.guide_rate+'/h':''}</span>`
    : '';

  const vehicleInfo = p.vehicle_brand
    ? `<span class="meta-tag">🚗 ${p.vehicle_brand} ${p.vehicle_model||''} ${p.vehicle_seats?p.vehicle_seats+'座':''}</span>`
    : '';

  return `
  <div class="post-card">
    <div class="post-header">
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <span class="badge ${isCharter?'badge-charter':'badge-group'}">${isCharter?'🚌 包车':'👥 组团'}</span>
        ${isDriver?'<span class="badge badge-driver">司机发布</span>':''}
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        ${isFull?'<span style="font-size:11px;font-weight:800;color:var(--red);background:#fff0f0;padding:3px 8px;border-radius:6px;">已满</span>':''}
        <span class="post-date">${date}${daysLeft>0?' ('+daysLeft+'天后)':' (今天)'}</span>
      </div>
    </div>
    <div class="post-title">${p.destination}</div>
    <div class="post-meta">
      <span class="meta-tag">📍 ${p.city}</span>
      ${vehicleInfo}
      ${priceInfo}
      ${guideInfo}
    </div>
    ${p.description?`<div class="post-desc">${p.description}</div>`:''}
    <div class="post-footer">
      <div>
        ${seatsHtml}
        <div class="post-author">👤 ${p.author_name}</div>
      </div>
      <button class="contact-btn ${isFull?'full':''}"
        onclick="${isFull?"alert('已满员')":`contactPost('${p.contact_wechat}','${p.id}',${isCharter})`}">
        ${isFull?'已满员':'💬 联系'}
      </button>
    </div>
  </div>`;
}

async function contactPost(wechat,postId,isCharter){
  if(navigator.clipboard) await navigator.clipboard.writeText(wechat);
  alert('微信号已复制：'+wechat+'\n请打开微信→添加朋友→粘贴搜索');
  if(!isCharter){
    try{
      const posts=await supaFetch(`tour_plaza?id=eq.${postId}`);
      if(posts.length){
        const p=posts[0];
        const newFilled=Math.min(p.filled_seats+1,p.total_seats);
        const newStatus=newFilled>=p.total_seats?'full':'open';
        await supaFetch(`tour_plaza?id=eq.${postId}`,{method:'PATCH',body:JSON.stringify({filled_seats:newFilled,status:newStatus})});
        loadPosts();
      }
    }catch(e){}
  }
}

// ── 司机发布 ──
function openDriverModal(){
  document.getElementById('driver-modal').classList.add('show');
  document.getElementById('d-avail-date').min=new Date().toISOString().split('T')[0];
}
function closeDriverModal(){ document.getElementById('driver-modal').classList.remove('show'); }

function toggleGuide(el){
  el.classList.toggle('on');
  document.getElementById('guide-rate-field').style.display=el.classList.contains('on')?'block':'none';
}

async function submitDriverPost(){
  const name=document.getElementById('d-name').value.trim();
  const wechat=document.getElementById('d-wechat').value.trim();
  const brand=document.getElementById('d-brand').value.trim();
  const date=document.getElementById('d-avail-date').value;
  if(!name||!wechat||!brand||!date){alert('请填写必填项：车辆品牌、可出车日期、称呼、微信');return;}
  const hasGuide=document.getElementById('guide-toggle').classList.contains('on');
  const data={
    tenant_id:TENANT_ID,
    post_type:'charter',
    title:brand+' '+document.getElementById('d-model').value,
    city:document.getElementById('d-city').value,
    travel_date:date,
    destination:'包车服务',
    vehicle_brand:brand,
    vehicle_model:document.getElementById('d-model').value.trim()||null,
    vehicle_seats:parseInt(document.getElementById('d-seats').value),
    hourly_rate:parseFloat(document.getElementById('d-hourly').value)||null,
    guide_service:hasGuide,
    guide_rate:hasGuide?parseFloat(document.getElementById('d-guide-rate').value)||null:null,
    description:document.getElementById('d-desc').value.trim()||null,
    author_name:name,
    contact_wechat:wechat,
    status:'open',
    filled_seats:0,
    total_seats:parseInt(document.getElementById('d-seats').value)
  };
  try{
    await supaFetch('tour_plaza',{method:'POST',body:JSON.stringify(data)});
    closeDriverModal();loadPosts();
    alert('✅ 包车信息已发布！');
  }catch(e){alert('发布失败：'+e.message);}
}

// ── 游客组团 ──
function openTouristModal(){
  document.getElementById('tourist-modal').classList.add('show');
  document.getElementById('t-date').min=new Date().toISOString().split('T')[0];
}
function closeTouristModal(){ document.getElementById('tourist-modal').classList.remove('show'); }

async function submitTouristPost(){
  const name=document.getElementById('t-name').value.trim();
  const wechat=document.getElementById('t-wechat').value.trim();
  const dest=document.getElementById('t-destination').value.trim();
  const date=document.getElementById('t-date').value;
  if(!name||!wechat||!dest||!date){alert('请填写必填项：目的地、日期、称呼、微信');return;}
  const data={
    tenant_id:TENANT_ID,
    post_type:'group',
    title:dest,
    city:document.getElementById('t-city').value,
    travel_date:date,
    destination:dest,
    filled_seats:parseInt(document.getElementById('t-filled').value),
    total_seats:parseInt(document.getElementById('t-total').value),
    price_per_person:parseFloat(document.getElementById('t-budget').value)||null,
    description:document.getElementById('t-desc').value.trim()||null,
    author_name:name,
    contact_wechat:wechat,
    status:'open'
  };
  try{
    await supaFetch('tour_plaza',{method:'POST',body:JSON.stringify(data)});
    closeTouristModal();loadPosts();
    alert('✅ 组团需求已发布！');
  }catch(e){alert('发布失败：'+e.message);}
}

loadPosts();
</script>
