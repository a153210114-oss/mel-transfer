<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>旅游广场 · 澳洲出行AI管家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f7f4;--surface:#fff;--border:#d0e8dc;
  --text:#1a3a2a;--text2:#5a8a6a;--accent:#27ae60;
  --gold:#c8a020;--red:#ff3b30;--blue:#0096c7;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;}

.header{background:linear-gradient(135deg,#0d2818,#1a4a2e);padding:14px 16px 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.back-btn{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);border-radius:10px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit;}
.header-title{flex:1;text-align:center;font-size:17px;font-weight:900;color:white;}

/* 城市筛选 */
.filter-bar{background:white;padding:10px 14px;border-bottom:1px solid var(--border);}
.form-select{width:100%;padding:8px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}

/* 两个主入口按钮 */
.main-btns{padding:14px;display:flex;gap:10px;}
.main-btn{
  flex:1;background:white;border-radius:18px;padding:16px;
  cursor:pointer;border:2px solid var(--border);transition:all 0.2s;
}
.main-btn.active-charter{border-color:var(--accent);}
.main-btn.active-group{border-color:var(--blue);}
.main-btn-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.main-btn-icon{font-size:20px;}
.count-badge{border-radius:12px;font-size:12px;font-weight:800;padding:2px 10px;display:none;}
.charter-badge{background:var(--accent);color:white;}
.group-badge{background:var(--blue);color:white;}
.main-btn-title{font-size:14px;font-weight:800;color:var(--text);}
.main-btn-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.expand-hint{font-size:10px;color:var(--text2);margin-top:6px;}

/* 展开区 */
.section{display:none;padding:0 14px 14px;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.section-label{font-size:12px;font-weight:800;color:var(--text2);letter-spacing:1px;}
.section-action{background:var(--accent);color:white;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.section-action.blue{background:var(--blue);}
.section-divider{border-top:1px solid var(--border);margin:12px 0;}

/* 卡片 */
.post-card{background:white;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border:1.5px solid var(--border);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;}
.badge-supply{background:#e8f8ee;color:var(--accent);}
.badge-demand{background:#fff0e8;color:#e07020;}
.badge-group{background:#e8f0ff;color:var(--blue);}
.card-date{font-size:12px;color:var(--text2);}
.card-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:6px;}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.meta-tag{font-size:11px;color:var(--text2);background:var(--bg);padding:3px 8px;border-radius:6px;}
.card-desc{font-size:12px;color:var(--text2);background:var(--bg);border-radius:8px;padding:8px 10px;margin-bottom:8px;line-height:1.6;}
.card-footer{display:flex;justify-content:space-between;align-items:center;}
.card-author{font-size:12px;color:var(--text2);}
.card-btn{background:var(--accent);color:white;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;}
.card-btn.blue{background:var(--blue);}
.card-btn.outline{background:none;border:1.5px solid var(--accent);color:var(--accent);}

/* 日期标签 */
.date-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.date-tag{font-size:11px;padding:4px 10px;border-radius:8px;font-weight:700;cursor:pointer;}
.date-tag.avail{background:#e8f8ee;color:var(--accent);}
.date-tag.booked{background:#f0f0f0;color:#ccc;cursor:not-allowed;}

/* 座位进度 */
.seats-row{display:flex;gap:4px;align-items:center;margin-bottom:6px;}
.seat-dot{width:9px;height:9px;border-radius:50%;}
.seat-filled{background:var(--blue);}
.seat-empty{background:var(--border);}

/* 弹窗 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:white;border-radius:28px 28px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:17px;font-weight:900;color:var(--text);margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:18px;}
.form-field{margin-bottom:13px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;font-weight:700;}
.form-input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-row{display:flex;gap:8px;}
.form-row .form-field{flex:1;}
.submit-btn{width:100%;padding:14px;color:white;border:none;border-radius:14px;font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;margin-top:4px;}
.submit-btn.green{background:linear-gradient(135deg,#27ae60,#1e8449);}
.submit-btn.blue{background:linear-gradient(135deg,#0096c7,#0077a0);}
.cancel-btn{width:100%;padding:11px;background:none;border:none;font-size:13px;color:#bbb;cursor:pointer;margin-top:6px;}
.divider-label{font-size:11px;font-weight:800;color:var(--text2);letter-spacing:1px;margin:4px 0 8px;}

.empty{text-align:center;padding:24px 0;color:var(--text2);font-size:13px;}
.topic-btn{flex-shrink:0;padding:6px 14px;background:white;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;white-space:nowrap;}
.topic-btn.active{background:var(--text);color:white;border-color:var(--text);}
.chat-msg{background:white;border-radius:14px;padding:12px 14px;border:1px solid var(--border);}
.chat-msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.chat-msg-author{font-size:12px;font-weight:800;color:var(--text);}
.chat-msg-time{font-size:11px;color:var(--text2);}
.chat-msg-content{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px;}
.chat-msg-footer{display:flex;align-items:center;gap:10px;}
.like-btn{font-size:12px;color:var(--text2);cursor:pointer;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px;}
.like-btn.liked{color:var(--red);border-color:var(--red);background:#fff0f0;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <button class="back-btn" onclick="window.location.href='index.html'">← 返回</button>
    <div class="header-title">🌿 旅游广场</div>
  </div>
</div>

<!-- 城市筛选 -->
<div class="filter-bar">
  <select class="form-select" id="city-filter" onchange="loadAll()">
    <option value="">全部城市</option>
    <option value="墨尔本">🏙️ 墨尔本</option>
    <option value="悉尼">🌆 悉尼</option>
    <option value="布里斯班">🌇 布里斯班</option>
    <option value="珀斯">🌅 珀斯</option>
    <option value="阿德莱德">🏛️ 阿德莱德</option>
    <option value="堪培拉">🏛️ 堪培拉</option>
    <option value="塔斯马尼亚">🏔️ 塔斯马尼亚</option>
  </select>
</div>

<!-- 两个主入口 -->
<div class="main-btns">
  <div class="main-btn" id="charter-btn" onclick="toggleSection('charter')">
    <div class="main-btn-top">
      <div class="main-btn-icon">🚌</div>
      <span class="count-badge charter-badge" id="charter-badge"></span>
    </div>
    <div class="main-btn-title">包车出游</div>
    <div class="main-btn-sub">查看车辆·发布需求</div>
    <div class="expand-hint" id="charter-hint">▼ 点击展开</div>
  </div>
  <div class="main-btn" id="group-btn" onclick="toggleSection('group')">
    <div class="main-btn-top">
      <div class="main-btn-icon">👥</div>
      <span class="count-badge group-badge" id="group-badge"></span>
    </div>
    <div class="main-btn-title">拼团广场</div>
    <div class="main-btn-sub">找同伴·AA出行</div>
    <div class="expand-hint" id="group-hint">▼ 点击展开</div>
  </div>
</div>
<div style="padding:0 14px 14px;">
  <div class="main-btn" id="chat-btn" onclick="toggleSection('chat')" style="width:100%;">
    <div class="main-btn-top">
      <div class="main-btn-icon">💬</div>
      <span class="count-badge" id="chat-badge" style="background:#ff6b6b;color:white;display:none;"></span>
    </div>
    <div class="main-btn-title">聊天广场</div>
    <div class="main-btn-sub">机场攻略·景点游记·包车经验·落地指南·自由聊天</div>
    <div class="expand-hint" id="chat-hint">▼ 点击展开</div>
  </div>
</div>

<!-- 包车展开区 -->
<div class="section" id="charter-section">

  <!-- 上半：司机供应 -->
  <div class="section-header">
    <div class="section-label">🚗 司机可供车辆</div>
  </div>
  <div id="supply-list"><div class="empty">加载中...</div></div>

  <div class="section-divider"></div>

  <!-- 下半：乘客需求 -->
  <div class="section-header">
    <div class="section-label">📋 乘客包车需求</div>
    <button class="section-action" onclick="openCharterDemandModal()">+ 发布需求</button>
  </div>
  <div id="demand-list"><div class="empty">暂无需求</div></div>

</div>

<!-- 拼团展开区 -->
<div class="section" id="group-section">
  <div class="section-header">
    <div class="section-label">👥 拼团帖子</div>
    <button class="section-action blue" onclick="openGroupModal()">+ 发起拼团</button>
  </div>
  <div id="group-list"><div class="empty">加载中...</div></div>
</div>

<!-- 包车需求弹窗（乘客发布） -->
<div class="modal-overlay" id="demand-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🚌 发布包车需求</div>
    <div class="modal-sub">找不到合适车辆？让司机来找你</div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">出行人数</label>
        <select class="form-input" id="dm-seats">
          <option value="4">1-4人</option>
          <option value="8" selected>5-8人</option>
          <option value="12">9-12人</option>
          <option value="15">13-15人</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">城市</label>
        <select class="form-input" id="dm-city">
          <option value="墨尔本">墨尔本</option>
          <option value="悉尼">悉尼</option>
          <option value="布里斯班">布里斯班</option>
          <option value="珀斯">珀斯</option>
          <option value="阿德莱德">阿德莱德</option>
          <option value="堪培拉">堪培拉</option>
          <option value="塔斯马尼亚">塔斯马尼亚</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">出行日期</label>
        <input class="form-input" id="dm-date" type="date">
      </div>
      <div class="form-field">
        <label class="form-label">预计时长</label>
        <select class="form-input" id="dm-hours">
          <option value="4">4小时</option>
          <option value="6">6小时</option>
          <option value="8">8小时</option>
          <option value="10">10小时</option>
          <option value="12">全天</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label class="form-label">目的地/行程说明</label>
      <textarea class="form-input" id="dm-dest" rows="2" placeholder="如：大洋路一日游、接送机场+等候..."></textarea>
    </div>
    <div class="form-field">
      <label class="form-label">出价（总价）</label>
      <input class="form-input" id="dm-price" type="number" placeholder="如：400，司机接单即成交">
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">称呼</label>
        <input class="form-input" id="dm-name" placeholder="姓名或昵称">
      </div>
      <div class="form-field">
        <label class="form-label">手机号</label>
        <input class="form-input" id="dm-phone" type="tel" placeholder="04XX XXX XXX">
      </div>
    </div>
    <button class="submit-btn green" onclick="submitDemand()">🚌 发布需求</button>
    <button class="cancel-btn" onclick="closeDemandModal()">取消</button>
  </div>
</div>

<!-- 拼团弹窗 -->
<div class="modal-overlay" id="group-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">👥 发起拼团</div>
    <div class="modal-sub">找同伴一起出行，AA制更划算</div>
    <div class="form-field">
      <label class="form-label">目的地</label>
      <input class="form-input" id="gm-dest" placeholder="如：大洋路、菲利普岛、雪山">
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">城市</label>
        <select class="form-input" id="gm-city">
          <option value="墨尔本">墨尔本</option>
          <option value="悉尼">悉尼</option>
          <option value="布里斯班">布里斯班</option>
          <option value="珀斯">珀斯</option>
          <option value="阿德莱德">阿德莱德</option>
          <option value="堪培拉">堪培拉</option>
          <option value="塔斯马尼亚">塔斯马尼亚</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">出行日期</label>
        <input class="form-input" id="gm-date" type="date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">已有人数</label>
        <select class="form-input" id="gm-filled">
          <option value="1">1人</option>
          <option value="2">2人</option>
          <option value="3">3人</option>
          <option value="4">4人</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">希望总人数</label>
        <select class="form-input" id="gm-total">
          <option value="4">4人</option>
          <option value="6">6人</option>
          <option value="8">8人</option>
          <option value="10">10人</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label class="form-label">人均预算（选填）</label>
      <input class="form-input" id="gm-budget" type="number" placeholder="如：80">
    </div>
    <div class="form-field">
      <label class="form-label">行程说明</label>
      <textarea class="form-input" id="gm-desc" rows="2" placeholder="简单描述行程计划..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">称呼</label>
        <input class="form-input" id="gm-name" placeholder="姓名或昵称">
      </div>
      <div class="form-field">
        <label class="form-label">手机号</label>
        <input class="form-input" id="gm-phone" type="tel" placeholder="04XX XXX XXX">
      </div>
    </div>
    <button class="submit-btn blue" onclick="submitGroup()">👥 发布拼团</button>
    <button class="cancel-btn" onclick="closeGroupModal()">取消</button>
  </div>
</div>

<!-- 包车详情弹窗（选日期下单） -->
<div class="modal-overlay" id="book-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="book-content"></div>
    <button onclick="closeBookModal()" class="cancel-btn">取消</button>
  </div>
</div>

<script>
const SUPA_URL='https://gxocvpmgfjvmmkkbswgo.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4b2N2cG1nZmp2bW1ra2Jzd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDc4NzAsImV4cCI6MjA5NTgyMzg3MH0.ExUNuOP8YyHQmItY6cdl1Euj7nOXqQq-rQT5-7aNerE';
const TENANT_ID='00000000-0000-0000-0000-000000000001';
let activeSection=null, currentBookPost=null, selectedBookDate=null, selectedBookHours=4;

async function supaFetch(path,opts={}){
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  if(!res.ok){const e=await res.json();throw new Error(e.message||'error');}
  return res.json();
}

// ── 展开/收起 ──
function toggleSection(type){
  if(type==='chat'&&activeSection==='chat'){
    document.getElementById('chat-section').style.display='none';
    document.getElementById('chat-hint').textContent='▼ 点击展开';
    document.getElementById('chat-btn').className='main-btn';
    activeSection=null;return;
  }
  if(type==='chat'){
    if(activeSection){
      document.getElementById(activeSection+'-section').style.display='none';
      document.getElementById(activeSection+'-hint').textContent='▼ 点击展开';
      document.getElementById(activeSection+'-btn').className='main-btn';
    }
    document.getElementById('chat-section').style.display='block';
    document.getElementById('chat-hint').textContent='▲ 收起';
    document.getElementById('chat-btn').className='main-btn';
    document.getElementById('chat-btn').style.borderColor='#ff6b6b';
    activeSection='chat';
    loadMessages();
    return;
  }
  if(activeSection===type){
    document.getElementById(type+'-section').style.display='none';
    document.getElementById(type+'-hint').textContent='▼ 点击展开';
    document.getElementById(type+'-btn').className='main-btn';
    activeSection=null;
  } else {
    if(activeSection){
      document.getElementById(activeSection+'-section').style.display='none';
      document.getElementById(activeSection+'-hint').textContent='▼ 点击展开';
      document.getElementById(activeSection+'-btn').className='main-btn';
    }
    document.getElementById(type+'-section').style.display='block';
    document.getElementById(type+'-hint').textContent='▲ 收起';
    document.getElementById(type+'-btn').className='main-btn active-'+type;
    activeSection=type;
    loadSection(type);
  }
}

// ── 加载数据 ──
async function loadAll(){
  try{
    console.log('loadAll: starting...');
    const city=document.getElementById('city-filter').value;
    let q='tour_plaza?status=eq.open';
    if(city) q+=`&city=eq.${encodeURIComponent(city)}`;
    const all=await supaFetch(q);
    const charters=all.filter(p=>p.post_type==='charter');
    const groups=all.filter(p=>p.post_type==='group');
    // 红点
    const cb=document.getElementById('charter-badge');
    if(cb){cb.textContent=charters.length;cb.style.display=charters.length>0?'block':'none';}
    const gb=document.getElementById('group-badge');
    if(gb){gb.textContent=groups.length;gb.style.display=groups.length>0?'block':'none';}
    if(activeSection) loadSection(activeSection);
  }catch(e){console.error('loadAll error:',e);}
}

async function loadSection(type){
  if(type==='charter'){ await loadCharterSection(); return; }
  const el=document.getElementById('group-list');
  el.innerHTML='<div class="empty">加载中...</div>';
  try{
    const city=document.getElementById('city-filter').value;
    let q='tour_plaza?status=eq.open&post_type=eq.group&order=created_at.desc';
    if(city) q+=`&city=eq.${encodeURIComponent(city)}`;
    const posts=await supaFetch(q);
    el.innerHTML=posts.length?posts.map(renderGroupCard).join(''):'<div class="empty">暂无拼团帖子，来发第一条！</div>';
  }catch(e){ el.innerHTML='<div class="empty">加载失败</div>'; }
}

async function loadCharterSection(){
  const city=document.getElementById('city-filter').value;
  let q='tour_plaza?status=eq.open&post_type=eq.charter&order=created_at.desc';
  if(city) q+=`&city=eq.${encodeURIComponent(city)}`;
  try{
    const all=await supaFetch(q);
    const supply=all.filter(p=>p.driver_id);
    const demand=all.filter(p=>!p.driver_id);

    const supplyEl=document.getElementById('supply-list');
    supplyEl.innerHTML=supply.length?supply.map(renderSupplyCard).join(''):'<div class="empty">暂无司机发布车辆</div>';

    const demandEl=document.getElementById('demand-list');
    demandEl.innerHTML=demand.length?demand.map(renderDemandCard).join(''):'<div class="empty">暂无需求，找不到合适车辆？点右上角发布</div>';
  }catch(e){
    document.getElementById('supply-list').innerHTML='<div class="empty">加载失败</div>';
  }
}

// ── 渲染卡片 ──
function renderSupplyCard(p){
  const dates=JSON.parse(p.available_dates||'[]');
  const booked=JSON.parse(p.booked_dates||'[]');
  const avail=dates.filter(d=>!booked.includes(d));
  return `
  <div class="post-card">
    <div class="card-header">
      <span class="badge badge-supply">🚗 司机供车</span>
      <span class="card-date">可约${avail.length}天</span>
    </div>
    <div class="card-title">${p.vehicle_brand||''} ${p.vehicle_model||''} ${p.vehicle_seats?p.vehicle_seats+'座':''}</div>
    <div class="card-meta">
      <span class="meta-tag">📍 ${p.city}</span>
      ${p.hourly_rate?`<span class="meta-tag">💰 $${p.hourly_rate}/小时</span>`:''}
    </div>
    ${p.description?`<div class="card-desc">${p.description}</div>`:''}
    <div class="date-tags">
      ${dates.map(d=>{
        const isBooked=booked.includes(d);
        const display=new Date(d).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
        return `<span class="date-tag ${isBooked?'booked':'avail'}" onclick="${isBooked?'':'openBookModal(\''+p.id+'\',\''+d+'\')'}">${display}${isBooked?' ✓':''}</span>`;
      }).join('')}
    </div>
    <div class="card-footer">
      <div class="card-author">👤 ${p.author_name}</div>
      ${avail.length>0?`<button class="card-btn" onclick="openBookModal('${p.id}',null)">选日期预约</button>`:'<span style="font-size:12px;color:#ccc;">已约满</span>'}
    </div>
  </div>`;
}

function renderDemandCard(p){
  const date=new Date(p.travel_date).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
  return `
  <div class="post-card">
    <div class="card-header">
      <span class="badge badge-demand">📋 乘客需求</span>
      <span class="card-date">${date}</span>
    </div>
    <div class="card-title">${p.destination||'包车出行'}</div>
    <div class="card-meta">
      <span class="meta-tag">📍 ${p.city}</span>
      <span class="meta-tag">👥 ${p.total_seats}人</span>
      ${p.budget?`<span class="meta-tag" style="color:var(--accent);font-weight:700;">💰 出价$${p.budget}</span>`:''}
    </div>
    ${p.description?`<div class="card-desc">${p.description}</div>`:''}
    <div class="card-footer">
      <div class="card-author">👤 ${p.author_name}</div>
      <span style="font-size:12px;color:${p.accepted_driver_id?'var(--accent)':'var(--text2)'};">${p.accepted_driver_id?'✅ 已接单':'等待司机'}</span>
    </div>
  </div>`;
}

function renderGroupCard(p){
  const date=new Date(p.travel_date).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
  const daysLeft=Math.ceil((new Date(p.travel_date)-new Date())/86400000);
  const dots=Array.from({length:p.total_seats},(_,i)=>`<div class="seat-dot ${i<p.filled_seats?'seat-filled':'seat-empty'}"></div>`).join('');
  const isFull=p.filled_seats>=p.total_seats;
  return `
  <div class="post-card">
    <div class="card-header">
      <span class="badge badge-group">👥 组团</span>
      <span class="card-date">${date}${daysLeft>0?' ('+daysLeft+'天后)':''}</span>
    </div>
    <div class="card-title">${p.destination}</div>
    <div class="card-meta">
      <span class="meta-tag">📍 ${p.city}</span>
      ${p.price_per_person?`<span class="meta-tag">💰 人均$${p.price_per_person}</span>`:''}
    </div>
    ${p.description?`<div class="card-desc">${p.description}</div>`:''}
    <div class="seats-row">${dots}<span style="font-size:11px;color:var(--text2);margin-left:4px;">${p.filled_seats}/${p.total_seats}人</span></div>
    <div class="card-footer">
      <div class="card-author">👤 ${p.author_name}</div>
      ${isFull
        ?'<span style="font-size:12px;color:#ccc;">已满员</span>'
        :`<button class="card-btn blue" onclick="joinGroup('${p.id}')">加入拼团</button>`
      }
    </div>
  </div>`;
}

// ── 包车预约 ──
async function openBookModal(postId, preDate){
  try{
    const posts=await supaFetch(`tour_plaza?id=eq.${postId}`);
    if(!posts.length)return;
    currentBookPost=posts[0];
    selectedBookDate=preDate||null;
    selectedBookHours=4;
    const p=currentBookPost;
    const dates=JSON.parse(p.available_dates||'[]');
    const booked=JSON.parse(p.booked_dates||'[]');
    const avail=dates.filter(d=>!booked.includes(d));

    document.getElementById('book-content').innerHTML=`
      <div style="font-size:17px;font-weight:900;color:var(--text);margin-bottom:4px;">${p.vehicle_brand||''} ${p.vehicle_model||''} ${p.vehicle_seats?p.vehicle_seats+'座':''}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px;">📍 ${p.city} · 💰 $${p.hourly_rate}/小时（最少4小时）</div>
      ${p.description?`<div class="card-desc" style="margin-bottom:14px;">${p.description}</div>`:''}

      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;">选择日期</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;" id="book-dates">
        ${avail.map(d=>{
          const display=new Date(d).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
          const isSelected=d===selectedBookDate;
          return `<div onclick="selectBookDate('${d}',this)"
            style="padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;
            background:${isSelected?'rgba(39,174,96,0.15)':'var(--bg)'};
            color:${isSelected?'var(--accent)':'var(--text)'};
            border:2px solid ${isSelected?'var(--accent)':'var(--border)'};">
            ${display}
          </div>`;
        }).join('')}
      </div>

      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;">预计时长</div>
      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;" id="book-hours">
        ${[4,6,8,10,12].map(h=>`
          <div onclick="selectBookHours(${h},this)"
            style="padding:8px 12px;border-radius:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;flex:1;min-width:50px;
            background:${h===4?'rgba(39,174,96,0.12)':'var(--bg)'};
            color:${h===4?'var(--accent)':'var(--text2)'};
            border:2px solid ${h===4?'var(--accent)':'var(--border)'};">
            ${h}h<br><span style="font-size:10px;">$${p.hourly_rate*h}</span>
          </div>`).join('')}
      </div>

      <div id="book-summary" style="background:var(--bg);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--text2);margin-bottom:14px;">
        请选择日期
      </div>

      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;">您的联系方式</div>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <input id="book-name" placeholder="称呼" style="flex:1;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;">
        <input id="book-phone" placeholder="手机号" type="tel" style="flex:1;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;">
      </div>
      <button onclick="submitBooking()" style="width:100%;padding:13px;background:linear-gradient(135deg,#27ae60,#1e8449);color:white;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;">✅ 确认预约</button>
    `;
    document.getElementById('book-modal').classList.add('show');
    if(preDate) updateBookSummary();
  }catch(e){alert('加载失败');}
}

function selectBookDate(d,el){
  selectedBookDate=d;
  document.querySelectorAll('#book-dates > div').forEach(e=>{e.style.borderColor='var(--border)';e.style.background='var(--bg)';e.style.color='var(--text)';});
  el.style.borderColor='var(--accent)';el.style.background='rgba(39,174,96,0.12)';el.style.color='var(--accent)';
  updateBookSummary();
}
function selectBookHours(h,el){
  selectedBookHours=h;
  document.querySelectorAll('#book-hours > div').forEach(e=>{e.style.borderColor='var(--border)';e.style.background='var(--bg)';e.style.color='var(--text2)';});
  el.style.borderColor='var(--accent)';el.style.background='rgba(39,174,96,0.12)';el.style.color='var(--accent)';
  updateBookSummary();
}
function updateBookSummary(){
  const el=document.getElementById('book-summary');
  if(!el||!currentBookPost)return;
  const rate=currentBookPost.hourly_rate;
  const actual=rate*selectedBookHours;
  const pre=rate*12;
  const dateStr=selectedBookDate?new Date(selectedBookDate).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'}):'未选';
  el.innerHTML=`📅 ${dateStr} · ⏱ ${selectedBookHours}小时<br>💰 实际：<strong>$${actual}</strong> · 🔒 预收：<strong style="color:var(--gold);">$${pre}</strong>（完成后退差价$${pre-actual}）`;
}
function closeBookModal(){document.getElementById('book-modal').classList.remove('show');currentBookPost=null;}

async function submitBooking(){
  if(!selectedBookDate){alert('请选择日期');return;}
  const name=document.getElementById('book-name').value.trim();
  const phone=document.getElementById('book-phone').value.trim();
  if(!name||!phone){alert('请填写联系方式');return;}
  const p=currentBookPost;
  const pre=p.hourly_rate*12;
  try{
    await supaFetch('trips',{method:'POST',body:JSON.stringify({
      tenant_id:TENANT_ID,passenger_name:name,passenger_phone:phone,
      direction:'to_airport',trip_type:'charter',
      vehicle_type:(p.vehicle_brand||'')+' '+(p.vehicle_model||''),
      scheduled_at:selectedBookDate+'T09:00:00',
      total_price:pre,charter_hours:selectedBookHours,
      hourly_rate:p.hourly_rate,status:'pending',
      driver_id:p.driver_id,
      pickup_address:'出发地待确认',dropoff_address:'目的地待确认',
      payment_method:'wechat',payment_status:'pending'
    })});
    const booked=JSON.parse(p.booked_dates||'[]');
    if(!booked.includes(selectedBookDate))booked.push(selectedBookDate);
    await supaFetch(`tour_plaza?id=eq.${p.id}`,{method:'PATCH',body:JSON.stringify({booked_dates:JSON.stringify(booked)})});
    closeBookModal();loadAll();
    alert(`✅ 预约成功！\n预收款：$${pre}\n完成后按实际${selectedBookHours}小时结算`);
  }catch(e){alert('预约失败：'+e.message);}
}

async function joinGroup(postId){
  try{
    const posts=await supaFetch(`tour_plaza?id=eq.${postId}`);
    if(!posts.length)return;
    const p=posts[0];
    if(p.filled_seats>=p.total_seats){alert('已满员');return;}
    const newFilled=Math.min(p.filled_seats+1,p.total_seats);
    const newStatus=newFilled>=p.total_seats?'full':'open';
    await supaFetch(`tour_plaza?id=eq.${postId}`,{method:'PATCH',body:JSON.stringify({filled_seats:newFilled,status:newStatus})});
    loadAll();
    alert('✅ 已加入拼团！组织者会与您联系');
  }catch(e){alert('操作失败');}
}

// ── 聊天广场 ──
let currentTopic = 'airport';
const topicLabels = {
  airport:'🛬 机场攻略', scenic:'🗺️ 景点游记',
  charter:'🚗 包车经验', newbie:'🏠 落地指南', free:'💬 自由聊天'
};

function switchTopic(topic, el) {
  currentTopic = topic;
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('chat-topic-label').textContent = topicLabels[topic]+'发言';
  loadMessages();
}

async function loadMessages() {
  const el = document.getElementById('chat-list');
  el.innerHTML = '<div class="empty">加载中...</div>';
  try {
    const msgs = await supaFetch(`chat_messages?topic=eq.${currentTopic}&order=created_at.desc&limit=30`);
    if (!msgs.length) { el.innerHTML = '<div class="empty">还没有人发言，来说第一句！</div>'; return; }
    el.innerHTML = msgs.reverse().map(renderMessage).join('');
    el.scrollTop = el.scrollHeight;
  } catch(e) { el.innerHTML = '<div class="empty">加载失败</div>'; }
}

function renderMessage(m) {
  const time = new Date(m.created_at).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  const typeIcon = m.author_type==='driver'?'🧑‍✈️':'👤';
  return `
  <div class="chat-msg">
    <div class="chat-msg-header">
      <div class="chat-msg-author">${typeIcon} ${m.author_name}</div>
      <div class="chat-msg-time">${time}</div>
    </div>
    <div class="chat-msg-content">${m.content}</div>
    <div class="chat-msg-footer">
      <div class="like-btn" onclick="likeMessage('${m.id}',this)">👍 ${m.likes||0}</div>
    </div>
  </div>`;
}

async function postMessage() {
  const author = document.getElementById('chat-author').value.trim();
  const content = document.getElementById('chat-content').value.trim();
  if (!author||!content) { alert('请填写称呼和内容'); return; }
  try {
    await supaFetch('chat_messages', { method:'POST', body: JSON.stringify({
      tenant_id: TENANT_ID,
      topic: currentTopic,
      author_name: author,
      author_type: 'passenger',
      content: content,
      likes: 0
    })});
    document.getElementById('chat-content').value = '';
    loadMessages();
  } catch(e) { alert('发送失败'); }
}

async function likeMessage(id, el) {
  if (el.classList.contains('liked')) return;
  try {
    const msgs = await supaFetch(`chat_messages?id=eq.${id}`);
    if (!msgs.length) return;
    const newLikes = (msgs[0].likes||0) + 1;
    await supaFetch(`chat_messages?id=eq.${id}`, {method:'PATCH', body:JSON.stringify({likes:newLikes})});
    el.classList.add('liked');
    el.textContent = '👍 ' + newLikes;
  } catch(e) {}
}


// ── 全局语音 ──
let globalRec = null, globalRecActive = false;

function toggleGlobalVoice() {
  if (globalRecActive) { globalRec?.stop(); return; }
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('请使用Safari或Chrome'); return;
  }
  navigator.mediaDevices?.getUserMedia({audio:true}).catch(()=>{});
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  globalRec = new SR();
  globalRec.lang = 'zh-CN'; globalRec.continuous = false; globalRec.interimResults = false;

  globalRec.onstart = () => {
    globalRecActive = true;
    const btn = document.getElementById('global-agent-btn');
    btn.textContent = '🔴';
    btn.style.background = 'rgba(255,59,48,0.2)';
    btn.style.borderColor = 'rgba(255,59,48,0.4)';
    document.getElementById('global-voice-dot').style.display = 'block';
  };
  globalRec.onresult = (e) => {
    const text = e.results[0][0].transcript;
    handlePlazaVoice(text);
  };
  globalRec.onend = () => {
    globalRecActive = false;
    const btn = document.getElementById('global-agent-btn');
    btn.textContent = '👩‍✈️';
    btn.style.background = 'rgba(39,174,96,0.15)';
    btn.style.borderColor = 'rgba(39,174,96,0.4)';
    document.getElementById('global-voice-dot').style.display = 'none';
  };
  globalRec.onerror = globalRec.onend;
  globalRec.start();
}

function handlePlazaVoice(text) {
  if (/包车|租车/.test(text)) {
    toggleSection('charter');
  } else if (/拼团|组团/.test(text)) {
    toggleSection('group');
  } else if (/发布|我要包车/.test(text)) {
    openCharterDemandModal();
  } else if (/发起拼团/.test(text)) {
    openGroupModal();
  } else if (/返回|回去|首页/.test(text)) {
    window.location.href = 'index.html';
  } else {
    alert('您说：' + text + '\n可以说：包车、拼团、发布需求、返回');
  }
}
