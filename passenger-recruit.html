<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>司机端 · 澳洲机场接送</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f4f8;
  --surface:#ffffff;
  --border:#e0e8f0;
  --text:#1a3a5c;
  --text2:#7a90a8;
  --accent:#0096c7;
  --gold:#c8a020;
  --green:#27ae60;
  --red:#ff3b30;
}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  max-width:480px;
  margin:0 auto;
}

/* ── Agent头部 ── */
.agent-header{
  background:linear-gradient(135deg,#1a3a5c,#0d2540);
  padding:16px 16px 12px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:100;
}
.agent-avatar{
  width:48px;height:48px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  flex-shrink:0;
}
.agent-info{flex:1;}
.agent-name{font-size:16px;font-weight:800;color:white;}
.agent-status{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.notif-btns{display:flex;gap:8px;}
.notif-btn{
  position:relative;
  background:rgba(255,255,255,0.1);
  border:none;width:36px;height:36px;
  border-radius:10px;font-size:16px;cursor:pointer;
}
.notif-dot{
  position:absolute;top:-3px;right:-3px;
  background:var(--red);border-radius:50%;
  width:8px;height:8px;display:none;
}

/* ── 对话区 ── */
.chat-area{
  flex:1;
  padding:16px 14px 120px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* 消息气泡 */
.msg{display:flex;gap:8px;align-items:flex-end;}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{
  width:32px;height:32px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  background:rgba(0,150,199,0.1);
}
.msg.user .msg-avatar{background:rgba(200,160,32,0.1);}
.msg-bubble{
  max-width:75%;
  background:white;
  border-radius:18px 18px 18px 4px;
  padding:10px 14px;
  font-size:14px;
  color:var(--text);
  line-height:1.6;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.msg.user .msg-bubble{
  background:var(--accent);
  color:white;
  border-radius:18px 18px 4px 18px;
}

/* 打字动画 */
.typing-bubble{
  background:white;
  border-radius:18px 18px 18px 4px;
  padding:12px 16px;
  display:flex;gap:4px;align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.typing-dot{
  width:7px;height:7px;
  background:#ccc;border-radius:50%;
  animation:typingBounce 1s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:0.15s;}
.typing-dot:nth-child(3){animation-delay:0.3s;}
@keyframes typingBounce{
  0%,60%,100%{transform:translateY(0);}
  30%{transform:translateY(-6px);background:var(--accent);}
}

/* 选择卡片 */
.choice-cards{
  display:flex;flex-direction:column;gap:8px;
  margin-top:4px;
}
.choice-card{
  background:white;
  border:2px solid var(--border);
  border-radius:14px;
  padding:12px 16px;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;gap:10px;
}
.choice-card:active{transform:scale(0.98);}
.choice-card.selected{border-color:var(--accent);background:#f0f8ff;}
.choice-card-icon{font-size:22px;}
.choice-card-text h4{font-size:14px;font-weight:700;color:var(--text);}
.choice-card-text p{font-size:12px;color:var(--text2);margin-top:2px;}
.choice-card-price{margin-left:auto;font-size:16px;font-weight:900;color:var(--accent);}

/* 车型卡片 */
.vehicle-cards{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  margin-top:4px;
}
.vehicle-card{
  background:white;
  border:2px solid var(--border);
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  text-align:center;
  transition:all 0.2s;
}
.vehicle-card:active{transform:scale(0.97);}
.vehicle-card.selected{border-color:var(--accent);background:#f0f8ff;}
.vehicle-icon{font-size:28px;margin-bottom:4px;}
.vehicle-name{font-size:13px;font-weight:700;color:var(--text);}
.vehicle-cap{font-size:11px;color:var(--text2);margin:2px 0;}
.vehicle-price{font-size:16px;font-weight:900;color:var(--accent);}

/* 确认卡 */
.confirm-card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  margin-top:4px;
}
.confirm-title{
  font-size:15px;font-weight:900;color:var(--text);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.confirm-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;
  border-bottom:1px solid var(--border);
  font-size:13px;
}
.confirm-row:last-of-type{border:none;}
.confirm-label{color:var(--text2);width:60px;flex-shrink:0;}
.confirm-value{color:var(--text);font-weight:600;flex:1;}
.confirm-btns{display:flex;gap:8px;margin-top:14px;}
.confirm-btn{
  flex:1;padding:12px;border:none;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;
}
.confirm-btn.primary{background:var(--accent);color:white;}
.confirm-btn.secondary{background:var(--bg);color:var(--text2);}

/* 联系表单 */
.contact-form{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  margin-top:4px;
}
.form-title{font-size:15px;font-weight:900;color:var(--text);margin-bottom:14px;}
.form-field{margin-bottom:12px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;}
.form-input{
  width:100%;padding:11px 14px;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:10px;
  color:var(--text);font-size:14px;
  font-family:inherit;outline:none;
}
.form-input:focus{border-color:var(--accent);}

/* 支付选项 */
.pay-options{display:flex;gap:8px;margin-top:4px;}
.pay-opt{
  flex:1;padding:10px 6px;
  background:var(--bg);
  border:2px solid var(--border);
  border-radius:10px;
  text-align:center;
  font-size:12px;font-weight:700;
  color:var(--text2);cursor:pointer;
}
.pay-opt.selected{border-color:var(--accent);color:var(--accent);background:#f0f8ff;}

/* 提交按钮 */
.submit-btn{
  width:100%;margin-top:16px;
  padding:15px;
  background:linear-gradient(135deg,var(--accent),#0077b6);
  color:white;border:none;border-radius:14px;
  font-size:16px;font-weight:900;
  font-family:inherit;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,150,199,0.35);
}

/* ── 底部输入区 ── */
.input-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:white;
  border-top:1px solid var(--border);
  padding:10px 14px 20px;
  display:flex;gap:8px;align-items:center;
  z-index:100;
}
.chat-input{
  flex:1;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:22px;
  padding:10px 16px;
  font-size:14px;color:var(--text);
  font-family:inherit;outline:none;
}
.chat-input:focus{border-color:var(--accent);}
.send-btn{
  width:40px;height:40px;
  background:var(--accent);
  border:none;border-radius:50%;
  font-size:16px;cursor:pointer;
  flex-shrink:0;display:flex;
  align-items:center;justify-content:center;
  color:white;
}
.mic-btn{
  width:40px;height:40px;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:50%;
  font-size:18px;cursor:pointer;
  flex-shrink:0;
}
.mic-btn.recording{background:#fff0f0;border-color:var(--red);}

/* ── 成功弹窗 ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);z-index:999;
  align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:white;
  border-radius:28px 28px 0 0;
  padding:28px 24px 40px;
  width:100%;max-width:480px;
}
.modal-handle{
  width:40px;height:4px;background:#e0e0e0;
  border-radius:2px;margin:0 auto 20px;
}
</style>
</head>

<script>
// ── 配置 ──
const SUPA_URL = 'https://gxocvpmgfjvmmkkbswgo.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4b2N2cG1nZmp2bW1ra2Jzd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDc4NzAsImV4cCI6MjA5NTgyMzg3MH0.ExUNuOP8YyHQmItY6cdl1Euj7nOXqQq-rQT5-7aNerE';
const TENANT_ID = '00000000-0000-0000-0000-000000000001';

// ── 状态 ──
const S = {
  direction: null,
  address: null,
  date: null,
  time: null,
  vehicle: null,
  price: null,
  name: null,
  phone: null,
  wechat: null,
  payment: 'wechat',
  step: 'start'
};

const PRICES = { sedan:70, mpv:90, large_mpv:120, van:160 };
const VEHICLES = [
  {type:'sedan', icon:'🚗', name:'Sedan 轿车', cap:'1-3人', price:70},
  {type:'mpv', icon:'🚐', name:'MPV 商务车', cap:'4-6人', price:90},
  {type:'large_mpv', icon:'🚌', name:'大型MPV', cap:'7-9人', price:120},
  {type:'van', icon:'🚎', name:'Van 大巴', cap:'10人+', price:160},
];

// ── 工具 ──
const chatArea = document.getElementById('chat-area');

function scrollBottom(){
  setTimeout(()=>{ chatArea.scrollTop = chatArea.scrollHeight; }, 100);
}

function addMsg(html, isUser=false){
  const div = document.createElement('div');
  div.className = 'msg' + (isUser?' user':'');
  div.innerHTML = `
    <div class="msg-avatar">${isUser?'👤':'🧑‍✈️'}</div>
    <div class="msg-bubble">${html}</div>
  `;
  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function addTyping(){
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <div class="msg-avatar">🧑‍✈️</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function agentSay(html, delayMs=800){
  const typing = addTyping();
  await delay(delayMs);
  typing.remove();
  addMsg(html);
  speak(html.replace(/<[^>]*>/g,''));
}

// ── 语音输出 ──
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 1.0;
  window.speechSynthesis.speak(u);
}

// ── 语音输入 ──
let recognition = null;
let isRecording = false;

function toggleMic(){
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    alert('您的浏览器不支持语音输入，请使用Safari或Chrome');
    return;
  }
  if(isRecording){
    recognition?.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = ()=>{
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '🔴';
  };
  recognition.onresult = (e)=>{
    const text = e.results[0][0].transcript;
    document.getElementById('chat-input').value = text;
    sendMessage();
  };
  recognition.onend = ()=>{
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-btn').textContent = '🎤';
  };
  recognition.onerror = ()=>{
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-btn').textContent = '🎤';
  };
  recognition.start();
}

// ── 身份管理 ──
function genRef(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }
function savePassenger(name,phone,wechat){
  let p = JSON.parse(localStorage.getItem('au_passenger')||'{}');
  if(!p.ref) p.ref = genRef();
  p.name=name; p.phone=phone; p.wechat=wechat;
  localStorage.setItem('au_passenger', JSON.stringify(p));
  return p;
}
function getPassenger(){ return JSON.parse(localStorage.getItem('au_passenger')||'{}'); }
function getIncomingRef(){
  const u = new URLSearchParams(window.location.search);
  const r = u.get('ref');
  if(r) sessionStorage.setItem('incoming_ref',r);
  return sessionStorage.getItem('incoming_ref')||null;
}

// ── Supabase ──
async function supaInsert(table, data){
  const res = await fetch(SUPA_URL+'/rest/v1/'+table, {
    method:'POST',
    headers:{
      'apikey':SUPA_KEY,
      'Authorization':'Bearer '+SUPA_KEY,
      'Content-Type':'application/json',
      'Prefer':'return=representation'
    },
    body:JSON.stringify(data)
  });
  if(!res.ok){ const e=await res.json(); throw new Error(e.message||'error'); }
  return res.json();
}

// ── AI 对话历史 ──
let aiHistory = [];
let bookingSubmitted = false;

const SYSTEM_PROMPT = `你是澳洲出行管家"澳小墨"，专为华人旅客提供墨尔本机场接送服务。

你的任务是通过对话收集预约信息：接机还是送机、日期时间、地址。

价格（墨尔本机场25km内）：
- Sedan轿车：$70（1-3人）
- MPV商务车：$90（4-6人）
- 大型MPV：$120（7-9人）
- Van大巴：$160（10人+）

支付：微信、信用卡、银行转账

规则：
- 回答简短友好，用中文，适当emoji
- 不透露平台抽成
- 收集到接机/送机+地址+时间后，告诉用户"好的，我来给你选车型"

如果用户已经说了行程信息，在回复末尾加上JSON标记：
[EXTRACTED: {"direction":"from_airport或to_airport","date":"YYYY-MM-DD","time":"HH:MM","address":"地址"}]`;

// ── 发送消息 ──
async function sendMessage(){
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';

  addMsg(msg, true);
  aiHistory.push({role:'user', content:msg});

  const typing = addTyping();
  try {
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYSTEM_PROMPT, messages:aiHistory})
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '抱歉，请再说一遍 😊';
    aiHistory.push({role:'assistant', content:reply});
    if(aiHistory.length > 20) aiHistory = aiHistory.slice(-20);

    typing.remove();

    // 检查是否提取到行程信息
    const match = reply.match(/\[EXTRACTED:\s*({.*?})\]/s);
    if(match){
      try{
        const extracted = JSON.parse(match[1]);
        if(extracted.direction) S.direction = extracted.direction;
        if(extracted.date) S.date = extracted.date;
        if(extracted.time) S.time = extracted.time;
        if(extracted.address) S.address = extracted.address;
      } catch(e){}
      const cleanReply = reply.replace(/\[EXTRACTED:.*?\]/s,'').trim();
      addMsg(cleanReply);
      speak(cleanReply);
      // 如果信息够了，显示车型选择
      if(S.direction && S.date && S.time && S.address){
        await delay(800);
        showVehicleChoice();
      }
    } else {
      addMsg(reply);
      speak(reply);
    }
  } catch(e){
    typing.remove();
    addMsg('网络有点问题，请稍后再试 😅');
  }
}

      <div class="vehicle-cap">${v.cap}</div>
      <div class="vehicle-price">$${v.price}</div>
    </div>
  `).join('');
  chatArea.appendChild(div);
  scrollBottom();
}

function selectVehicle(type, price, el){
  document.querySelectorAll('.vehicle-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  S.vehicle = type;
  S.price = price;
  setTimeout(()=> showConfirm(), 400);
}

// ── 确认卡 ──
async function showConfirm(){
  await agentSay('好的！帮你确认一下行程信息 👇', 500);
  const dirText = S.direction==='from_airport'?'接机（机场出发）':'送机（去机场）';
  const vInfo = VEHICLES.find(v=>v.type===S.vehicle);
  const div = document.createElement('div');
  div.className = 'confirm-card';
  div.innerHTML = `
    <div class="confirm-title">📋 行程确认</div>
    <div class="confirm-row"><span class="confirm-label">类型</span><span class="confirm-value">${dirText}</span></div>
    <div class="confirm-row"><span class="confirm-label">时间</span><span class="confirm-value">${S.date} ${S.time}</span></div>
    <div class="confirm-row"><span class="confirm-label">${S.direction==='from_airport'?'目的地':'出发地'}</span><span class="confirm-value">${S.address}</span></div>
    <div class="confirm-row"><span class="confirm-label">车型</span><span class="confirm-value">${vInfo?.icon} ${vInfo?.name}</span></div>
    <div class="confirm-row"><span class="confirm-label">费用</span><span class="confirm-value" style="color:var(--accent);font-size:18px;font-weight:900;">$${S.price}</span></div>
    <div class="confirm-btns">
      <button class="confirm-btn secondary" onclick="restartBooking()">✏️ 修改</button>
      <button class="confirm-btn primary" onclick="showContactForm()">✅ 确认，去下单</button>
    </div>
  `;
  chatArea.appendChild(div);
  scrollBottom();
}

// ── 联系表单 ──
async function showContactForm(){
  // 检查是否有存储身份
  const saved = getPassenger();
  await agentSay('最后一步，填一下联系方式就搞定！😊', 400);

  const div = document.createElement('div');
  div.className = 'contact-form';
  div.innerHTML = `
    <div class="form-title">📱 联系方式 & 支付</div>
    <div class="form-field">
      <label class="form-label">你的称呼</label>
      <input class="form-input" id="f-name" placeholder="姓名或昵称" value="${saved.name||''}">
    </div>
    <div class="form-field">
      <label class="form-label">手机号</label>
      <input class="form-input" id="f-phone" type="tel" placeholder="+61 或 +86" value="${saved.phone||''}">
    </div>
    <div class="form-field">
      <label class="form-label">微信号（选填）</label>
      <input class="form-input" id="f-wechat" placeholder="微信ID" value="${saved.wechat||''}">
    </div>
    <div class="form-field">
      <label class="form-label">付款方式</label>
      <div class="pay-options">
        <div class="pay-opt selected" onclick="selPay(this,'wechat')">💚 微信</div>
        <div class="pay-opt" onclick="selPay(this,'cash')">💳 到车付</div>
        <div class="pay-opt" onclick="selPay(this,'bank_transfer')">🏦 转账</div>
      </div>
    </div>
    <button class="submit-btn" onclick="submitBooking()">🚀 确认预约 · $${S.price}</button>
  `;
  chatArea.appendChild(div);
  scrollBottom();
}

function selPay(el, val){
  document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  S.payment = val;
}

// ── 重新开始 ──
function restartBooking(){
  S.direction=null; S.address=null; S.date=null; S.time=null; S.vehicle=null; S.price=null;
  agentSay('没问题！告诉我你想修改什么？😊', 300);
}

// ── 提交下单 ──
async function submitBooking(){
  if(bookingSubmitted) return;
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if(!name||!phone){ alert('请填写姓名和手机号'); return; }
  bookingSubmitted = true;

  S.name=name; S.phone=phone;
  S.wechat = document.getElementById('f-wechat').value.trim();

  const passenger = savePassenger(name, phone, S.wechat);
  const incomingRef = getIncomingRef();
  const scheduledAt = new Date(`${S.date}T${S.time}:00`);
  const isUrgent = (scheduledAt - new Date()) / 60000 <= 90;
  const points = Math.round(S.price * 0.1) + 5;

  try {
    const [trip] = await supaInsert('trips',{
      tenant_id: TENANT_ID,
      passenger_name: name,
      passenger_phone: phone,
      passenger_wechat: S.wechat||null,
      direction: S.direction,
      pickup_address: S.direction==='from_airport'?'墨尔本国际机场':S.address,
      dropoff_address: S.direction==='from_airport'?S.address:'墨尔本国际机场',
      vehicle_type: S.vehicle,
      scheduled_at: `${S.date}T${S.time}:00`,
      total_price: S.price,
      payment_method: S.payment,
      payment_status: S.payment==='bank_transfer'?'pending':'prepaid',
      prepaid_amount: S.payment!=='bank_transfer'?S.price:null,
      status:'pending',
      is_urgent: isUrgent
    });

    // 存contacts
    try{
      await supaInsert('contacts',{
        tenant_id:TENANT_ID,
        full_name:name, phone:phone,
        wechat_id:S.wechat||null,
        source:'小红书', status:'customer'
      });
    }catch(e){}

    // 推荐关系
    if(incomingRef){
      try{
        await supaInsert('referrals',{
          tenant_id:TENANT_ID,
          referrer_code:incomingRef,
          referee_phone:phone,
          referee_name:name,
          trip_id:trip.id,
          points_awarded:20,
          status:'confirmed'
        });
      }catch(e){}
    }

    // 成功弹窗
    const shortId = trip.id.slice(-8).toUpperCase();
    document.getElementById('suc-id').textContent = 'TRP-'+shortId;
    document.getElementById('suc-pts').textContent = '+'+points;
    const shareUrl = window.location.origin+window.location.pathname+'?ref='+passenger.ref;
    document.getElementById('share-url').value = shareUrl;
    document.getElementById('success-modal').style.display = 'flex';

  } catch(e){
    bookingSubmitted = false;
    alert('提交遇到问题，请截图联系客服\n'+e.message);
  }
}

// ── 成功弹窗操作 ──
function copyShare(){
  const url = document.getElementById('share-url').value;
  if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>{
    document.getElementById('copy-btn').textContent='✅ 已复制';
    setTimeout(()=>document.getElementById('copy-btn').textContent='📋 复制',2000);
  });
}
