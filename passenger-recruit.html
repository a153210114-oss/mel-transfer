<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>司机端 · 澳洲机场接送</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f4f8;
  --surface:#ffffff;
  --border:#e0e8f0;
  --text:#1a3a5c;
  --text2:#7a90a8;
  --accent:#0096c7;
  --gold:#c8a020;
  --green:#27ae60;
  --red:#ff3b30;
}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  max-width:480px;
  margin:0 auto;
}

/* ── Agent头部 ── */
.agent-header{
  background:linear-gradient(135deg,#1a3a5c,#0d2540);
  padding:16px 16px 12px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:100;
}
.agent-avatar{
  width:48px;height:48px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  flex-shrink:0;
}
.agent-info{flex:1;}
.agent-name{font-size:16px;font-weight:800;color:white;}
.agent-status{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.notif-btns{display:flex;gap:8px;}
.notif-btn{
  position:relative;
  background:rgba(255,255,255,0.1);
  border:none;width:36px;height:36px;
  border-radius:10px;font-size:16px;cursor:pointer;
}
.notif-dot{
  position:absolute;top:-3px;right:-3px;
  background:var(--red);border-radius:50%;
  width:8px;height:8px;display:none;
}

/* ── 对话区 ── */
.chat-area{
  flex:1;
  padding:16px 14px 120px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* 消息气泡 */
.msg{display:flex;gap:8px;align-items:flex-end;}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{
  width:32px;height:32px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  background:rgba(0,150,199,0.1);
}
.msg.user .msg-avatar{background:rgba(200,160,32,0.1);}
.msg-bubble{
  max-width:75%;
  background:white;
  border-radius:18px 18px 18px 4px;
  padding:10px 14px;
  font-size:14px;
  color:var(--text);
  line-height:1.6;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.msg.user .msg-bubble{
  background:var(--accent);
  color:white;
  border-radius:18px 18px 4px 18px;
}

/* 打字动画 */
.typing-bubble{
  background:white;
  border-radius:18px 18px 18px 4px;
  padding:12px 16px;
  display:flex;gap:4px;align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.typing-dot{
  width:7px;height:7px;
  background:#ccc;border-radius:50%;
  animation:typingBounce 1s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:0.15s;}
.typing-dot:nth-child(3){animation-delay:0.3s;}
@keyframes typingBounce{
  0%,60%,100%{transform:translateY(0);}
  30%{transform:translateY(-6px);background:var(--accent);}
}

/* 选择卡片 */
.choice-cards{
  display:flex;flex-direction:column;gap:8px;
  margin-top:4px;
}
.choice-card{
  background:white;
  border:2px solid var(--border);
  border-radius:14px;
  padding:12px 16px;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;gap:10px;
}
.choice-card:active{transform:scale(0.98);}
.choice-card.selected{border-color:var(--accent);background:#f0f8ff;}
.choice-card-icon{font-size:22px;}
.choice-card-text h4{font-size:14px;font-weight:700;color:var(--text);}
.choice-card-text p{font-size:12px;color:var(--text2);margin-top:2px;}
.choice-card-price{margin-left:auto;font-size:16px;font-weight:900;color:var(--accent);}

/* 车型卡片 */
.vehicle-cards{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  margin-top:4px;
}
.vehicle-card{
  background:white;
  border:2px solid var(--border);
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  text-align:center;
  transition:all 0.2s;
}
.vehicle-card:active{transform:scale(0.97);}
.vehicle-card.selected{border-color:var(--accent);background:#f0f8ff;}
.vehicle-icon{font-size:28px;margin-bottom:4px;}
.vehicle-name{font-size:13px;font-weight:700;color:var(--text);}
.vehicle-cap{font-size:11px;color:var(--text2);margin:2px 0;}
.vehicle-price{font-size:16px;font-weight:900;color:var(--accent);}

/* 确认卡 */
.confirm-card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  margin-top:4px;
}
.confirm-title{
  font-size:15px;font-weight:900;color:var(--text);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.confirm-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;
  border-bottom:1px solid var(--border);
  font-size:13px;
}
.confirm-row:last-of-type{border:none;}
.confirm-label{color:var(--text2);width:60px;flex-shrink:0;}
.confirm-value{color:var(--text);font-weight:600;flex:1;}
.confirm-btns{display:flex;gap:8px;margin-top:14px;}
.confirm-btn{
  flex:1;padding:12px;border:none;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;
}
.confirm-btn.primary{background:var(--accent);color:white;}
.confirm-btn.secondary{background:var(--bg);color:var(--text2);}

/* 联系表单 */
.contact-form{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  margin-top:4px;
}
.form-title{font-size:15px;font-weight:900;color:var(--text);margin-bottom:14px;}
.form-field{margin-bottom:12px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;}
.form-input{
  width:100%;padding:11px 14px;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:10px;
  color:var(--text);font-size:14px;
  font-family:inherit;outline:none;
}
.form-input:focus{border-color:var(--accent);}

/* 支付选项 */
.pay-options{display:flex;gap:8px;margin-top:4px;}
.pay-opt{
  flex:1;padding:10px 6px;
  background:var(--bg);
  border:2px solid var(--border);
  border-radius:10px;
  text-align:center;
  font-size:12px;font-weight:700;
  color:var(--text2);cursor:pointer;
}
.pay-opt.selected{border-color:var(--accent);color:var(--accent);background:#f0f8ff;}

/* 提交按钮 */
.submit-btn{
  width:100%;margin-top:16px;
  padding:15px;
  background:linear-gradient(135deg,var(--accent),#0077b6);
  color:white;border:none;border-radius:14px;
  font-size:16px;font-weight:900;
  font-family:inherit;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,150,199,0.35);
}

/* ── 底部输入区 ── */
.input-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:white;
  border-top:1px solid var(--border);
  padding:10px 14px 20px;
  display:flex;gap:8px;align-items:center;
  z-index:100;
}
.chat-input{
  flex:1;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:22px;
  padding:10px 16px;
  font-size:14px;color:var(--text);
  font-family:inherit;outline:none;
}
.chat-input:focus{border-color:var(--accent);}
.send-btn{
  width:40px;height:40px;
  background:var(--accent);
  border:none;border-radius:50%;
  font-size:16px;cursor:pointer;
  flex-shrink:0;display:flex;
  align-items:center;justify-content:center;
  color:white;
}
.mic-btn{
  width:40px;height:40px;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:50%;
  font-size:18px;cursor:pointer;
  flex-shrink:0;
}
.mic-btn.recording{background:#fff0f0;border-color:var(--red);}

/* ── 成功弹窗 ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);z-index:999;
  align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:white;
  border-radius:28px 28px 0 0;
  padding:28px 24px 40px;
  width:100%;max-width:480px;
}
.modal-handle{
  width:40px;height:4px;background:#e0e0e0;
  border-radius:2px;margin:0 auto 20px;
}
</style>
</head>
<body>

<!-- ── 全屏入场动画 ── -->
<div id="splash" style="position:fixed;inset:0;background:linear-gradient(135deg,#1a3a5c,#0d2540);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;">
  
  <!-- 背景光晕 -->
  <div style="position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(0,150,199,0.3),transparent);border-radius:50%;animation:haloExpand 2s ease-out 0.5s forwards;opacity:0;"></div>
  
  <!-- 全身跑步机器人 -->
  <div id="splash-agent" style="position:absolute;top:15%;right:-200px;animation:agentRunIn 1.2s cubic-bezier(0.22,0.61,0.36,1) 0.2s forwards;">
    
    <!-- 牌子 -->
    <div style="position:absolute;top:-50px;right:-70px;animation:signWave 0.3s ease-in-out infinite alternate;">
      <div style="background:white;border:2px solid #c8a020;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:900;color:#1a3a5c;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.2);">
        👋 澳洲出行管家
      </div>
      <div style="width:3px;height:30px;background:#8a6020;margin:0 auto;"></div>
    </div>

    <!-- 身体容器（整体跑步抖动） -->
    <div style="animation:bodyBob 0.2s ease-in-out infinite alternate;position:relative;">
      
      <!-- 头部 -->
      <div style="width:48px;height:48px;background:radial-gradient(circle at 40% 60%,#fde8c8,#f5c98a);border-radius:50%;position:relative;margin:0 auto;">
        <!-- 帽子 -->
        <div style="position:absolute;top:-18px;left:50%;transform:translateX(-50%) rotate(-8deg);width:56px;">
          <div style="width:36px;height:20px;background:#1a3a5c;border-radius:5px 5px 0 0;margin:0 auto;position:relative;">
            <div style="position:absolute;bottom:3px;left:0;right:0;height:3px;background:#c8a020;"></div>
            <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:7px;color:#c8a020;font-weight:900;">AU</div>
          </div>
          <div style="width:56px;height:7px;background:#1a3a5c;border-radius:3px;margin-top:-1px;"></div>
        </div>
        <!-- 眼睛 -->
        <div style="position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;">
          <div style="width:6px;height:7px;background:#2a1a0a;border-radius:50%;"></div>
          <div style="width:6px;height:7px;background:#2a1a0a;border-radius:50%;"></div>
        </div>
        <!-- 미소 -->
        <div style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:16px;height:7px;border-bottom:2.5px solid #c87050;border-radius:0 0 10px 10px;"></div>
      </div>

      <!-- 身体 -->
      <div style="width:50px;height:50px;background:linear-gradient(180deg,#1a3a5c,#0f2540);border-radius:7px 7px 3px 3px;margin:2px auto 0;position:relative;">
        <div style="position:absolute;top:6px;left:50%;transform:translateX(-50%);width:7px;height:18px;background:#c8a020;clip-path:polygon(20% 0%,80% 0%,100% 70%,50% 100%,0% 70%);"></div>
      </div>

      <!-- 左臂（前摆） -->
      <div style="position:absolute;top:52px;left:-6px;width:13px;height:36px;background:#1a3a5c;border-radius:6px;transform-origin:top center;animation:armFwd 0.2s ease-in-out infinite alternate;">
        <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:11px;height:11px;background:#f5c98a;border-radius:50%;"></div>
      </div>
      <!-- 右臂（后摆，举牌） -->
      <div style="position:absolute;top:48px;right:-10px;width:13px;height:36px;background:#1a3a5c;border-radius:6px;transform-origin:top center;transform:rotate(-70deg);">
        <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:11px;height:11px;background:#f5c98a;border-radius:50%;"></div>
      </div>

      <!-- 腿容器 -->
      <div style="display:flex;gap:5px;justify-content:center;margin-top:2px;">
        <!-- 左腿（前迈） -->
        <div style="width:13px;height:32px;background:#2a4a70;border-radius:6px;transform-origin:top center;animation:legFwd 0.2s ease-in-out infinite alternate;position:relative;">
          <div style="position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:17px;height:7px;background:#1a1a2e;border-radius:3px 5px 3px 3px;"></div>
        </div>
        <!-- 右腿（后蹬） -->
        <div style="width:13px;height:32px;background:#2a4a70;border-radius:6px;transform-origin:top center;animation:legBack 0.2s ease-in-out infinite alternate;position:relative;">
          <div style="position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:17px;height:7px;background:#1a1a2e;border-radius:3px 5px 3px 3px;"></div>
        </div>
      </div>

      <!-- 脚下气流 -->
      <div style="position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:flex-end;">
        <div style="width:18px;height:3px;background:rgba(255,255,255,0.6);border-radius:2px;animation:airLine 0.2s ease-in-out infinite alternate;"></div>
        <div style="width:28px;height:2px;background:rgba(255,255,255,0.4);border-radius:2px;animation:airLine 0.2s ease-in-out 0.05s infinite alternate;"></div>
        <div style="width:20px;height:3px;background:rgba(255,255,255,0.5);border-radius:2px;animation:airLine 0.2s ease-in-out 0.1s infinite alternate;"></div>
      </div>

    </div>
  </div>

  <!-- 欢迎文字 -->
  <div id="splash-text" style="text-align:center;opacity:0;position:absolute;bottom:30%;animation:textFadeIn 0.6s ease 1.6s forwards;">
    <div style="font-size:28px;font-weight:900;color:white;margin-bottom:8px;">澳洲出行管家</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.6);">华人服务华人 · 安心出行每一程</div>
  </div>

  <!-- 选择管家性别 -->
  <div id="agent-choice" style="display:none;position:absolute;inset:0;background:linear-gradient(135deg,#1a3a5c,#0d2540);flex-direction:column;align-items:center;justify-content:center;padding:30px;">
    <div style="font-size:22px;font-weight:900;color:white;margin-bottom:8px;">选择你的专属管家</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:36px;">全程陪伴，随时为你服务</div>
    <div style="display:flex;gap:20px;width:100%;max-width:320px;">
      <!-- 男生 -->
      <div onclick="chooseAgent('male')" style="flex:1;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:22px;padding:28px 16px;text-align:center;cursor:pointer;transition:all 0.2s;" 
        onmouseover="this.style.borderColor='#0096c7'" onmouseout="this.style.borderColor='rgba(255,255,255,0.15)'">
        <div style="font-size:56px;margin-bottom:12px;">🧑‍✈️</div>
        <div style="font-size:18px;font-weight:900;color:white;margin-bottom:4px;">小墨</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.5);">男生 · 稳重专业</div>
        <div style="margin-top:14px;background:#0096c7;color:white;border-radius:10px;padding:8px;font-size:13px;font-weight:700;">选我</div>
      </div>
      <!-- 女生 -->
      <div onclick="chooseAgent('female')" style="flex:1;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:22px;padding:28px 16px;text-align:center;cursor:pointer;transition:all 0.2s;"
        onmouseover="this.style.borderColor='#e8a0c8'" onmouseout="this.style.borderColor='rgba(255,255,255,0.15)'">
        <div style="font-size:56px;margin-bottom:12px;">👩‍✈️</div>
        <div style="font-size:18px;font-weight:900;color:white;margin-bottom:4px;">小本</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.5);">女生 · 温柔专业</div>
        <div style="margin-top:14px;background:#c060a0;color:white;border-radius:10px;padding:8px;font-size:13px;font-weight:700;">选我</div>
      </div>
    </div>
  </div>

  <!-- 进度条 -->
  <div style="position:absolute;bottom:15%;width:60%;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;">
    <div style="height:100%;background:rgba(0,150,199,0.8);border-radius:2px;animation:loadBar 1.8s ease 0.5s forwards;width:0%;"></div>
  </div>
</div>

<style>
@keyframes agentRunIn {
  0%   { right:-200px; top:15%; transform:scale(0.25); }
  60%  { right:calc(50% - 40px); top:35%; transform:scale(1.08); }
  75%  { right:calc(50% - 40px); top:35%; transform:scale(0.96); }
  88%  { right:calc(50% - 40px); top:35%; transform:scale(1.02); }
  100% { right:calc(50% - 40px); top:35%; transform:scale(1.0); }
}
@keyframes bodyBob {
  from { transform: translateY(0) rotate(-1.5deg); }
  to   { transform: translateY(-7px) rotate(1.5deg); }
}
@keyframes armFwd {
  from { transform: rotate(-30deg); }
  to   { transform: rotate(20deg); }
}
@keyframes legFwd {
  from { transform: rotate(-25deg); }
  to   { transform: rotate(15deg); }
}
@keyframes legBack {
  from { transform: rotate(15deg); }
  to   { transform: rotate(-25deg); }
}
@keyframes airLine {
  from { transform: translateX(0); opacity:0.8; }
  to   { transform: translateX(-8px); opacity:0.2; }
}
@keyframes signWave {
  from { transform: rotate(-5deg); }
  to   { transform: rotate(5deg); }
}
@keyframes haloExpand {
  0%   { opacity:0; transform:scale(0.5); }
  50%  { opacity:1; }
  100% { opacity:0; transform:scale(2); }
}
@keyframes textFadeIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes loadBar {
  from { width:0%; }
  to   { width:100%; }
}
@keyframes splashFade {
  from { opacity:1; }
  to   { opacity:0; pointer-events:none; }
}
</style>

<!-- Agent头部 -->
<div class="agent-header">
  <div class="agent-avatar" id="agent-avatar">🧑‍✈️</div>
  <div class="agent-info">
    <div class="agent-name" id="agent-name">澳小墨</div>
    <div class="agent-status" id="agent-status">墨尔本机场接送专家 · 在线</div>
  </div>
  <div class="notif-btns">
    <button class="notif-btn" onclick="openNotif()" style="width:auto;padding:4px 10px;border-radius:10px;display:flex;flex-direction:column;align-items:center;">
      <span>🔔</span><span style="font-size:9px;color:rgba(255,255,255,0.6);">通知</span>
      <div class="notif-dot" id="notif-dot"></div>
    </button>
    <button class="notif-btn" onclick="openAnnounce()" style="width:auto;padding:4px 10px;border-radius:10px;display:flex;flex-direction:column;align-items:center;">
      <span>📣</span><span style="font-size:9px;color:rgba(255,255,255,0.6);">公告</span>
      <div class="notif-dot" id="announce-dot"></div>
    </button>
  </div>
</div>

<!-- 对话区 -->
<div class="chat-area" id="chat-area"></div>

<!-- 底部输入 -->
<div class="input-bar">
  <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
  <input class="chat-input" id="chat-input" placeholder="输入或语音告诉我行程..."
    onkeydown="if(event.key==='Enter')sendMessage()">
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<!-- 成功弹窗 -->
<div class="modal-overlay" id="success-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="text-align:center;font-size:52px;margin-bottom:10px;">🎉</div>

function addMsg(html, isUser=false){

function addTyping(){

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function agentSay(html, delayMs=800){
  const typing = addTyping();
  await delay(delayMs);
  typing.remove();
  addMsg(html);
  speak(html.replace(/<[^>]*>/g,''));
}

// ── 语音输出 ──
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  // 清理文字：去HTML标签、emoji、特殊符号
  const clean = text
    .replace(/<[^>]*>/g, '')
    .replace(/[\uD800-\uDFFF]{2}/g, '')
    .replace(/[\u2600-\u27BF]/g, '')
    .replace(/[·•→←]/g, '')
    .replace(/\s+/g, ' ').trim();
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = 'zh-CN';
  u.rate = currentAgent?.rate || 1.0;
  u.pitch = currentAgent?.pitch || 1.0;
  // 尝试选择对应性别的声音
  const voices = window.speechSynthesis.getVoices();
  const zhVoices = voices.filter(v=>v.lang.startsWith('zh'));
  if(zhVoices.length > 0){
    const gender = localStorage.getItem('au_agent')||'male';
    // 女声一般name里有female/女，男声默认第一个
    const preferred = gender==='female'
      ? zhVoices.find(v=>/female|女/i.test(v.name)) || zhVoices[zhVoices.length-1]
      : zhVoices[0];
    if(preferred) u.voice = preferred;
  }
  window.speechSynthesis.speak(u);
}

// ── 语音输入 ──
let recognition = null;
let isRecording = false;

function toggleMic(){
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    alert('您的浏览器不支持语音输入，请使用Safari或Chrome');
    return;
  }
  if(isRecording){
    recognition?.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = ()=>{
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '🔴';
  };
  recognition.onresult = (e)=>{
    const text = e.results[0][0].transcript;
    document.getElementById('chat-input').value = text;
    sendMessage();
  };
  recognition.onend = ()=>{
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-btn').textContent = '🎤';
  };
  recognition.onerror = ()=>{
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-btn').textContent = '🎤';
  };
  recognition.start();
}

// ── Supabase ──
async function supaInsert(table, data){
  const res = await fetch(SUPA_URL+'/rest/v1/'+table, {
    method:'POST',
    headers:{
      'apikey':SUPA_KEY,
      'Authorization':'Bearer '+SUPA_KEY,
      'Content-Type':'application/json',
      'Prefer':'return=representation'
    },
    body:JSON.stringify(data)
  });
  if(!res.ok){ const e=await res.json(); throw new Error(e.message||'error'); }
  return res.json();
}

// ── AI 对话历史 ──
let aiHistory = [];
let bookingSubmitted = false;

const SYSTEM_PROMPT = `你是澳洲出行管家"澳小墨"，专为华人旅客提供墨尔本机场接送服务。

你的任务是通过对话收集预约信息：接机还是送机、日期时间、地址。

价格（墨尔本机场25km内）：
- Sedan轿车：$70（1-3人）
- MPV商务车：$90（4-6人）
- 大型MPV：$120（7-9人）
- Van大巴：$160（10人+）

支付：微信、信用卡、银行转账

规则：
- 回答简短友好，用中文，适当emoji
- 不透露平台抽成
- 收集到接机/送机+地址+时间后，告诉用户"好的，我来给你选车型"

如果用户已经说了行程信息，在回复末尾加上JSON标记：
[EXTRACTED: {"direction":"from_airport或to_airport","date":"YYYY-MM-DD","time":"HH:MM","address":"地址"}]`;

// ── 发送消息 ──
async function sendMessage(){
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';

  addMsg(msg, true);
  aiHistory.push({role:'user', content:msg});

  const typing = addTyping();
  try {
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYSTEM_PROMPT, messages:aiHistory})
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '抱歉，请再说一遍 😊';
    aiHistory.push({role:'assistant', content:reply});
    if(aiHistory.length > 20) aiHistory = aiHistory.slice(-20);

    typing.remove();

    // 检查是否提取到行程信息
    const match = reply.match(/\[EXTRACTED:\s*({.*?})\]/s);
    if(match){
      try{
        const extracted = JSON.parse(match[1]);
        if(extracted.direction) S.direction = extracted.direction;
        if(extracted.date) S.date = extracted.date;
        if(extracted.time) S.time = extracted.time;
        if(extracted.address) S.address = extracted.address;
      } catch(e){}
      const cleanReply = reply.replace(/\[EXTRACTED:.*?\]/s,'').trim();
      addMsg(cleanReply);
      speak(cleanReply);
      // 如果信息够了，显示车型选择
      if(S.direction && S.date && S.time && S.address){
        await delay(800);
        showVehicleChoice();
      }
    } else {
      addMsg(reply);
      speak(reply);
    }
  } catch(e){
    typing.remove();
    addMsg('网络有点问题，请稍后再试 😅');
  }
}

// ── 提交下单 ──
async function submitBooking(){
  if(bookingSubmitted) return;
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if(!name||!phone){ alert('请填写姓名和手机号'); return; }
  bookingSubmitted = true;

  S.name=name; S.phone=phone;
  S.wechat = document.getElementById('f-wechat').value.trim();

  const passenger = savePassenger(name, phone, S.wechat);
  const incomingRef = getIncomingRef();
  const scheduledAt = new Date(`${S.date}T${S.time}:00`);
  const isUrgent = (scheduledAt - new Date()) / 60000 <= 90;
  const points = Math.round(S.price * 0.1) + 5;

  try {
    const [trip] = await supaInsert('trips',{
      tenant_id: TENANT_ID,
      passenger_name: name,
      passenger_phone: phone,
      passenger_wechat: S.wechat||null,
      direction: S.direction,
      pickup_address: S.direction==='from_airport'?'墨尔本国际机场':S.address,
      dropoff_address: S.direction==='from_airport'?S.address:'墨尔本国际机场',
      vehicle_type: S.vehicle,
      scheduled_at: `${S.date}T${S.time}:00`,
      total_price: S.price,
      payment_method: S.payment,
      payment_status: S.payment==='bank_transfer'?'pending':'prepaid',
      prepaid_amount: S.payment!=='bank_transfer'?S.price:null,
      status:'pending',
      is_urgent: isUrgent
    });

    // 存contacts
    try{
      await supaInsert('contacts',{
        tenant_id:TENANT_ID,
        full_name:name, phone:phone,
        wechat_id:S.wechat||null,
        source:'小红书', status:'customer'
      });
    }catch(e){}

    // 推荐关系
    if(incomingRef){
      try{
        await supaInsert('referrals',{
          tenant_id:TENANT_ID,
          referrer_code:incomingRef,
          referee_phone:phone,
          referee_name:name,
          trip_id:trip.id,
          points_awarded:20,
          status:'confirmed'
        });
      }catch(e){}
    }

    // 成功弹窗
    const shortId = trip.id.slice(-8).toUpperCase();
    document.getElementById('suc-id').textContent = 'TRP-'+shortId;
    document.getElementById('suc-pts').textContent = '+'+points;
    const shareUrl = window.location.origin+window.location.pathname+'?ref='+passenger.ref;
    document.getElementById('share-url').value = shareUrl;
    document.getElementById('success-modal').style.display = 'flex';

  } catch(e){
    bookingSubmitted = false;
    alert('提交遇到问题，请截图联系客服\n'+e.message);
  }
}
