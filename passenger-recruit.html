<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>澳洲出行管家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f4f8;--surface:#ffffff;--border:#e0e8f0;
  --text:#1a3a5c;--text2:#7a90a8;--accent:#0096c7;
  --gold:#c8a020;--green:#27ae60;--red:#ff3b30;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.agent-header{background:linear-gradient(135deg,#1a3a5c,#0d2540);padding:16px 16px 12px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.agent-avatar{width:48px;height:48px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.agent-info{flex:1;}
.agent-name{font-size:16px;font-weight:800;color:white;}
.agent-status{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.notif-btns{display:flex;gap:8px;}
.notif-btn{position:relative;background:rgba(255,255,255,0.1);border:none;border-radius:10px;font-size:16px;cursor:pointer;padding:4px 10px;display:flex;flex-direction:column;align-items:center;}
.notif-dot{position:absolute;top:-3px;right:-3px;background:var(--red);border-radius:50%;width:8px;height:8px;display:none;}
.chat-area{flex:1;padding:16px 14px 120px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.msg{display:flex;gap:8px;align-items:flex-end;}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:rgba(0,150,199,0.1);}
.msg.user .msg-avatar{background:rgba(200,160,32,0.1);}
.msg-bubble{max-width:75%;background:white;border-radius:18px 18px 18px 4px;padding:10px 14px;font-size:14px;color:var(--text);line-height:1.6;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.msg.user .msg-bubble{background:var(--accent);color:white;border-radius:18px 18px 4px 18px;}
.typing-bubble{background:white;border-radius:18px 18px 18px 4px;padding:12px 16px;display:flex;gap:4px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.typing-dot{width:7px;height:7px;background:#ccc;border-radius:50%;animation:typingBounce 1s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:0.15s;}
.typing-dot:nth-child(3){animation-delay:0.3s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);background:var(--accent);}}
.vehicle-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.vehicle-card{background:white;border:2px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;text-align:center;transition:all 0.2s;}
.vehicle-card:active{transform:scale(0.97);}
.vehicle-card.selected{border-color:var(--accent);background:#f0f8ff;}
.vehicle-icon{font-size:28px;margin-bottom:4px;}
.vehicle-name{font-size:13px;font-weight:700;color:var(--text);}
.vehicle-cap{font-size:11px;color:var(--text2);margin:2px 0;}
.vehicle-price{font-size:16px;font-weight:900;color:var(--accent);}
.confirm-card{background:white;border-radius:18px;padding:18px;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-top:4px;}
.confirm-title{font-size:15px;font-weight:900;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.confirm-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.confirm-row:last-of-type{border:none;}
.confirm-label{color:var(--text2);width:60px;flex-shrink:0;}
.confirm-value{color:var(--text);font-weight:600;flex:1;}
.confirm-btns{display:flex;gap:8px;margin-top:14px;}
.confirm-btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.confirm-btn.primary{background:var(--accent);color:white;}
.confirm-btn.secondary{background:var(--bg);color:var(--text2);}
.contact-form{background:white;border-radius:18px;padding:18px;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-top:4px;}
.form-title{font-size:15px;font-weight:900;color:var(--text);margin-bottom:14px;}
.form-field{margin-bottom:12px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;}
.form-input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.form-input:focus{border-color:var(--accent);}
.pay-options{display:flex;gap:8px;margin-top:4px;}
.pay-opt{flex:1;padding:10px 6px;background:var(--bg);border:2px solid var(--border);border-radius:10px;text-align:center;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;}
.pay-opt.selected{border-color:var(--accent);color:var(--accent);background:#f0f8ff;}
.submit-btn{width:100%;margin-top:16px;padding:15px;background:linear-gradient(135deg,var(--accent),#0077b6);color:white;border:none;border-radius:14px;font-size:16px;font-weight:900;font-family:inherit;cursor:pointer;box-shadow:0 6px 20px rgba(0,150,199,0.35);}
.input-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid var(--border);padding:10px 14px 20px;display:flex;gap:8px;align-items:center;z-index:100;}
.chat-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:22px;padding:10px 16px;font-size:14px;color:var(--text);font-family:inherit;outline:none;}
.chat-input:focus{border-color:var(--accent);}
.send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:50%;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:white;}
.mic-btn{width:40px;height:40px;background:var(--bg);border:1.5px solid var(--border);border-radius:50%;font-size:18px;cursor:pointer;flex-shrink:0;}
.mic-btn.recording{background:#fff0f0;border-color:var(--red);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;align-items:flex-end;justify-content:center;}
.modal-sheet{background:white;border-radius:28px 28px 0 0;padding:28px 24px 40px;width:100%;max-width:480px;}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 20px;}
</style>
</head>
<body>

<!-- 全屏入场动画 -->
<div id="splash" style="position:fixed;inset:0;background:linear-gradient(135deg,#1a3a5c,#0d2540);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;">

        </div>
        <div style="position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;">
          <div style="width:6px;height:7px;background:#2a1a0a;border-radius:50%;"></div>
          <div style="width:6px;height:7px;background:#2a1a0a;border-radius:50%;"></div>
        </div>
        <div style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:16px;height:7px;border-bottom:2.5px solid #c87050;border-radius:0 0 10px 10px;"></div>

          <div style="position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:17px;height:7px;background:#1a1a2e;border-radius:3px 5px 3px 3px;"></div>
        </div>
        <div style="width:13px;height:32px;background:#2a4a70;border-radius:6px;transform-origin:top center;animation:legBack 0.2s ease-in-out infinite alternate;position:relative;">
          <div style="position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:17px;height:7px;background:#1a1a2e;border-radius:3px 5px 3px 3px;"></div>
        </div>
      </div>
      <div style="position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:flex-end;">
        <div style="width:18px;height:3px;background:rgba(255,255,255,0.6);border-radius:2px;animation:airLine 0.2s ease-in-out infinite alternate;"></div>
        <div style="width:28px;height:2px;background:rgba(255,255,255,0.4);border-radius:2px;animation:airLine 0.2s ease-in-out 0.05s infinite alternate;"></div>
        <div style="width:20px;height:3px;background:rgba(255,255,255,0.5);border-radius:2px;animation:airLine 0.2s ease-in-out 0.1s infinite alternate;"></div>
      </div>
    </div>
  </div>
  <div id="splash-text" style="text-align:center;opacity:0;position:absolute;bottom:30%;animation:textFadeIn 0.6s ease 1.6s forwards;">
    <div style="font-size:28px;font-weight:900;color:white;margin-bottom:8px;">澳洲出行管家</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.6);">华人服务华人 · 安心出行每一程</div>
  </div>
  <div id="agent-choice" style="display:none;position:absolute;inset:0;background:linear-gradient(135deg,#1a3a5c,#0d2540);flex-direction:column;align-items:center;justify-content:center;padding:30px;">
    <div style="font-size:22px;font-weight:900;color:white;margin-bottom:8px;">选择你的专属管家</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:36px;">全程陪伴，随时为你服务</div>
    <div style="display:flex;gap:20px;width:100%;max-width:320px;">
      <div onclick="chooseAgent('male')" style="flex:1;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:22px;padding:28px 16px;text-align:center;cursor:pointer;">
        <div style="font-size:56px;margin-bottom:12px;">🧑‍✈️</div>
        <div style="font-size:18px;font-weight:900;color:white;margin-bottom:4px;">小墨</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.5);">男生 · 稳重专业</div>

<style>
@keyframes agentRunIn{0%{right:-200px;top:15%;transform:scale(0.25);}60%{right:calc(50% - 40px);top:35%;transform:scale(1.08);}75%{right:calc(50% - 40px);top:35%;transform:scale(0.96);}88%{right:calc(50% - 40px);top:35%;transform:scale(1.02);}100%{right:calc(50% - 40px);top:35%;transform:scale(1.0);}}
@keyframes bodyBob{from{transform:translateY(0) rotate(-1.5deg);}to{transform:translateY(-7px) rotate(1.5deg);}}
@keyframes armFwd{from{transform:rotate(-30deg);}to{transform:rotate(20deg);}}
@keyframes legFwd{from{transform:rotate(-25deg);}to{transform:rotate(15deg);}}
@keyframes legBack{from{transform:rotate(15deg);}to{transform:rotate(-25deg);}}
@keyframes airLine{from{transform:translateX(0);opacity:0.8;}to{transform:translateX(-8px);opacity:0.2;}}
@keyframes signWave{from{transform:rotate(-5deg);}to{transform:rotate(5deg);}}
@keyframes haloExpand{0%{opacity:0;transform:scale(0.5);}50%{opacity:1;}100%{opacity:0;transform:scale(2);}}
@keyframes textFadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes loadBar{from{width:0%;}to{width:100%;}}
@keyframes splashFade{from{opacity:1;}to{opacity:0;pointer-events:none;}}
</style>

<!-- Agent头部 -->
<div class="agent-header">
  <div class="agent-avatar" id="agent-avatar">🧑‍✈️</div>
  <div class="agent-info">
    <div class="agent-name" id="agent-name">澳小墨</div>

  <div class="notif-btns">

</div>

</div>

    <div style="background:#f0f7ff;border-radius:14px;padding:14px;margin-bottom:12px;">

</div>

<script>

const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4b2N2cG1nZmp2bW1ra2Jzd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDc4NzAsImV4cCI6MjA5NTgyMzg3MH0.ExUNuOP8YyHQmItY6cdl1Euj7nOXqQq-rQT5-7aNerE';

const S = {direction:null,address:null,date:null,time:null,vehicle:null,price:null,name:null,phone:null,wechat:null,payment:'wechat',trip_type:'standard',wait_hours:0};
const VEHICLES = [
  {type:'sedan',icon:'🚗',name:'Sedan 轿车',cap:'1-3人',price:70},
  {type:'mpv',icon:'🚐',name:'MPV 商务车',cap:'4-6人',price:90},
  {type:'large_mpv',icon:'🚌',name:'大型MPV',cap:'7-9人',price:120},
  {type:'van',icon:'🚎',name:'Van 大巴',cap:'10人+',price:160},
];

const chatArea = document.getElementById('chat-area');
function scrollBottom(){ setTimeout(()=>{ chatArea.scrollTop=chatArea.scrollHeight; },100); }

function addMsg(html, isUser=false){
  const div = document.createElement('div');
  div.className = 'msg'+(isUser?' user':'');
  div.innerHTML = `<div class="msg-avatar">${isUser?'👤':'🧑‍✈️'}</div><div class="msg-bubble">${html}</div>`;
  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function addTyping(){
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<div class="msg-avatar">🧑‍✈️</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function agentSay(html, ms=800){
  const t = addTyping();
  await delay(ms);
  t.remove();
  addMsg(html);
  speak(html);
}

// ── 语音输出 ──
let currentAgent = null;
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const clean = text
    .replace(/<[^>]*>/g,'')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/[\u2600-\u27BF]/g,'')
    .replace(/[^\u0000-\u007F\u4E00-\u9FFF\u3000-\u303F\uFF00-\uFFEF\s]/g,'')
    .replace(/[·•→←\-：:\[\]【】\/\\]/g,' ')
    .replace(/\s+/g,' ').trim();
  if(!clean) return;
  const u = new SpeechSynthesisUtterance(clean);
  u.lang='zh-CN';
  u.rate = currentAgent?.rate||1.0;
  u.pitch = currentAgent?.pitch||1.0;
  const voices = window.speechSynthesis.getVoices();
  const zhVoices = voices.filter(v=>v.lang.startsWith('zh'));
  if(zhVoices.length>0){
    const g = localStorage.getItem('au_agent')||'male';
    const v = g==='female'
      ? (zhVoices.find(v=>/female|女/i.test(v.name))||zhVoices[zhVoices.length-1])
      : zhVoices[0];
    if(v) u.voice=v;
  }
  window.speechSynthesis.speak(u);
}

// ── 语音输入 ──
let recognition=null, isRecording=false;
function toggleMic(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    alert('请使用Safari或Chrome'); return;
  }
  if(isRecording){ recognition?.stop(); return; }
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang='zh-CN'; recognition.continuous=false; recognition.interimResults=false;
  recognition.onstart=()=>{ isRecording=true; document.getElementById('mic-btn').classList.add('recording'); document.getElementById('mic-btn').textContent='🔴'; };
  recognition.onresult=(e)=>{ document.getElementById('chat-input').value=e.results[0][0].transcript; sendMessage(); };
  recognition.onend=()=>{ isRecording=false; document.getElementById('mic-btn').classList.remove('recording'); document.getElementById('mic-btn').textContent='🎤'; };
  recognition.onerror=()=>{ isRecording=false; document.getElementById('mic-btn').classList.remove('recording'); document.getElementById('mic-btn').textContent='🎤'; };
  recognition.start();
}

// ── 身份 & 地址记忆 ──
function genRef(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }
function savePassenger(name,phone,wechat){
  let p=JSON.parse(localStorage.getItem('au_passenger')||'{}');
  if(!p.ref) p.ref=genRef();
  p.name=name; p.phone=phone; p.wechat=wechat;
  localStorage.setItem('au_passenger',JSON.stringify(p));
  return p;
}
function saveAddress(addr){
  if(!addr) return;
  let a=JSON.parse(localStorage.getItem('au_addresses')||'[]');
  a=a.filter(x=>x!==addr); a.unshift(addr); a=a.slice(0,3);
  localStorage.setItem('au_addresses',JSON.stringify(a));
}
function getSavedAddresses(){ return JSON.parse(localStorage.getItem('au_addresses')||'[]'); }
function getPassenger(){ return JSON.parse(localStorage.getItem('au_passenger')||'{}'); }
function getIncomingRef(){
  const r=new URLSearchParams(window.location.search).get('ref');
  if(r) sessionStorage.setItem('incoming_ref',r);
  return sessionStorage.getItem('incoming_ref')||null;
}

// ── Supabase ──
async function supaInsert(table,data){
  const res=await fetch(SUPA_URL+'/rest/v1/'+table,{
    method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!res.ok){ const e=await res.json(); throw new Error(e.message||'error'); }
  return res.json();
}

// ── AI 对话 ──
let aiHistory=[], bookingSubmitted=false;

function buildSystemPrompt(){
  const saved = getPassenger();
  const addrs = getSavedAddresses();
  const yr = new Date().getFullYear();
  let prompt = `你是澳洲出行管家，专为华人旅客提供墨尔本机场接送服务。回答简短友好，用中文，适当emoji，不透露平台抽成。今年是${yr}年，所有日期都用${yr}年。

任务：通过对话收集完整预约信息后显示车型选择。需要收集：订单类型、日期、时间、地址。

【三种订单类型】
1. 接机（from_airport）：乘客从机场出来，司机接到目的地
2. 送机（to_airport）：司机从出发地送乘客去机场
3. 陪同接机（accompanied）：主人需要司机陪同去机场接客人，再一起回家。此类型需额外收集：预计等候几小时（通常2-4小时）

【时间确认规则】
送机：若乘客说的是起飞时间，必须问"需要司机几点到您门口？建议起飞前2小时"。记录司机到达时间。
接机：若乘客说的是落地时间，必须问"过海关取行李需要时间，预计几点出来上车？通常落地后40-60分钟"。记录上车时间。
陪同接机：问"您几点出发去机场？客人大概几点落地？预计需要等候几小时？"记录出发时间和等候时长。

价格（墨尔本机场25km内）：Sedan $70（1-3人）、MPV $90（4-6人）、大型MPV $120（7-9人）、Van $160（10人+）。陪同接机额外收等候费：$20/小时
支付：微信、到车付款、银行转账

收集到所有信息（方向+日期+司机到达/上车时间+地址）后，说"好的信息齐了！帮你看看车型 🚗"`;

  if(saved.name) prompt += '\n\n当前用户：'+saved.name+'。称呼时用"'+saved.name+'主人"，体现尊重和专业感。';
  if(addrs.length>0) prompt += `\n用户常用地址：${addrs[0]}。若用户说"回家""老地址""上次的地址"，直接用此地址，无需再问。`;

  prompt += `\n\n【重要】收集到关键信息后，必须在回复末尾加JSON标记：
[EXTRACTED: {"direction":"from_airport或to_airport","date":"YYYY-MM-DD","time":"HH:MM","address":"完整地址","trip_type":"standard或accompanied","wait_hours":0}]
- direction：接机=from_airport，送机=to_airport，陪同接机=from_airport（trip_type=accompanied）
- time：送机填司机到达时间，接机填上车时间，陪同接机填出发时间
- wait_hours：陪同接机填等候小时数，其他填0
信息不完整时只填已知字段。`;

  return prompt;
}

async function sendMessage(){
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if(!msg) return;
  input.value='';
  addMsg(msg,true);
  aiHistory.push({role:'user',content:msg});
  const typing = addTyping();
  try{
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:buildSystemPrompt(),messages:aiHistory})
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text||'抱歉，请再说一遍 😊';
    aiHistory.push({role:'assistant',content:reply});
    if(aiHistory.length>20) aiHistory=aiHistory.slice(-20);
    typing.remove();
    const match = reply.match(/\[EXTRACTED:\s*({.*?})\]/s);
    if(match){
      try{
        const ex = JSON.parse(match[1]);
        if(ex.direction) S.direction=ex.direction;
        if(ex.date) S.date=ex.date;
        if(ex.time) S.time=ex.time;
        if(ex.address) S.address=ex.address;
        if(ex.trip_type) S.trip_type=ex.trip_type;
        if(ex.wait_hours) S.wait_hours=ex.wait_hours;
      }catch(e){}
      const clean = reply.replace(/\[EXTRACTED:.*?\]/s,'').trim();
      addMsg(clean); speak(clean);
      if(S.direction&&S.date&&S.time&&S.address){ await delay(800); showVehicleChoice(); }
    } else {
      addMsg(reply); speak(reply);
    }
  }catch(e){
    typing.remove();
    addMsg('网络有点问题，请稍后再试 😅');
  }
}

async function showVehicleChoice(){

  div.className='vehicle-cards';

    <div class="vehicle-card" onclick="selectVehicle('${v.type}',${v.price},this)">
      <div class="vehicle-icon">${v.icon}</div>
      <div class="vehicle-name">${v.name}</div>
      <div class="vehicle-cap">${v.cap}</div>
      <div class="vehicle-price">$${v.price}</div>

function selectVehicle(type,price,el){
  document.querySelectorAll('.vehicle-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  S.vehicle=type; S.price=price;
  setTimeout(()=>showConfirm(),400);
}

async function showConfirm(){
  await agentSay('帮你确认一下行程信息',500);
  const isAccompanied = S.trip_type==='accompanied';
  const dirText = isAccompanied?'陪同接机（全程陪同）':S.direction==='from_airport'?'接机（机场出发）':'送机（去机场）';
  const timeLabel = isAccompanied?'出发时间':S.direction==='from_airport'?'上车时间':'司机到达';
  const addrLabel = isAccompanied?'出发地/目的地':S.direction==='from_airport'?'目的地':'出发地';
  const waitFee = isAccompanied ? S.wait_hours*20 : 0;
  const totalPrice = S.price + waitFee;
  const vInfo=VEHICLES.find(v=>v.type===S.vehicle);
  const div=document.createElement('div');
  div.className='confirm-card';
  div.innerHTML=`
    <div class="confirm-title">📋 行程确认</div>
    <div class="confirm-row"><span class="confirm-label">类型</span><span class="confirm-value">${dirText}</span></div>
    <div class="confirm-row"><span class="confirm-label">日期</span><span class="confirm-value">${S.date}</span></div>
    <div class="confirm-row"><span class="confirm-label">${timeLabel}</span><span class="confirm-value">${S.time}</span></div>
    <div class="confirm-row"><span class="confirm-label">${addrLabel}</span><span class="confirm-value">${S.address}</span></div>
    <div class="confirm-row"><span class="confirm-label">车型</span><span class="confirm-value">${vInfo?.icon} ${vInfo?.name}</span></div>
    <div class="confirm-row"><span class="confirm-label">车费</span><span class="confirm-value">$${S.price}</span></div>
    ${isAccompanied?`<div class="confirm-row"><span class="confirm-label">等候费</span><span class="confirm-value">$${waitFee}（${S.wait_hours}小时×$20）</span></div>`:''}
    <div class="confirm-row"><span class="confirm-label">合计</span><span class="confirm-value" style="color:var(--accent);font-size:18px;font-weight:900;">$${totalPrice}</span></div>
    <div class="confirm-btns">
      <button class="confirm-btn secondary" onclick="restartBooking()">✏️ 修改</button>
      <button class="confirm-btn primary" onclick="showContactForm()">✅ 确认下单</button>
    </div>`;
  chatArea.appendChild(div); scrollBottom();
}

async function showContactForm(){
  const saved=getPassenger();
  await agentSay('最后一步，填联系方式就搞定！',400);
  const div=document.createElement('div');
  div.className='contact-form';
  div.innerHTML=`
    <div class="form-title">📱 联系方式 & 支付</div>
    <div class="form-field"><label class="form-label">你的称呼</label><input class="form-input" id="f-name" placeholder="姓名或昵称" value="${saved.name||''}"></div>
    <div class="form-field"><label class="form-label">手机号</label><input class="form-input" id="f-phone" type="tel" placeholder="+61 或 +86" value="${saved.phone||''}"></div>
    <div class="form-field"><label class="form-label">微信号（选填）</label><input class="form-input" id="f-wechat" placeholder="微信ID" value="${saved.wechat||''}"></div>
    <div class="form-field"><label class="form-label">付款方式</label>
      <div class="pay-options">
        <div class="pay-opt selected" onclick="selPay(this,'wechat')">💚 微信</div>

      </div>
    </div>
    <button class="submit-btn" onclick="submitBooking()">🚀 确认预约 · $${S.price}</button>`;
  chatArea.appendChild(div); scrollBottom();
}

function selPay(el,val){
  document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected'); S.payment=val;
}

function restartBooking(){
  S.direction=null;S.address=null;S.date=null;S.time=null;S.vehicle=null;S.price=null;
  agentSay('没问题！告诉我你想修改什么？',300);
}

async function submitBooking(){
  if(bookingSubmitted) return;
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  if(!name||!phone){ alert('请填写姓名和手机号'); return; }
  bookingSubmitted=true;
  S.name=name; S.phone=phone;
  S.wechat=document.getElementById('f-wechat').value.trim();
  const passenger=savePassenger(name,phone,S.wechat);
  saveAddress(S.address);
  const scheduledAt=new Date(`${S.date}T${S.time}:00`);
  const isUrgent=(scheduledAt-new Date())/60000<=90;
  const points=Math.round(S.price*0.1)+5;
  try{
    const isAcc = S.trip_type==='accompanied';
    const waitFee2 = isAcc ? S.wait_hours*20 : 0;
    const finalPrice = S.price + waitFee2;
    const [trip]=await supaInsert('trips',{
      tenant_id:TENANT_ID,passenger_name:name,passenger_phone:phone,
      passenger_wechat:S.wechat||null,direction:S.direction,
      pickup_address:isAcc||S.direction==='to_airport'?S.address:'墨尔本国际机场',
      dropoff_address:isAcc||S.direction==='from_airport'?S.address:'墨尔本国际机场',
      vehicle_type:S.vehicle,scheduled_at:`${S.date}T${S.time}:00`,
      total_price:finalPrice,payment_method:S.payment,
      payment_status:S.payment==='bank_transfer'?'pending':'prepaid',
      prepaid_amount:S.payment!=='bank_transfer'?finalPrice:null,
      status:'pending',is_urgent:isUrgent,
      trip_type:S.trip_type,wait_hours:S.wait_hours
    });
    try{ await supaInsert('contacts',{tenant_id:TENANT_ID,full_name:name,phone:phone,wechat_id:S.wechat||null,source:'小红书',status:'customer'}); }catch(e){}
    if(getIncomingRef()){
      try{ await supaInsert('referrals',{tenant_id:TENANT_ID,referrer_code:getIncomingRef(),referee_phone:phone,referee_name:name,trip_id:trip.id,points_awarded:20,status:'confirmed'}); }catch(e){}
    }
    document.getElementById('suc-id').textContent='TRP-'+trip.id.slice(-8).toUpperCase();
    document.getElementById('suc-pts').textContent='+'+points;
    document.getElementById('share-url').value=window.location.origin+window.location.pathname+'?ref='+passenger.ref;
    document.getElementById('success-modal').style.display='flex';
  }catch(e){
    bookingSubmitted=false;
    alert('提交遇到问题，请截图联系客服\n'+e.message);
  }
}
