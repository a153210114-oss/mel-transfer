<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>澳洲出行 AI 管家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:linear-gradient(160deg,#0a0f1e 0%,#0d2040 60%,#0a1628 100%);
  min-height:100vh;max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;
  overflow:hidden;height:100vh;
}

/* ── 对话区 ── */
.chat-area{
  flex:1;padding:20px 16px;
  overflow-y:auto;
  display:flex;flex-direction:column;
  gap:14px;
  padding-bottom:100px;
}

.msg{display:flex;gap:10px;align-items:flex-end;}
.msg.user{flex-direction:row-reverse;}
.msg-av{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  background:rgba(0,212,255,0.1);
  border:1.5px solid rgba(0,212,255,0.2);
}
.msg.user .msg-av{background:rgba(200,160,32,0.1);border-color:rgba(200,160,32,0.2);}
.msg-bubble{
  max-width:78%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px 18px 18px 4px;
  padding:12px 16px;font-size:14px;
  color:rgba(255,255,255,0.9);
  line-height:1.7;
  backdrop-filter:blur(10px);
}
.msg.user .msg-bubble{
  background:rgba(0,150,199,0.25);
  border-color:rgba(0,150,199,0.3);
  border-radius:18px 18px 4px 18px;
}

/* 打字动画 */
.typing-bubble{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px 18px 18px 4px;
  padding:14px 18px;
  display:flex;gap:5px;align-items:center;
}
.typing-dot{
  width:7px;height:7px;
  background:rgba(0,212,255,0.6);
  border-radius:50%;
  animation:typingBounce 1s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:0.15s;}
.typing-dot:nth-child(3){animation-delay:0.3s;}
@keyframes typingBounce{
  0%,60%,100%{transform:translateY(0);}
  30%{transform:translateY(-6px);background:rgba(0,212,255,1);}
}

/* 服务选择卡片 */
.service-cards{
  display:flex;flex-direction:column;gap:8px;
  margin-top:4px;
}
.service-card{
  background:rgba(255,255,255,0.05);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:16px;padding:14px 18px;
  cursor:pointer;
  display:flex;align-items:center;gap:14px;
  transition:all 0.2s;
  backdrop-filter:blur(10px);
}
.service-card:active{transform:scale(0.98);}
.service-card.blue{border-color:rgba(0,150,199,0.4);background:rgba(0,150,199,0.1);}
.service-card.green{border-color:rgba(39,174,96,0.4);background:rgba(39,174,96,0.1);}
.service-card.gold{border-color:rgba(200,160,32,0.4);background:rgba(200,160,32,0.1);}
.service-icon{font-size:28px;flex-shrink:0;}
.service-text h4{font-size:15px;font-weight:800;color:white;margin-bottom:3px;}
.service-text p{font-size:12px;color:rgba(255,255,255,0.5);}
.service-arrow{margin-left:auto;color:rgba(255,255,255,0.3);font-size:18px;}

/* ── 底部输入 ── */
.input-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(10,15,30,0.95);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.08);
  padding:12px 16px 28px;
  display:flex;gap:10px;align-items:center;
}
.chat-input{
  flex:1;background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:24px;
  padding:11px 18px;font-size:14px;
  color:white;font-family:inherit;outline:none;
}
.chat-input::placeholder{color:rgba(255,255,255,0.3);}
.chat-input:focus{border-color:rgba(0,212,255,0.4);}
.mic-btn{
  width:46px;height:46px;
  background:linear-gradient(135deg,#0096c7,#0077a0);
  border:none;border-radius:50%;
  font-size:20px;cursor:pointer;
  flex-shrink:0;color:white;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,150,199,0.4);
  transition:all 0.2s;
}
.mic-btn.recording{
  background:linear-gradient(135deg,#ff3b30,#cc2222);
  animation:micPulse 0.8s ease-in-out infinite;
  box-shadow:0 4px 16px rgba(255,59,48,0.5);
}
@keyframes micPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.send-btn{
  width:46px;height:46px;
  background:rgba(255,255,255,0.1);
  border:1.5px solid rgba(255,255,255,0.15);
  border-radius:50%;font-size:18px;
  cursor:pointer;color:white;
  display:flex;align-items:center;justify-content:center;
}

/* 管家选择 */
#splash{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#0a0f1e,#0d2040);
  z-index:9999;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:30px;
}
.agent-choice-title{
  font-size:22px;font-weight:900;color:white;
  margin-bottom:8px;text-align:center;
}
.agent-choice-sub{
  font-size:13px;color:rgba(255,255,255,0.4);
  margin-bottom:40px;text-align:center;
}
.agent-options{display:flex;gap:16px;width:100%;max-width:320px;}
.agent-opt{
  flex:1;background:rgba(255,255,255,0.05);
  border:2px solid rgba(255,255,255,0.1);
  border-radius:22px;padding:24px 14px;
  text-align:center;cursor:pointer;
  transition:all 0.2s;
}
.agent-opt:active{transform:scale(0.97);}
.agent-opt-emoji{font-size:52px;margin-bottom:12px;}
.agent-opt-name{font-size:18px;font-weight:900;color:white;margin-bottom:4px;}
.agent-opt-sub{font-size:12px;color:rgba(255,255,255,0.4);}
.agent-opt-btn{
  margin-top:14px;border-radius:10px;
  padding:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;width:100%;
}

@keyframes splashFade{from{opacity:1;}to{opacity:0;pointer-events:none;}}
</style>
</head>
<body>

<!-- 管家选择 -->
<div id="splash">
  <div style="font-size:48px;margin-bottom:16px;">✈️</div>
  <div class="agent-choice-title">澳洲出行 AI 管家</div>
  <div class="agent-choice-sub">选择你的专属管家</div>
  <div class="agent-options">
    <div class="agent-opt" onclick="chooseAgent('male')">
      <div class="agent-opt-emoji">🧑‍✈️</div>
      <div class="agent-opt-name">小墨</div>
      <div class="agent-opt-sub">男生 · 稳重专业</div>
      <button class="agent-opt-btn" style="background:#0096c7;color:white;">选我</button>
    </div>
    <div class="agent-opt" onclick="chooseAgent('female')">
      <div class="agent-opt-emoji">👩‍✈️</div>
      <div class="agent-opt-name">小本</div>
      <div class="agent-opt-sub">女生 · 温柔专业</div>
      <button class="agent-opt-btn" style="background:#c060a0;color:white;">选我</button>
    </div>
  </div>
</div>

<!-- 对话区 -->
<div class="chat-area" id="chat-area"></div>

<!-- 底部输入 -->
<div class="input-bar">
  <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
  <input class="chat-input" id="chat-input"
    placeholder="说话或输入..."
    onkeydown="if(event.key==='Enter')sendMessage()">
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
const AGENTS = {
  male:  {emoji:'🧑‍✈️', name:'澳小墨', pitch:0.85, rate:0.95},
  female:{emoji:'👩‍✈️', name:'澳小本', pitch:1.2,  rate:1.0},
};
let currentAgent = null;
let aiHistory = [];
let isRecording = false;
let recognition = null;

const chatArea = document.getElementById('chat-area');

function scrollBottom(){ setTimeout(()=>{ chatArea.scrollTop=chatArea.scrollHeight; },100); }

function addMsg(html, isUser=false){
  const div=document.createElement('div');
  div.className='msg'+(isUser?' user':'');
  const emoji = currentAgent?.emoji||'🧑‍✈️';
  div.innerHTML=`<div class="msg-av">${isUser?'👤':emoji}</div><div class="msg-bubble">${html}</div>`;
  chatArea.appendChild(div);scrollBottom();
  return div;
}

function addTyping(){
  const div=document.createElement('div');
  div.className='msg';
  const emoji=currentAgent?.emoji||'🧑‍✈️';
  div.innerHTML=`<div class="msg-av">${emoji}</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chatArea.appendChild(div);scrollBottom();
  return div;
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

async function agentSay(html, ms=800){
  const t=addTyping();
  await delay(ms);
  t.remove();
  addMsg(html);
  speak(html);
}

// ── 语音输出 ──
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const clean=text
    .replace(/<[^>]*>/g,'')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/[^\u0000-\u007F\u4E00-\u9FFF\u3000-\u303F\uFF00-\uFFEF\s，。！？、：；]/g,'')
    .replace(/\s+/g,' ').trim();
  if(!clean)return;
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='zh-CN';
  u.rate=currentAgent?.rate||1.0;
  u.pitch=currentAgent?.pitch||1.0;
  const voices=window.speechSynthesis.getVoices();
  const zh=voices.filter(v=>v.lang.startsWith('zh'));
  if(zh.length>0){
    const g=localStorage.getItem('au_agent')||'male';
    const v=g==='female'?(zh.find(v=>/female|女/i.test(v.name))||zh[zh.length-1]):zh[0];
    if(v)u.voice=v;
  }
  window.speechSynthesis.speak(u);
}

// ── 语音输入 ──
function toggleMic(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    alert('请使用Safari或Chrome');return;
  }
  if(isRecording){recognition?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='zh-CN';recognition.continuous=false;recognition.interimResults=false;
  recognition.onstart=()=>{
    isRecording=true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent='⏹';
  };
  recognition.onresult=(e)=>{
    document.getElementById('chat-input').value=e.results[0][0].transcript;
    sendMessage();
  };
  recognition.onend=()=>{
    isRecording=false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-btn').textContent='🎤';
  };
  recognition.onerror=recognition.onend;
  recognition.start();
}

// ── AI对话 ──
const SYSTEM_PROMPT = `你是澳洲出行AI管家，负责识别用户意图并引导到正确服务。

三个服务：
1. 接机/送机 → 机场接送服务
2. 旅游包车 → 司机包车出游
3. 组团拼车 → 找同伴AA制出行
4. 司机入口 → 我是司机，要接单

识别规则：
- 送机/接机/机场/飞机 → 机场接送
- 旅游/包车/景点/大洋路/菲利普岛 → 旅游包车
- 组团/拼车/找人/AA → 组团拼车
- 司机/接单/跑单 → 司机入口

识别到意图后，回复末尾加标记：
[GOTO: passenger_to] → 送机
[GOTO: passenger_from] → 接机  
[GOTO: plaza_charter] → 旅游包车
[GOTO: plaza_group] → 组团拼车
[GOTO: driver] → 司机入口

如果不确定，展示三个服务卡片让用户选择，回复末尾加：
[SHOW_CARDS]

回答简短友好，中文，适当emoji。`;

async function sendMessage(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg)return;
  input.value='';
  addMsg(msg,true);
  aiHistory.push({role:'user',content:msg});
  const typing=addTyping();
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYSTEM_PROMPT,messages:aiHistory})
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'请再说一遍';
    aiHistory.push({role:'assistant',content:reply});
    if(aiHistory.length>10)aiHistory=aiHistory.slice(-10);
    typing.remove();

    // 检查跳转指令
    const gotoMatch=reply.match(/\[GOTO:\s*(\w+)\]/);
    const showCards=reply.includes('[SHOW_CARDS]');
    const cleanReply=reply.replace(/\[GOTO:.*?\]/,'').replace('[SHOW_CARDS]','').trim();

    addMsg(cleanReply);
    speak(cleanReply);

    if(gotoMatch){
      await delay(1200);
      gotoPage(gotoMatch[1]);
    } else if(showCards){
      await delay(600);
      showServiceCards();
    }
  }catch(e){
    typing.remove();
    addMsg('网络有点问题，请稍后再试');
  }
}

function gotoPage(target){
  const map={
    passenger_to: 'passenger-recruit.html?type=to_airport',
    passenger_from: 'passenger-recruit.html?type=from_airport',
    plaza_charter: 'plaza.html?tab=charter',
    plaza_group: 'plaza.html?tab=group',
    driver: 'driver-app.html'
  };
  const url=map[target];
  if(url){
    agentSay('好的，帮你跳转过去！😊',300).then(()=>{
      setTimeout(()=>window.location.href=url, 1000);
    });
  }
}

function showServiceCards(){
  const div=document.createElement('div');
  div.className='service-cards';
  div.innerHTML=`
    <div class="service-card blue" onclick="gotoPage('passenger_to')">
      <div class="service-icon">✈️</div>
      <div class="service-text"><h4>送机</h4><p>送您去机场，准时安心</p></div>
      <div class="service-arrow">›</div>
    </div>
    <div class="service-card blue" onclick="gotoPage('passenger_from')">
      <div class="service-icon">🛬</div>
      <div class="service-text"><h4>接机</h4><p>落地就有车，无需等待</p></div>
      <div class="service-arrow">›</div>
    </div>
    <div class="service-card green" onclick="gotoPage('plaza_charter')">
      <div class="service-icon">🚌</div>
      <div class="service-text"><h4>旅游包车</h4><p>大洋路、菲利普岛...</p></div>
      <div class="service-arrow">›</div>
    </div>
    <div class="service-card green" onclick="gotoPage('plaza_group')">
      <div class="service-icon">👥</div>
      <div class="service-text"><h4>组团拼车</h4><p>找同伴，AA制出行</p></div>
      <div class="service-arrow">›</div>
    </div>
    <div class="service-card gold" onclick="gotoPage('driver')">
      <div class="service-icon">🧑‍✈️</div>
      <div class="service-text"><h4>我是司机</h4><p>进入工作台接单</p></div>
      <div class="service-arrow">›</div>
    </div>
  `;
  chatArea.appendChild(div);scrollBottom();
}

// ── 管家选择 ──
async function chooseAgent(gender){
  localStorage.setItem('au_agent',gender);
  currentAgent=AGENTS[gender];
  const splash=document.getElementById('splash');
  splash.style.animation='splashFade 0.5s ease forwards';
  setTimeout(()=>{splash.style.display='none';},500);
  await delay(600);

  const saved=JSON.parse(localStorage.getItem('au_passenger')||'{}');
  const namePrefix=saved.name?saved.name+'主人':'主人';
  await agentSay(`${namePrefix}，您好！我是${currentAgent.name} ${currentAgent.emoji}<br>我可以帮您安排<strong>接机送机</strong>、<strong>旅游包车</strong>或<strong>组团出行</strong><br>请问今天需要什么服务？`,1000);
  await delay(500);
  showServiceCards();
}

// ── 启动 ──
window.onload=function(){
  window.speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.getVoices();};
  const savedGender=localStorage.getItem('au_agent');
  if(savedGender&&AGENTS[savedGender]){
    currentAgent=AGENTS[savedGender];
    // 已选过管家，直接进
    document.getElementById('splash').style.display='none';
    setTimeout(async()=>{
      const saved=JSON.parse(localStorage.getItem('au_passenger')||'{}');
      const namePrefix=saved.name?saved.name+'主人':'主人';
      await agentSay(`${namePrefix}，欢迎回来！${currentAgent.emoji}<br>接机送机、旅游包车、还是组团出行？`,800);
      showServiceCards();
    },400);
  }
};
</script>
</body>
</html>
