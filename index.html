async function loadPublishedSiteCopy() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/beta_leads?channel=eq.site_page_settings&order=created_at.desc&limit=1&select=fields`, {
      cache: 'no-store',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Cache-Control': 'no-cache' }
    });
    if (!res.ok) return;
    const rows = await res.json();
    const settings = rows?.[0]?.fields?.settings;
    if (!settings || typeof settings !== 'object') return;
    const isDualEntry = !settings.homeVersion || settings.homeVersion === 'dual_entry';
    if (!isDualEntry) return;
    if (settings.mainTitle) document.getElementById('siteMainTitle').textContent = settings.mainTitle;
    if (settings.mainSubtitle) document.getElementById('siteMainSubtitle').textContent = settings.mainSubtitle;
    if (settings.roles) {
      const mappedRoles = {
        business: settings.roles.business || settings.roles.supplier || settings.roles.creator,
        life: settings.roles.life || settings.roles.family || settings.roles.student
      };
      identityCopy = {
        ...identityCopy,
        ...Object.fromEntries(Object.entries(mappedRoles).filter(([, copy]) => copy).map(([role, copy]) => [
          role,
          { ...identityCopy[role], ...copy, href: identityCopy[role]?.href || '/ai' }
        ]))
      };
    }
  } catch(e) {}
}

function getSiteLanguageMode(){
  const saved=localStorage.getItem(SITE_LANG_KEY);
  return ['auto','zh','en'].includes(saved)?saved:'auto';
}
function getSiteLocalLanguage(){
  const nav=(navigator.language||'').toLowerCase();
  if(nav.startsWith('zh'))return 'zh';
  const direct=['ja','ko','th','id','vi','de','fr','it','es','nl','pt','ar','tr','ru'].find(code=>nav.startsWith(code));
  if(direct)return direct;
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';
  return (SITE_TZ_LANG.find(([pattern])=>pattern.test(tz))||[])[1]||'en';
}
function getSiteActiveLanguage(){
  const mode=getSiteLanguageMode();
  return mode==='auto'?getSiteLocalLanguage():mode;
}
function siteText(key){
  const lang=getSiteActiveLanguage();
  return SITE_I18N[lang]?.[key] || SITE_I18N.en?.[key] || SITE_I18N.zh?.[key] || key;
}

    tell:'把需求告诉华伴'
  };
  return (getSiteActiveLanguage()==='zh'?zh:en)[key]||key;
}
function siteCopyFor(role){
  const lang=getSiteActiveLanguage();
  return SITE_I18N[lang]?.[role] ? {...identityCopy[role],...SITE_I18N[lang][role]} : identityCopy[role];
}
function siteLanguageLabel(){
  const mode=getSiteLanguageMode();
  if(mode==='zh')return '中文';
  if(mode==='en')return 'EN';
  const lang=getSiteActiveLanguage();
  return `Auto · ${SITE_LANG_META[lang]?.label||lang.toUpperCase()}`;
}
function cycleSiteLanguage(){
  const order=['auto','zh','en'];
  const next=order[(order.indexOf(getSiteLanguageMode())+1)%order.length];
  localStorage.setItem(SITE_LANG_KEY,next);
  applySiteI18n();
  renderIdentity(currentIdentityRole);
}
function applySiteI18n(){
  const lang=getSiteActiveLanguage();
  document.documentElement.lang=SITE_LANG_META[lang]?.html||'en';
  document.title=lang==='zh'?'华伴 AI+｜服务海外华人本地生活的智能应用':'Huaban AI+ | Smart local life for overseas Chinese';
  document.getElementById('siteMainTitle').textContent=siteText('title');
  document.getElementById('siteMainSubtitle').textContent=siteText('subtitle');
  const i18n=SITE_I18N[lang]||SITE_I18N.zh;
  const tabSubs=i18n.tabSubs||SITE_I18N.en.tabSubs||SITE_I18N.zh.tabSubs;
  const tabBtns=i18n.tabBtns||SITE_I18N.en.tabBtns||SITE_I18N.zh.tabBtns;
  document.querySelectorAll('.identity-tab-wrap').forEach((wrap,index)=>{
    const sub=wrap.querySelector('.identity-tab-subtitle');
    const tab=wrap.querySelector('.identity-tab');
    if(sub&&tabSubs[index])sub.textContent=tabSubs[index];
    if(tab&&tabBtns[index])tab.textContent=tabBtns[index];
  });
  const actions=document.querySelectorAll('.identity-actions .btn');
  if(actions[0])actions[0].textContent=siteText('open');
  if(actions[1])actions[1].textContent=siteText('download');
  const footer=document.querySelector('.footer-inner span:first-child');
  if(footer)footer.textContent=siteText('footer');
  const hookNote=document.getElementById('siteHookNote');
  if(hookNote){
    const note=siteText('hookNote');
    const parts=note.split('。 ');
    hookNote.innerHTML=parts.length>1?`<strong>${parts[0]}。</strong> ${parts.slice(1).join('。 ')}`:note;
  }
  const langBtn=document.getElementById('siteLangSwitch');
  if(langBtn)langBtn.textContent=siteLanguageLabel();
}

  const primaryAction=document.getElementById('identityAction');

    </div>` : '';

          </div>`).join('')}

    </div>` : '';
  const plainExtraHtml=detailHtml || prospectHtml || purposesHtml ? `${detailHtml}${prospectHtml}${purposesHtml}` : '';
  document.getElementById('identityExtra').innerHTML = copy.mode === 'business' ? `

    </div>` : copy.mode === 'life' ? `

      <div class="identity-field">
        <label for="lifeNeed">${siteFormText('need')}</label>
        <input id="lifeNeed" placeholder="${siteFormText('needPlaceholder')}">
      </div>
      <button class="btn primary" type="button" onclick="startLifeNeed()">${siteFormText('tell')}</button>
    </div>` : plainExtraHtml;
  document.querySelectorAll('.identity-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.role === role);
  });
}

function toggleIdentityDetail(id,button){
  const panel=document.getElementById(id);
  if(!panel)return;
  const show=!panel.classList.contains('show');
  panel.classList.toggle('show',show);
  if(button)button.textContent=show?'收起详情':'查看详情';
}

    await fetch(`${SUPA_URL}/rest/v1/huaban_identity_links`, {
      method: 'POST',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({
        phone,
        normalized_phone: normalizedPhone,
        friend_code: deviceCode,
        display_name: industry,
        industry,
        source: 'homepage_business_helper',
        source_ref: deviceCode,
        link_type: 'homepage_supply_entry',
        status: 'active',
        fields: { minimal_entry: true, pending_activation: true, user_visible: false }
      })
    });
    await fetch(`${SUPA_URL}/rest/v1/huaban_growth_events`, {
      method: 'POST',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({
        anonymous_id: deviceCode,
        user_code: deviceCode,
        user_phone: phone,
        event_name: 'supplier_profile_submitted',
        ref_code: new URLSearchParams(location.search).get('ref') || '',
        channel: 'homepage',
        campaign: 'dual_entry_business',
        city: '',
        country: '',
        page: location.pathname || '/',
        source_url: location.href,
        metadata: { phone, industry, minimal_entry: true, source: 'homepage_dual_entry' }
      })
    });
  } catch(e) {}
  persistBusinessEntryLocally(phone, industry);
  alert('已经记录。想及时收到需求提醒，请把华伴放到手机；不着急也可以之后再回来查看。');
  location.href = `/ai?ref=business_helper&from=homepage_supply&phone=${encodeURIComponent(phone)}&industry=${encodeURIComponent(industry)}`;
}

function parseLocalJson(key, fallback = {}) {
  try { return JSON.parse(localStorage.getItem(key) || '') || fallback; }
  catch(e) { return fallback; }
}

function makeFriendCode() {
  return Math.random().toString(36).substring(2, 8).toUpperCase();
}

function persistBusinessEntryLocally(phone, industry) {
  const now = new Date().toISOString();
  const cleanPhone = String(phone || '').trim();
  const cleanIndustry = String(industry || '').trim();
  const existingPassenger = parseLocalJson('au_passenger');
  const existingProfile = parseLocalJson('au_profile');
  const existingSupplier = parseLocalJson('huaban_supplier_application');
  const fixedCode = String(
    localStorage.getItem('huaban_device_friend_code') ||
    existingPassenger.ref ||
    makeFriendCode()
  ).replace(/[^a-zA-Z0-9]/g, '').toUpperCase();

  localStorage.setItem('huaban_device_friend_code', fixedCode);
  localStorage.setItem('huaban_user_industry', cleanIndustry);
  localStorage.setItem('huaban_home_intro_done', '1');
  localStorage.setItem('huaban_homepage_business_entry_done', '1');
  localStorage.setItem('huaban_homepage_business_entry', JSON.stringify({
    phone: cleanPhone,
    industry: cleanIndustry,
    source: 'homepage_business_helper',
    createdAt: now
  }));
  localStorage.setItem('au_profile', JSON.stringify({
    ...existingProfile,
    phone: cleanPhone,
    industry: cleanIndustry
  }));
  localStorage.setItem('au_passenger', JSON.stringify({
    ...existingPassenger,
    phone: cleanPhone,
    industry: cleanIndustry,
    ref: fixedCode,
    logged_in: true,
    profile_ready: true,
    login_source: existingPassenger.login_source || 'homepage_business_entry'
  }));
  localStorage.setItem('huaban_supplier_application', JSON.stringify({
    ...existingSupplier,
    status: existingSupplier.status || 'draft',
    phone: cleanPhone,
    contact: cleanPhone,
    industry: cleanIndustry,
    service_type: existingSupplier.service_type || cleanIndustry,
    service_type_label: existingSupplier.service_type_label || cleanIndustry,
    source: 'homepage_business_helper',
    minimal_entry: true,
    updatedAt: now
  }));
}

function startLifeNeed() {
  const text = document.getElementById('lifeNeed')?.value.trim();
  location.href = `/ai?ref=life_butler${text ? `&q=${encodeURIComponent(text)}` : ''}`;
}

document.querySelectorAll('.identity-tab').forEach(tab => {
  tab.addEventListener('click', () => renderIdentity(tab.dataset.role));
});

const refRole = new URLSearchParams(location.search).get('ref');
const roleByRef = {
  share_growth: 'share',
  supplier_income: 'share',
  business_helper: 'now',
  local_match: 'now',
  life_butler: 'now',
  student_free: 'now',
  family_ai: 'now',
  identity_pocket: 'pocket',
  app_download: 'pocket'
};
loadPublishedSiteCopy().finally(() => renderIdentity(roleByRef[refRole] || 'share'));
</script>
