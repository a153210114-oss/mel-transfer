<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>澳洲出行 AI 管家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:linear-gradient(160deg,#0a0f1e 0%,#0d2040 60%,#0a1628 100%);
  height:100vh;max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
}

/* 顶部栏 */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;flex-shrink:0;
}
.top-logo{font-size:13px;color:rgba(255,255,255,0.4);font-weight:700;}
.top-exit{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);border-radius:8px;
  padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;
  display:none;
}

/* 对话区 */
.chat-area{
  flex:1;overflow-y:auto;
  padding:12px 14px;
  display:flex;flex-direction:column;gap:12px;
  padding-bottom:140px;
}
.msg{display:flex;gap:10px;align-items:flex-end;}
.msg.user{flex-direction:row-reverse;}
.msg-av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  background:rgba(0,212,255,0.08);
  border:1.5px solid rgba(0,212,255,0.15);
}
.msg.user .msg-av{background:rgba(200,160,32,0.08);border-color:rgba(200,160,32,0.15);}
.msg-bubble{
  max-width:80%;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px 18px 18px 4px;
  padding:11px 15px;font-size:14px;
  color:rgba(255,255,255,0.92);line-height:1.7;
}
.msg.user .msg-bubble{
  background:rgba(0,150,199,0.2);
  border-color:rgba(0,150,199,0.25);
  border-radius:18px 18px 4px 18px;
}
.typing-bubble{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px 18px 18px 4px;
  padding:13px 16px;display:flex;gap:5px;align-items:center;
}
.typing-dot{width:7px;height:7px;background:rgba(0,212,255,0.5);border-radius:50%;animation:tb 1s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:0.15s;}
.typing-dot:nth-child(3){animation-delay:0.3s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);background:rgba(0,212,255,1);}}

/* 选择卡片 */
.choice-cards{display:flex;flex-direction:column;gap:8px;}
.choice-card{
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:14px 16px;
  cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:all 0.15s;
}
.choice-card:active{transform:scale(0.98);}
.choice-card.blue{border-color:rgba(0,150,199,0.35);background:rgba(0,150,199,0.08);}
.choice-card.gold{border-color:rgba(200,160,32,0.35);background:rgba(200,160,32,0.08);}
.choice-card.green{border-color:rgba(39,174,96,0.35);background:rgba(39,174,96,0.08);}
.card-icon{font-size:24px;flex-shrink:0;}
.card-text h4{font-size:14px;font-weight:800;color:white;margin-bottom:2px;}
.card-text p{font-size:12px;color:rgba(255,255,255,0.4);}
.card-arrow{margin-left:auto;color:rgba(255,255,255,0.3);}

/* 手机号输入 */
.phone-input-card{
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:18px;padding:18px;
}
.phone-input-card input{
  width:100%;background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.15);
  border-radius:12px;padding:12px 16px;
  color:white;font-size:16px;font-family:inherit;
  outline:none;margin-bottom:10px;letter-spacing:1px;
