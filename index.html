<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>澳洲出行 AI 管家</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:linear-gradient(160deg,#0a0f1e 0%,#0d2040 60%,#0a1628 100%);
  min-height:100vh;max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
}

.chat-area{
  flex:1;padding:16px 14px;overflow-y:auto;
  display:flex;flex-direction:column;gap:12px;
  padding-bottom:90px;
}

.msg{display:flex;gap:10px;align-items:flex-end;}
.msg.user{flex-direction:row-reverse;}
.msg-av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  background:rgba(0,212,255,0.1);
  border:1.5px solid rgba(0,212,255,0.15);
}
.msg.user .msg-av{background:rgba(200,160,32,0.1);border-color:rgba(200,160,32,0.15);}
.msg-bubble{
  max-width:80%;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px 18px 18px 4px;
  padding:11px 15px;font-size:14px;
  color:rgba(255,255,255,0.92);
  line-height:1.7;backdrop-filter:blur(10px);
}
.msg.user .msg-bubble{
  background:rgba(0,150,199,0.2);
  border-color:rgba(0,150,199,0.25);
  border-radius:18px 18px 4px 18px;
}
.typing-bubble{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px 18px 18px 4px;
  padding:13px 16px;display:flex;gap:5px;align-items:center;
}
.typing-dot{width:7px;height:7px;background:rgba(0,212,255,0.5);border-radius:50%;animation:tb 1s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:0.15s;}
.typing-dot:nth-child(3){animation-delay:0.3s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);background:rgba(0,212,255,1);}}

/* 卡片组 */
.cards-wrap{display:flex;flex-direction:column;gap:8px;margin-top:4px;}

.choice-card{
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:13px 16px;
  cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:all 0.15s;
}
.choice-card:active{transform:scale(0.98);}
.choice-card.selected{border-color:rgba(0,212,255,0.6);background:rgba(0,212,255,0.12);}
.choice-card.blue{border-color:rgba(0,150,199,0.3);background:rgba(0,150,199,0.08);}
.choice-card.green{border-color:rgba(39,174,96,0.3);background:rgba(39,174,96,0.08);}
.choice-card.gold{border-color:rgba(200,160,32,0.3);background:rgba(200,160,32,0.08);}
.card-icon{font-size:24px;flex-shrink:0;}
.card-text h4{font-size:14px;font-weight:800;color:white;margin-bottom:2px;}
.card-text p{font-size:12px;color:rgba(255,255,255,0.45);}
.card-arrow{margin-left:auto;color:rgba(255,255,255,0.3);font-size:16px;}

/* 车型卡片 */
.vehicle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.vehicle-card{
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.1);
  border-radius:14px;padding:14px 12px;
  cursor:pointer;text-align:center;transition:all 0.15s;
}
.vehicle-card:active{transform:scale(0.97);}
.vehicle-card.selected{border-color:rgba(0,212,255,0.6);background:rgba(0,212,255,0.12);}
.v-icon{font-size:28px;margin-bottom:6px;}
.v-name{font-size:13px;font-weight:700;color:white;}
.v-cap{font-size:11px;color:rgba(255,255,255,0.4);margin:3px 0;}
.v-price{font-size:17px;font-weight:900;color:rgba(0,212,255,0.9);}

/* 确认卡 */
.confirm-card{
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:18px;padding:18px;
}
.confirm-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:13px;
}
.confirm-row:last-of-type{border:none;}
.confirm-label{color:rgba(255,255,255,0.4);width:64px;flex-shrink:0;}
.confirm-value{color:rgba(255,255,255,0.9);font-weight:600;flex:1;}
.confirm-btns{display:flex;gap:8px;margin-top:14px;}
.confirm-btn{
  flex:1;padding:13px;border:none;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
}
.confirm-btn.primary{background:linear-gradient(135deg,#0096c7,#0077a0);color:white;}
.confirm-btn.secondary{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1);}

/* 文字输入框（内嵌） */
.inline-input{
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.15);
  border-radius:14px;padding:12px 16px;
  display:flex;gap:8px;align-items:center;margin-top:4px;
}
.inline-input input{
  flex:1;background:none;border:none;outline:none;
  color:white;font-size:14px;font-family:inherit;
}
.inline-input input::placeholder{color:rgba(255,255,255,0.3);}
.inline-send{
  background:rgba(0,150,199,0.4);border:none;border-radius:8px;
  color:white;padding:6px 12px;font-size:13px;cursor:pointer;
  font-family:inherit;font-weight:700;
}

/* 支付选项 */
.pay-opts{display:flex;gap:8px;margin-top:4px;}
.pay-opt{
  flex:1;padding:10px 6px;
  background:rgba(255,255,255,0.05);
  border:1.5px solid rgba(255,255,255,0.1);
  border-radius:10px;text-align:center;
  font-size:12px;font-weight:700;
  color:rgba(255,255,255,0.5);cursor:pointer;
}
.pay-opt.selected{border-color:rgba(0,212,255,0.5);color:rgba(0,212,255,0.9);background:rgba(0,212,255,0.08);}

/* 底部输入 */
.input-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(8,12,25,0.97);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.07);
  padding:10px 14px 24px;
  display:flex;gap:10px;align-items:center;
}
.chat-input{
  flex:1;background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.1);
  border-radius:24px;padding:11px 18px;
  font-size:14px;color:white;font-family:inherit;outline:none;
}
.chat-input::placeholder{color:rgba(255,255,255,0.28);}
.chat-input:focus{border-color:rgba(0,212,255,0.35);}
.mic-btn{
  width:44px;height:44px;
  background:linear-gradient(135deg,#0096c7,#0077a0);
  border:none;border-radius:50%;font-size:20px;
  cursor:pointer;color:white;flex-shrink:0;
  box-shadow:0 4px 14px rgba(0,150,199,0.35);
}
.mic-btn.recording{background:linear-gradient(135deg,#ff3b30,#cc2222);animation:mp 0.8s ease-in-out infinite;}
@keyframes mp{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.send-btn{
  width:44px;height:44px;
  background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:50%;font-size:16px;cursor:pointer;color:white;
}

/* 管家选择 */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,#0a0f1e,#0d2040);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:30px;
}
.splash-logo{font-size:44px;margin-bottom:16px;}
.splash-title{font-size:22px;font-weight:900;color:white;margin-bottom:6px;}
.splash-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:40px;}
.agent-opts{display:flex;gap:14px;width:100%;max-width:320px;}
.agent-opt{
  flex:1;background:rgba(255,255,255,0.05);
  border:2px solid rgba(255,255,255,0.1);
  border-radius:22px;padding:24px 14px;
  text-align:center;cursor:pointer;
}
.agent-opt:active{transform:scale(0.97);}
.ao-emoji{font-size:50px;margin-bottom:10px;}
.ao-name{font-size:17px;font-weight:900;color:white;margin-bottom:3px;}
.ao-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:14px;}
.ao-btn{width:100%;border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;}

@keyframes splashFade{from{opacity:1;}to{opacity:0;pointer-events:none;}}

/* 成功弹窗 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:#0d1f3c;border-radius:28px 28px 0 0;padding:28px 22px 44px;width:100%;max-width:480px;border-top:1px solid rgba(255,255,255,0.1);}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 20px;}

/* 烟花 */
#confetti-overlay{display:none;position:fixed;inset:0;z-index:9998;pointer-events:all;flex-direction:column;align-items:center;justify-content:center;}
</style>
</head>

<script>
const SUPA_URL='https://gxocvpmgfjvmmkkbswgo.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4b2N2cG1nZmp2bW1ra2Jzd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDc4NzAsImV4cCI6MjA5NTgyMzg3MH0.ExUNuOP8YyHQmItY6cdl1Euj7nOXqQq-rQT5-7aNerE';
const TENANT_ID='00000000-0000-0000-0000-000000000001';

const VEHICLES=[
  {type:'sedan',icon:'🚗',name:'Sedan',cap:'1-3人',price:70},
  {type:'mpv',icon:'🚐',name:'MPV 商务车',cap:'4-6人',price:90},
  {type:'large_mpv',icon:'🚌',name:'大型MPV',cap:'7-9人',price:120},
  {type:'van',icon:'🚎',name:'Van 大巴',cap:'10人+',price:160},
];

// 订单状态
const S={direction:null,address:null,date:null,time:null,vehicle:null,price:null,name:null,phone:null,wechat:null,payment:'wechat',trip_type:'standard',wait_hours:0};
let currentAgent=null, aiHistory=[], isRecording=false, recognition=null, bookingSubmitted=false;
const chatArea=document.getElementById('chat-area');

function scrollBottom(){setTimeout(()=>{chatArea.scrollTop=chatArea.scrollHeight;},100);}

function addMsg(html,isUser=false){
  const div=document.createElement('div');
  div.className='msg'+(isUser?' user':'');
  const av=isUser?'👤':(currentAgent?.emoji||'🧑‍✈️');
  div.innerHTML=`<div class="msg-av">${av}</div><div class="msg-bubble">${html}</div>`;
  chatArea.appendChild(div);scrollBottom();return div;
}

function addTyping(){
  const div=document.createElement('div');div.className='msg';
  div.innerHTML=`<div class="msg-av">${currentAgent?.emoji||'🧑‍✈️'}</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chatArea.appendChild(div);scrollBottom();return div;
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}
async function agentSay(html,ms=700){const t=addTyping();await delay(ms);t.remove();addMsg(html);speak(html);}

// 语音
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const clean=text.replace(/<[^>]*>/g,'').replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/[^\u0000-\u007F\u4E00-\u9FFF\u3000-\u303F\uFF00-\uFFEF\s，。！？、：；]/g,'')
    .replace(/\s+/g,' ').trim();
  if(!clean)return;
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='zh-CN';u.rate=currentAgent?.rate||1.0;u.pitch=currentAgent?.pitch||1.0;
  const voices=window.speechSynthesis.getVoices();
  const cn=voices.filter(v=>v.lang==='zh-CN');
  if(cn.length>0){
    const g=localStorage.getItem('au_agent')||'male';
    const v=g==='female'?(cn.find(v=>/female|女|Ting/i.test(v.name))||cn[cn.length-1]):cn[0];
    if(v)u.voice=v;
  }
  window.speechSynthesis.speak(u);
}

function toggleMic(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('请使用Safari或Chrome');return;}
  if(isRecording){recognition?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='zh-CN';recognition.continuous=false;recognition.interimResults=false;
  recognition.onstart=()=>{isRecording=true;document.getElementById('mic-btn').classList.add('recording');document.getElementById('mic-btn').textContent='⏹';};
  recognition.onresult=(e)=>{document.getElementById('chat-input').value=e.results[0][0].transcript;sendMessage();};
  recognition.onend=()=>{isRecording=false;document.getElementById('mic-btn').classList.remove('recording');document.getElementById('mic-btn').textContent='🎤';};
  recognition.onerror=recognition.onend;
  recognition.start();
}

// 身份
function genRef(){return Math.random().toString(36).substring(2,8).toUpperCase();}
function getPassenger(){return JSON.parse(localStorage.getItem('au_passenger')||'{}');}
function savePassenger(name,phone,wechat){
  let p=JSON.parse(localStorage.getItem('au_passenger')||'{}');
  if(!p.ref)p.ref=genRef();p.name=name;p.phone=phone;p.wechat=wechat;
  localStorage.setItem('au_passenger',JSON.stringify(p));return p;
}
function getSavedAddresses(){return JSON.parse(localStorage.getItem('au_addresses')||'[]');}
function saveAddress(addr){
  if(!addr)return;let a=getSavedAddresses();
  a=a.filter(x=>x!==addr);a.unshift(addr);a=a.slice(0,3);
  localStorage.setItem('au_addresses',JSON.stringify(a));
}

// Supabase
async function supaInsert(table,data){
  const res=await fetch(SUPA_URL+'/rest/v1/'+table,{
    method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!res.ok){const e=await res.json();throw new Error(e.message||'error');}
  return res.json();
}

// ── System Prompt ──
function buildPrompt(){
  const saved=getPassenger();
  const addrs=getSavedAddresses();
  const yr=new Date().getFullYear();
  let p=`你是澳洲出行AI管家，性格直接简洁，像朋友一样自然对话。今年${yr}年。

服务范围：机场接送（接机/送机/陪同接机）、旅游包车、组团拼车、司机工作台。

【对话规则】
- 每次最多2句话，不废话
- 不用"好的""当然""没问题"开头
- 已收集到的信息不再重复询问
- 确认意图后立即收集缺少的信息

【信息收集完成后加标记】
送机（收集到：时间+出发地）→ [ACTION: show_vehicles to_airport]
接机（收集到：上车时间+目的地）→ [ACTION: show_vehicles from_airport]
陪同接机（收集到：时间+地址+等候时长）→ [ACTION: show_vehicles accompanied]
旅游包车 → [ACTION: goto plaza_charter]
组团拼车 → [ACTION: goto plaza_group]
司机入口 → [ACTION: goto driver]

【时间规则】
送机：问"几点需要司机到门口？"（不是起飞时间）
接机：问"落地后大概几点出关上车？"（不是落地时间）

【地址规则】`;

  if(saved.name) p+=`\n当前用户：${saved.name}，称呼"${saved.name}主人"。`;
  if(addrs.length>0) p+=`\n常用地址：${addrs[0]}。用户说"回家"直接用此地址。`;
  p+=`\n\n需要输入框时在回复末尾加：[INPUT: placeholder文字]`;
  return p;
}

// ── 发送消息 ──
async function sendMessage(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();if(!msg)return;
  input.value='';
  addMsg(msg,true);
  aiHistory.push({role:'user',content:msg});
  const typing=addTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:buildPrompt(),messages:aiHistory})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||'请再说一遍';
    aiHistory.push({role:'assistant',content:reply});
    if(aiHistory.length>20)aiHistory=aiHistory.slice(-20);
    typing.remove();

    // 解析标记
    const actionMatch=reply.match(/\[ACTION:\s*(\w+)\s*(\w+)?\]/);
    const inputMatch=reply.match(/\[INPUT:\s*([^\]]+)\]/);
    const clean=reply.replace(/\[ACTION:.*?\]/,'').replace(/\[INPUT:.*?\]/,'').trim();

    // 从对话提取信息
    extractInfo(msg, reply);

    addMsg(clean);speak(clean);

    if(actionMatch){
      await delay(800);
      handleAction(actionMatch[1],actionMatch[2]);
    } else if(inputMatch){
      await delay(400);
      showInlineInput(inputMatch[1]);
    }
  }catch(e){typing.remove();addMsg('网络有问题，请稍后再试');}
}

// 从对话提取行程信息
function extractInfo(userMsg, aiReply){
  // 方向
  if(/送机|去机场|飞机/i.test(userMsg)) S.direction='to_airport';
  if(/接机|回来|落地|到澳洲/i.test(userMsg)) S.direction='from_airport';
  if(/陪.*去.*接|帮我去接/i.test(userMsg)) S.trip_type='accompanied';

  // 日期（今天/明天/后天/具体日期）
  const today=new Date();
  if(/今天/i.test(userMsg)) S.date=today.toISOString().split('T')[0];
  if(/明天/i.test(userMsg)){const d=new Date(today);d.setDate(d.getDate()+1);S.date=d.toISOString().split('T')[0];}
  if(/后天/i.test(userMsg)){const d=new Date(today);d.setDate(d.getDate()+2);S.date=d.toISOString().split('T')[0];}
  const dateMatch=userMsg.match(/(\d{1,2})[月\/\-](\d{1,2})/);
  if(dateMatch) S.date=`${today.getFullYear()}-${dateMatch[1].padStart(2,'0')}-${dateMatch[2].padStart(2,'0')}`;

  // 时间
  const timeMatch=userMsg.match(/(\d{1,2})[点:：时](\d{0,2})/);
  if(timeMatch) S.time=`${timeMatch[1].padStart(2,'0')}:${(timeMatch[2]||'00').padStart(2,'0')}`;

  // 地址（回家用历史地址）
  const addrs=getSavedAddresses();
  if(/回家|回我家|老地址/i.test(userMsg)&&addrs.length>0) S.address=addrs[0];
}

function handleAction(action, param){
  if(action==='show_vehicles'){
    if(param) S.direction=param==='to_airport'?'to_airport':'from_airport';
    showVehicleCards();
  } else if(action==='goto'){
    const map={plaza_charter:'plaza.html?tab=charter',plaza_group:'plaza.html?tab=group',driver:'driver-app.html'};
    if(map[param]) setTimeout(()=>window.location.href=map[param],800);
  }
}

function showInlineInput(placeholder){
  const div=document.createElement('div');
  div.className='inline-input';
  div.innerHTML=`<input placeholder="${placeholder}" id="inline-inp" onkeydown="if(event.key==='Enter')submitInline(this)">
    <button class="inline-send" onclick="submitInline(document.getElementById('inline-inp'))">确认</button>`;
  chatArea.appendChild(div);scrollBottom();
  setTimeout(()=>document.getElementById('inline-inp')?.focus(),300);
}

function submitInline(el){
  const val=el.value.trim();if(!val)return;
  el.closest('.inline-input').remove();
  document.getElementById('chat-input').value=val;
  sendMessage();
}

      <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">付款方式</div>

function selPay(el,val){

function restartBooking(){
  S.direction=null;S.address=null;S.date=null;S.time=null;S.vehicle=null;S.price=null;S.trip_type='standard';S.wait_hours=0;
  agentSay('告诉我想修改什么？',300);

// 联系方式步骤

    <div style="display:flex;flex-direction:column;gap:10px;">
      <input id="c-name" placeholder="称呼/姓名" style="background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 14px;color:white;font-size:14px;font-family:inherit;outline:none;" value="${saved.name||''}">
      <input id="c-phone" placeholder="澳洲手机号 04XX XXX XXX" type="tel" style="background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 14px;color:white;font-size:14px;font-family:inherit;outline:none;" value="${saved.phone||''}">
      <input id="c-wechat" placeholder="微信号（选填）" style="background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 14px;color:white;font-size:14px;font-family:inherit;outline:none;" value="${saved.wechat||''}">
    </div>
    <button onclick="submitFromForm()" style="width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,#0096c7,#0077a0);color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;">🚀 确认预约</button>`;
  chatArea.appendChild(div);scrollBottom();

async function submitFromForm(){
  const name=document.getElementById('c-name')?.value.trim();
  const phone=document.getElementById('c-phone')?.value.trim();
  if(!name||!phone){alert('请填写姓名和手机号');return;}
  S.name=name;S.phone=phone;S.wechat=document.getElementById('c-wechat')?.value.trim()||'';
  await submitBooking();
}

async function submitBooking(){
  if(bookingSubmitted)return;
  bookingSubmitted=true;
  const passenger=savePassenger(S.name,S.phone,S.wechat);
  saveAddress(S.address);
  const scheduledAt=new Date(`${S.date}T${S.time}:00`);
  const isUrgent=(scheduledAt-new Date())/60000<=90;
  const isAcc=S.trip_type==='accompanied';
  const waitFee=isAcc?S.wait_hours*20:0;
  const finalPrice=S.price+waitFee;
  const points=Math.floor(finalPrice/10);
  try{
    const [trip]=await supaInsert('trips',{
      tenant_id:TENANT_ID,passenger_name:S.name,passenger_phone:S.phone,
      passenger_wechat:S.wechat||null,direction:S.direction,
      pickup_address:isAcc||S.direction==='to_airport'?S.address:'墨尔本国际机场',
      dropoff_address:isAcc||S.direction==='from_airport'?S.address:'墨尔本国际机场',
      vehicle_type:S.vehicle,scheduled_at:`${S.date}T${S.time}:00`,
      total_price:finalPrice,payment_method:S.payment,
      payment_status:S.payment==='bank_transfer'?'pending':'prepaid',
      prepaid_amount:S.payment!=='bank_transfer'?finalPrice:null,
      status:'pending',is_urgent:isUrgent,
      trip_type:S.trip_type,wait_hours:S.wait_hours
    });
    try{await supaInsert('contacts',{tenant_id:TENANT_ID,full_name:S.name,phone:S.phone,wechat_id:S.wechat||null,source:'AI管家',status:'customer'});}catch(e){}
    document.getElementById('suc-id').textContent='TRP-'+trip.id.slice(-8).toUpperCase();
    document.getElementById('success-modal').classList.add('show');
    setTimeout(()=>showConfetti(points),1800);
    await agentSay(`${S.name}主人，预约成功！司机会尽快确认并联系您 🎉`,300);
  }catch(e){
    bookingSubmitted=false;
    alert('提交遇到问题，请截图联系客服\n'+e.message);
  }
}

function closeSuccess(){document.getElementById('success-modal').classList.remove('show');}

// 烟花
let confettiInterval=null;
function showConfetti(points){
  document.getElementById('confetti-pts').textContent='+'+points;
  document.getElementById('confetti-overlay').style.display='flex';
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#00d4ff','#f5a623','#00c896','#ff4d6d','#a855f7','#ffffff'];
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,
    w:Math.random()*10+5,h:Math.random()*6+3,
    color:colors[Math.floor(Math.random()*colors.length)],
    speed:Math.random()*3+2,angle:Math.random()*360,
    spin:Math.random()*10-5,wobble:Math.random()*3
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.y+=p.speed;p.angle+=p.spin;p.x+=Math.sin(p.angle*0.05)*p.wobble;
      if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
  }
  confettiInterval=setInterval(draw,16);
}
function closeConfetti(){
  document.getElementById('confetti-overlay').style.display='none';
  if(confettiInterval){clearInterval(confettiInterval);confettiInterval=null;}
}
