<script>
const SUPA_URL = 'https://gxocvpmgfjvmmkkbswgo.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4b2N2cG1nZmp2bW1ra2Jzd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDc4NzAsImV4cCI6MjA5NTgyMzg3MH0.ExUNuOP8YyHQmItY6cdl1Euj7nOXqQq-rQT5-7aNerE';
let identityCopy = {

      '如果希望展示更多信息，请添加华伴人工客服咨询。'

  },
  life: {
    title: '精准找到需求',
    lead: '不再迷失在信息碎片的海洋中。',
    href: '/ai?ref=life_butler',
    mode: 'life',
    items: [
      '你是否有这样的经历：拿起手机想打电话，想去微信、小红书、抖音搜索，却被各种“猜你喜欢”带偏了。',

      '还给你更多时间和精力去陪伴家人，他们需要你！'

async function loadPublishedSiteCopy() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/beta_leads?channel=eq.site_page_settings&order=created_at.desc&limit=1&select=fields`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
    });
    if (!res.ok) return;
    const rows = await res.json();
    const settings = rows?.[0]?.fields?.settings;
    if (!settings || typeof settings !== 'object') return;
    if (settings.homeVersion === 'dual_entry' && settings.mainTitle) document.getElementById('siteMainTitle').textContent = settings.mainTitle;
    if (settings.homeVersion === 'dual_entry' && settings.mainSubtitle) document.getElementById('siteMainSubtitle').textContent = settings.mainSubtitle;
    if (settings.homeVersion === 'dual_entry' && settings.roles) {
      identityCopy = {
        ...identityCopy,
        ...Object.fromEntries(Object.entries(settings.roles).map(([role, copy]) => [
          role,
          { ...identityCopy[role], ...copy, href: identityCopy[role]?.href || '/ai' }
        ]))
      };
    }
  } catch(e) {}
}

function renderIdentity(role) {
  const copy = identityCopy[role] || identityCopy.business;
  document.getElementById('identityTitle').textContent = copy.title;
  document.getElementById('identityLead').textContent = copy.lead;
  document.getElementById('identityList').innerHTML = copy.items.map(item => `<li>${item}</li>`).join('');
  document.getElementById('identityAction').href = copy.href;
  document.getElementById('identityExtra').innerHTML = copy.mode === 'business' ? `
    <div class="identity-form">
      <div class="identity-field">
        <label for="businessPhone">手机号</label>
        <input id="businessPhone" inputmode="tel" placeholder="填写手机号，让客户找到你">
      </div>
      <div class="identity-field">
        <label for="businessIndustry">行业</label>
        <input id="businessIndustry" placeholder="例如：电工 / 接送机 / 会计 / 中餐馆">
      </div>
      <button class="btn primary" type="button" onclick="submitBusinessEntry()">保存，让客户找到我</button>
      <div class="identity-note">想展示更多资料、价格、作品、菜单或资质，可进入华伴 AI 后告诉华伴。</div>
    </div>` : `
    <div class="identity-form">
      <div class="identity-field">
        <label for="lifeNeed">现在想解决什么</label>
        <input id="lifeNeed" placeholder="例如：找电工、安排接机、做一周行程">
      </div>
      <button class="btn primary" type="button" onclick="startLifeNeed()">把需求告诉华伴</button>
    </div>`;
  document.querySelectorAll('.identity-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.role === role);
  });
}

async function submitBusinessEntry() {
  const phone = document.getElementById('businessPhone')?.value.trim();
  const industry = document.getElementById('businessIndustry')?.value.trim();
  if (!phone || !industry) {
    alert('先填写手机号和行业。');
    return;
  }
  try {
    await fetch(`${SUPA_URL}/rest/v1/beta_leads`, {
      method: 'POST',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({
        lead_type: 'supply',
        channel: 'homepage_business_helper',
        need_type: 'business_entry',
        name: industry,
        contact: phone,
        status: 'new',
        stage: 'homepage_minimal_entry',
        message: `官网事业帮手录入\n手机号：${phone}\n行业：${industry}`,
        fields: { phone, industry, minimal_entry: true, source: 'homepage_dual_entry' }
      })
    });
  } catch(e) {}
  alert('已经记录。华伴会先按手机号和行业为你建立基础资料。');
}

function startLifeNeed() {
  const text = document.getElementById('lifeNeed')?.value.trim();
  location.href = `/ai?ref=life_butler${text ? `&q=${encodeURIComponent(text)}` : ''}`;
}

document.querySelectorAll('.identity-tab').forEach(tab => {
  tab.addEventListener('click', () => renderIdentity(tab.dataset.role));
});

const refRole = new URLSearchParams(location.search).get('ref');
const roleByRef = {
  business_helper: 'business',
  supplier_income: 'business',
  life_butler: 'life',
  student_free: 'life',
  family_ai: 'life'
};
loadPublishedSiteCopy().finally(() => renderIdentity(roleByRef[refRole] || 'business'));
</script>
</body>
