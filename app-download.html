<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>下载华伴 App | 华伴</title>
  <meta name="description" content="下载华伴 App，或把华伴添加到手机主屏幕。除了需要与被需要，生活不该被打扰。华伴 AI，一个更出色的你。">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/brand/apple-touch-icon.png">
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f6f7f8;color:#111;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;}
    .page{min-height:100vh;display:flex;flex-direction:column;padding:calc(18px + env(safe-area-inset-top)) 18px calc(24px + env(safe-area-inset-bottom));}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px;}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:18px;}
    .brand img{width:42px;height:42px;border-radius:12px;background:white;box-shadow:0 4px 16px rgba(0,0,0,.08);}
    .back{border:1px solid #dedede;background:white;color:#333;border-radius:999px;padding:9px 13px;font:700 13px/1 inherit;text-decoration:none;}
    .hero{padding:18px 2px 10px;}
    h1{margin:0;font-size:30px;line-height:1.2;letter-spacing:0;font-weight:950;}
    .lead{margin:12px 0 0;color:#59626c;font-size:15px;line-height:1.75;}
    .card{background:white;border:1px solid #e5e5e5;border-radius:18px;padding:16px;margin-top:14px;box-shadow:0 8px 24px rgba(0,0,0,.05);}
    .card h2{margin:0 0 8px;font-size:17px;}
    .card p{margin:0;color:#606a73;font-size:13px;line-height:1.7;}
    .actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px;}
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;min-height:48px;border:0;border-radius:14px;background:#07c160;color:white;font:900 15px/1 inherit;text-decoration:none;cursor:pointer;}
    .btn.secondary{background:#111820;color:white;}
    .btn.ghost{background:#edf2f4;color:#31404a;}
    .device{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 11px;border-radius:999px;background:#ecfff4;color:#087a3e;font-size:12px;font-weight:900;}
    .steps{display:flex;flex-direction:column;gap:9px;margin-top:12px;}
    .step{display:flex;gap:10px;align-items:flex-start;border-radius:13px;background:#f7f8f9;padding:11px;border:1px solid #eceff1;}
    .step b{font-size:19px;line-height:1.2;}
    .step strong{display:block;font-size:14px;margin-bottom:2px;}
    .step span{display:block;color:#68727b;font-size:12px;line-height:1.5;}
    .note{margin-top:auto;padding-top:18px;color:#8a939b;font-size:12px;line-height:1.7;text-align:center;}
    .hidden{display:none!important;}
    @media(min-width:720px){
      .page{max-width:760px;margin:0 auto;padding-top:42px;}
      h1{font-size:42px;}
      .actions{grid-template-columns:1fr 1fr;}
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top">
      <div class="brand"><img src="assets/brand/huaban-logo-v1.png" alt="">华伴</div>
      <a class="back" href="/ai">回到华伴 AI</a>
    </div>

    <section class="hero">
      <h1>选择你的华伴打开方式</h1>
      <p class="lead">轻量使用，添加到手机屏幕就够了。长期使用，后续可以下载 App，语音、提醒和消息会更稳定。</p>
      <div class="device" id="device-pill">正在识别设备...</div>
    </section>

    <section class="card">
      <h2>方式一：添加到手机屏幕</h2>
      <p>最快开始。无需商店审核，像 App 一样从桌面打开华伴。</p>
      <div class="steps" id="pwa-steps"></div>
      <div class="actions">
        <button class="btn" type="button" id="install-btn">添加到屏幕</button>
        <a class="btn ghost" href="/ai">先打开华伴</a>
      </div>
    </section>

    <section class="card">
      <h2>方式二：下载 App</h2>
      <p>App 适合重度使用。等 iPhone TestFlight、App Store 或 Android 安装包开放后，这里会直接显示下载入口。</p>
      <div class="actions">
        <a class="btn secondary hidden" id="ios-app-link" href="#">下载 iPhone App</a>
        <a class="btn secondary hidden" id="android-app-link" href="#">下载 Android App</a>
        <button class="btn ghost" type="button" id="copy-link-btn">复制官网链接</button>
      </div>
    </section>

    <div class="note">除了需要与被需要，生活不该被打扰。华伴 AI，一个更出色的你。</div>
  </main>

  <script>
    let deferredInstallPrompt=null;
    window.addEventListener('beforeinstallprompt',event=>{
      event.preventDefault();
      deferredInstallPrompt=event;
    });

    function isIos(){return /iphone|ipad|ipod/i.test(navigator.userAgent);}
    function isAndroid(){return /android/i.test(navigator.userAgent);}
    function isSafari(){
      const ua=navigator.userAgent;
      return /safari/i.test(ua)&&!/crios|fxios|edgios|micromessenger/i.test(ua);
    }
    function isWeChat(){return /micromessenger/i.test(navigator.userAgent);}

    function renderSteps(){
      const pill=document.getElementById('device-pill');
      const box=document.getElementById('pwa-steps');
      const steps=isWeChat()
        ? ['点右上角三个点|先选择在 Safari 或浏览器打开', '打开后点分享或菜单|选择添加到主屏幕', '确认添加|下次从桌面打开华伴']
        : isIos()
          ? ['点 Safari 下方分享按钮|如果不是 Safari，请先用 Safari 打开', '选择添加到主屏幕|没看到就向下滑一下', '点右上角添加|下次从桌面打开华伴']
          : ['点添加到屏幕|安卓 Chrome 可能直接弹安装框', '选择安装应用|也可能叫添加到主屏幕', '确认添加|下次从桌面打开华伴'];
      pill.textContent=isWeChat()?'微信内浏览器':isIos()?'iPhone / iPad':isAndroid()?'Android 手机':'当前浏览器';
      box.innerHTML=steps.map((item,index)=>{
        const parts=item.split('|');
        return `<div class="step"><b>👉</b><div><strong>${index+1}. ${parts[0]}</strong><span>${parts[1]||''}</span></div></div>`;
      }).join('');
    }

    async function installToHome(){
      if(deferredInstallPrompt){
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice.catch(()=>null);
        deferredInstallPrompt=null;
        return;
      }
      if(isIos()&&navigator.share){
        try{
          await navigator.share({title:'华伴',text:'把华伴添加到手机屏幕，下次一秒打开。',url:'https://www.huabanapp.com/ai'});
          return;
        }catch(e){}
      }
      alert(isIos()?'请点 Safari 底部分享按钮，选择“添加到主屏幕”。':'请点浏览器菜单，选择“安装应用”或“添加到主屏幕”。');
    }

    async function copyOfficialLink(){
      const text='https://www.huabanapp.com/ai';
      try{
        await navigator.clipboard.writeText(text);
        alert('链接已复制');
      }catch(e){
        prompt('复制这个链接',text);
      }
    }

    document.getElementById('install-btn').addEventListener('click',installToHome);
    document.getElementById('copy-link-btn').addEventListener('click',copyOfficialLink);
    renderSteps();
  </script>
</body>
</html>
