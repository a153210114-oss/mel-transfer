<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>华伴 AI+ | 智能匹配与交易确认</title>
  <meta name="description" content="华伴 AI+ 1.1：智能匹配供需，协助交易双方整理共识、确认履约和记录积分。">
  <link rel="icon" href="assets/brand/huaban-logo-v1.png">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #101419;
      --panel: #18212b;
      --panel-2: #202b36;
      --line: rgba(255,255,255,.12);
      --text: #eef5f1;
      --muted: rgba(238,245,241,.68);
      --brand: #13c96b;
      --brand-2: #00a878;
      --gold: #f6d76b;
      --danger: #ff6868;
      --shadow: 0 18px 50px rgba(0,0,0,.32);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        radial-gradient(circle at 80% -10%, rgba(19,201,107,.16), transparent 35%),
        linear-gradient(180deg, #0d1218 0%, #11161c 100%);
    }

    .topbar {
      min-height: 74px;
      padding: max(14px, env(safe-area-inset-top)) 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: rgba(13,18,24,.9);
      backdrop-filter: blur(16px);
      z-index: 3;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #fff;
      object-fit: contain;
    }

    .brand-title {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .brand-title strong {
      font-size: 16px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand-title span {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .identity-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(19,201,107,.32);
      background: rgba(19,201,107,.1);
      color: #dfffea;
      border-radius: 999px;
      padding: 8px 10px;
      min-width: 0;
      max-width: 46vw;
    }

    .identity-pill img {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: #fff;
    }

    .identity-pill .meta {
      display: grid;
      gap: 1px;
      min-width: 0;
      text-align: left;
    }

    .identity-pill b {
      font-size: 12px;
      color: var(--brand);
      white-space: nowrap;
    }

    .identity-pill small {
      font-size: 11px;
      color: rgba(238,245,241,.7);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat {
      overflow-y: auto;
      padding: 16px 14px 24px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      margin: 12px 0;
      align-items: flex-start;
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      border-radius: 9px;
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .bubble {
      max-width: min(78vw, 660px);
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      line-height: 1.58;
      font-size: 15px;
      word-break: break-word;
      box-shadow: 0 8px 22px rgba(0,0,0,.12);
    }

    .msg-row.user .bubble {
      background: #08794c;
      border-color: rgba(255,255,255,.08);
      color: #fff;
    }

    .bubble a {
      color: #6ff0ac;
      font-weight: 700;
      text-decoration: none;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 13px;
      white-space: nowrap;
    }

    .chip.primary {
      background: var(--brand);
      color: #08120d;
      border-color: transparent;
      font-weight: 800;
    }

    .composer {
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(16,20,25,.96);
      backdrop-filter: blur(18px);
      display: grid;
      gap: 10px;
      z-index: 4;
    }

    .input-line {
      display: grid;
      grid-template-columns: 44px 44px 1fr 44px 54px;
      gap: 8px;
      align-items: center;
    }

    .icon-btn, .send-btn {
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      display: grid;
      place-items: center;
      font-size: 19px;
      color: var(--text);
    }

    .icon-btn.active {
      border-color: rgba(19,201,107,.75);
      color: #8dffbd;
      background: rgba(19,201,107,.14);
    }

    .send-btn {
      background: var(--brand);
      color: #06130b;
      font-size: 15px;
      font-weight: 800;
    }

    .send-btn:disabled {
      opacity: .42;
      cursor: default;
    }

    .text-input {
      min-width: 0;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .text-input::placeholder {
      color: rgba(238,245,241,.46);
    }

    .tool-grid {
      display: none;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding-top: 2px;
    }

    .tool-grid.open {
      display: grid;
    }

    .tool {
      min-height: 72px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.055);
      display: grid;
      place-items: center;
      gap: 5px;
      padding: 10px 6px;
    }

    .tool b {
      font-size: 22px;
      line-height: 1;
    }

    .tool span {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .sheet {
      position: fixed;
      inset: auto 0 0 0;
      transform: translateY(110%);
      transition: transform .22s ease;
      z-index: 10;
      background: #121a22;
      border-top: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 18px 18px 0 0;
      max-height: 78dvh;
      overflow-y: auto;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
    }

    .sheet.open {
      transform: translateY(0);
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .sheet h2 {
      margin: 0;
      font-size: 19px;
    }

    .close {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
    }

    .card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.055);
      border-radius: 12px;
      padding: 13px;
      margin: 10px 0;
      line-height: 1.55;
    }

    .card strong {
      color: var(--gold);
    }

    .field {
      display: grid;
      gap: 7px;
      margin: 12px 0;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
    }

    .field input, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 11px;
      outline: none;
      resize: vertical;
    }

    .sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .primary-btn, .secondary-btn {
      min-height: 44px;
      border-radius: 11px;
      font-weight: 800;
      padding: 10px 12px;
    }

    .primary-btn {
      background: var(--brand);
      color: #06130b;
    }

    .secondary-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .notice {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 9;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    @media (min-width: 820px) {
      .chat { padding-inline: max(18px, calc((100vw - 880px) / 2)); }
      .composer { padding-inline: max(14px, calc((100vw - 880px) / 2)); }
      .sheet {
        left: 50%;
        width: min(680px, calc(100vw - 24px));
        transform: translate(-50%, 110%);
        border-radius: 18px;
        bottom: 14px;
      }
      .sheet.open { transform: translate(-50%, 0); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="brand" id="brandHome" type="button" aria-label="打开官网">
        <img src="assets/brand/huaban-logo-v1.png" alt="华伴">
        <span class="brand-title">
          <strong>华伴 AI+</strong>
          <span>1.1 智能匹配与交易确认</span>
        </span>
      </button>
      <button class="identity-pill" id="profileBtn" type="button" aria-label="个人中心">
        <img src="assets/brand/huaban-logo-v1.png" alt="">
        <span class="meta">
          <b id="levelText">一级</b>
          <small id="pointText">读取积分中</small>
        </span>
      </button>
    </header>

    <section class="chat" id="chat" aria-live="polite"></section>

    <footer class="composer">
      <div class="tool-grid" id="toolGrid">
        <button class="tool" type="button" data-tool="official"><b>⌂</b><span>官网</span></button>
        <button class="tool" type="button" data-tool="profile"><b>☻</b><span>个人中心</span></button>
        <button class="tool" type="button" data-tool="share"><b>↗</b><span>分享华伴</span></button>
        <button class="tool" type="button" data-tool="match"><b>◎</b><span>智能匹配</span></button>
        <button class="tool" type="button" data-tool="contract"><b>□</b><span>交易确认</span></button>
        <button class="tool" type="button" data-tool="location"><b>⌖</b><span>发送位置</span></button>
        <button class="tool" type="button" data-tool="points"><b>◇</b><span>积分规则</span></button>
        <button class="tool" type="button" data-tool="feedback"><b>!</b><span>反馈问题</span></button>
      </div>
      <div class="input-line">
        <button class="icon-btn" id="voiceModeBtn" type="button" aria-label="语音模式">▥</button>
        <button class="icon-btn" id="voiceInputBtn" type="button" aria-label="语音输入">⌕</button>
        <input class="text-input" id="messageInput" placeholder="直接告诉华伴你要做什么" autocomplete="off">
        <button class="icon-btn" id="menuBtn" type="button" aria-label="功能菜单">＋</button>
        <button class="send-btn" id="sendBtn" type="button" disabled>发送</button>
      </div>
    </footer>
  </main>

  <div class="backdrop" id="backdrop"></div>
  <section class="sheet" id="sheet" aria-modal="true" role="dialog">
    <div class="sheet-head">
      <h2 id="sheetTitle">华伴</h2>
      <button class="close" id="sheetClose" type="button">关闭</button>
    </div>
    <div id="sheetBody"></div>
  </section>

  <script>
    const API_ORIGIN = 'https://www.huabanapp.com';
    const LOGO = 'assets/brand/huaban-logo-v1.png';
    const STORE = {
      accessToken: 'huaban_auth_access_token',
      friendCode: 'huaban_device_friend_code',
      name: 'huaban_user_name',
      industry: 'huaban_user_industry',
      avatar: 'huaban_user_avatar',
      verifiedPhone: 'huaban_phone_verified_phone'
    };

    const state = {
      profile: null,
      busy: false,
      voiceMode: false,
      lastLocation: null
    };

    const $ = (id) => document.getElementById(id);
    const chat = $('chat');
    const input = $('messageInput');
    const sendBtn = $('sendBtn');
    const menuBtn = $('menuBtn');
    const toolGrid = $('toolGrid');
    const voiceModeBtn = $('voiceModeBtn');
    const voiceInputBtn = $('voiceInputBtn');
    const sheet = $('sheet');
    const sheetTitle = $('sheetTitle');
    const sheetBody = $('sheetBody');
    const backdrop = $('backdrop');

    function apiUrl(path) {
      return location.protocol === 'file:' ? `${API_ORIGIN}${path}` : path;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function ensureFriendCode() {
      const current = localStorage.getItem(STORE.friendCode);
      if (current) return current;
      const code = Math.random().toString(36).slice(2, 8).toUpperCase();
      localStorage.setItem(STORE.friendCode, code);
      return code;
    }

    function localName() {
      return localStorage.getItem(STORE.name) || '华伴用户';
    }

    function localIndustry() {
      return localStorage.getItem(STORE.industry) || '';
    }

    function authToken() {
      return localStorage.getItem(STORE.accessToken) || '';
    }

    function verifiedPhone() {
      return localStorage.getItem(STORE.verifiedPhone) || '';
    }

    function collectIdentityCodes() {
      const codes = new Set([ensureFriendCode()]);
      try {
        const cached = JSON.parse(localStorage.getItem('huaban_profile_cache') || 'null');
        if (cached?.ref) codes.add(cached.ref);
      } catch (error) {}
      for (let i = 0; i < localStorage.length; i += 1) {
        const key = localStorage.key(i);
        if (!key) continue;
        if (key.startsWith('huaban_identity_code_') || key.startsWith('huaban_device_alias_')) {
          if (key.startsWith('huaban_device_alias_')) codes.add(key.replace('huaban_device_alias_', ''));
          const value = localStorage.getItem(key);
          if (value) codes.add(value);
        }
      }
      return Array.from(codes).filter(Boolean);
    }

    function addMessage(role, content, options = {}) {
      const row = document.createElement('div');
      row.className = `msg-row ${role === 'user' ? 'user' : 'assistant'}`;
      const avatar = role === 'user'
        ? `<div class="avatar">${escapeHtml((localStorage.getItem(STORE.avatar) || '人'))}</div>`
        : `<div class="avatar"><img src="${LOGO}" alt=""></div>`;
      row.innerHTML = role === 'user'
        ? `<div class="bubble">${content}</div>${avatar}`
        : `${avatar}<div class="bubble">${content}</div>`;
      if (options.actions) {
        row.querySelector('.bubble').insertAdjacentHTML('beforeend', `<div class="quick-actions">${options.actions}</div>`);
      }
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      return row;
    }

    function addAssistant(text, actions = '') {
      return addMessage('assistant', text, actions ? { actions } : {});
    }

    function addUser(text) {
      return addMessage('user', escapeHtml(text));
    }

    function setBusy(flag) {
      state.busy = flag;
      sendBtn.disabled = flag || !input.value.trim();
      input.disabled = flag;
    }

    function updateHeader() {
      const points = state.profile?.points?.total ?? 0;
      const stage = state.profile?.release?.stage || 1;
      const friendCount = state.profile?.friends?.length ?? 0;
      $('levelText').textContent = `${stage}级`;
      $('pointText').textContent = `${points}积分 · ${friendCount}好友`;
    }

    async function loadProfileSummary() {
      const token = authToken();
      if (!token) {
        state.profile = null;
        updateHeader();
        return;
      }
      try {
        const res = await fetch(apiUrl('/api/profile-summary'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            accessToken: token,
            phone: verifiedPhone(),
            friendCode: ensureFriendCode(),
            identityCodes: collectIdentityCodes()
          })
        });
        if (!res.ok) throw new Error(`profile-summary ${res.status}`);
        state.profile = await res.json();
      } catch (error) {
        console.warn(error);
        state.profile = null;
      }
      updateHeader();
    }

    function openSheet(title, html) {
      sheetTitle.textContent = title;
      sheetBody.innerHTML = html;
      backdrop.classList.add('open');
      sheet.classList.add('open');
    }

    function closeSheet() {
      sheet.classList.remove('open');
      backdrop.classList.remove('open');
    }

    function shareLink() {
      const ref = ensureFriendCode();
      const params = new URLSearchParams();
      params.set('ref', ref);
      params.set('friend', ref);
      params.set('card_by', ref);
      const name = localName();
      const industry = localIndustry();
      const avatar = localStorage.getItem(STORE.avatar) || '';
      if (name && name !== '华伴用户') params.set('card_name', name);
      if (industry) params.set('card_industry', industry);
      if (avatar && avatar !== '👤') params.set('card_avatar', avatar);
      return `${location.protocol === 'file:' ? API_ORIGIN : location.origin}/ai.html?${params.toString()}`;
    }

    async function shareHuaban() {
      const url = shareLink();
      const text = '朋友帮你生成可扩展名片并在华伴应用程序上推广。先让别人知道你能提供什么，未来还可以创建店铺或商务中心。';
      if (navigator.share) {
        try {
          await navigator.share({ title: '华伴 AI+', text, url });
          addAssistant('分享面板已经打开。对方通过你的链接进入并完成手机号验证后，推荐关系和积分会由系统自动入账。');
          return;
        } catch (error) {
          if (error.name === 'AbortError') return;
        }
      }
      await copyText(url);
      addAssistant(`链接已复制：<a href="${escapeHtml(url)}" target="_blank" rel="noopener">打开分享链接</a>`);
    }

    function sourceContext() {
      const params = new URLSearchParams(location.search);
      let pending = {};
      try {
        pending = JSON.parse(localStorage.getItem('huaban_pending_referral') || '{}') || {};
      } catch (error) {}
      return {
        source_ref: (params.get('ref') || sessionStorage.getItem('incoming_ref') || localStorage.getItem('huaban_pending_referrer_code') || pending.code || '').trim(),
        source_channel: params.get('channel') || pending.source || 'ai_chat',
        source_campaign: params.get('campaign') || '',
        source_url: location.href
      };
    }

    async function shareSupplyInvite() {
      const url = state.lastSupplyInviteUrl || '';
      if (!url) {
        addAssistant('还没有可分享的供给方邀请链接。你先说一个真实需求，我会根据需求生成。');
        return;
      }
      const text = '有人正在华伴找你这样的服务。点开完善名片后，你既能被需要的人找到，也会成为华伴供给侧资源。';
      if (navigator.share) {
        try {
          await navigator.share({ title: '华伴供给方邀请', text, url });
          addAssistant('邀请链接已经打开分享面板。对方进入并完成资料/手机号验证后，关系和贡献会进入后台账本。');
          return;
        } catch (error) {
          if (error.name === 'AbortError') return;
        }
      }
      await copyText(url);
      addAssistant(`邀请链接已复制：<a href="${escapeHtml(url)}" target="_blank" rel="noopener">打开链接</a>`);
    }

    async function copyText(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      el.remove();
    }

    function showPoints() {
      const p = state.profile?.points || { total: 0, base: 0, direct: 0, second: 0, pending: 0, pending_bind: 0 };
      const stage = state.profile?.release?.stage || 1;
      openSheet('积分规则和等级说明', `
        <div class="card"><strong>当前积分 ${p.total}</strong><br>基础 ${p.base || 0} · 一级 ${p.direct || 0} · 二级 ${p.second || 0} · 待处理 ${p.pending || 0} · 待绑定 ${p.pending_bind || 0}</div>
        <div class="card"><strong>当前等级 ${stage}级</strong><br>积分池按规则释放。每释放一半，等级自动进入下一阶段；下一次释放积分池，你的权益可翻一番。</div>
        <div class="card">推荐好友完成身份确认、双方完成真实交易确认、履约完成后双方确认，都会形成积分贡献。积分记录参与和信用，未来会影响权益、等级和可分配收益权重。</div>
        <p class="notice">积分以后台账本为准，前端只负责显示。积分不可转让，不是证券、虚拟货币或投资凭证。</p>
        <div class="sheet-actions">
          <button class="primary-btn" onclick="location.href='profile.html'">去个人中心</button>
          <button class="secondary-btn" onclick="closeSheet()">知道了</button>
        </div>
      `);
    }

    function showContractGuide() {
      openSheet('交易确认', `
        <div class="card">
          我是华伴 AI，这次临时会话我只做一件事：帮卖方把交易说清楚，让买方一眼能确认。双方在华伴内确认交易内容，并在完成后共同确认履约完整，系统就会保存交易共识、履约证明、信用记录和积分贡献。
        </div>
        <div class="field"><label>服务或商品</label><input id="contractService" placeholder="例如：水管维修、家政清洁、奶粉代购"></div>
        <div class="field"><label>价格和支付方式</label><input id="contractPrice" placeholder="例如：AUD 99，完成后转账"></div>
        <div class="field"><label>时间和地点</label><input id="contractTimePlace" placeholder="例如：今天 18:00，客户家里"></div>
        <div class="field"><label>责任边界和完成标准</label><textarea id="contractTerms" rows="4" placeholder="包含什么、不包含什么、如何算完成、售后怎么处理"></textarea></div>
        <label class="notice"><input id="contractAgree" type="checkbox"> 双方已阅读并同意服务条款和隐私政策，确认本卡片只整理事实和共识，不替任何一方作最终决定。</label>
        <div class="sheet-actions">
          <button class="primary-btn" onclick="buildContractCard()">生成确认卡</button>
          <button class="secondary-btn" onclick="closeSheet()">先返回</button>
        </div>
      `);
    }

    function buildContractCard() {
      const agree = document.getElementById('contractAgree')?.checked;
      if (!agree) {
        alert('请先勾选双方同意。');
        return;
      }
      const service = document.getElementById('contractService').value.trim();
      const price = document.getElementById('contractPrice').value.trim();
      const timePlace = document.getElementById('contractTimePlace').value.trim();
      const terms = document.getElementById('contractTerms').value.trim();
      closeSheet();
      addAssistant(`
        <strong>交易确认卡</strong><br>
        服务/商品：${escapeHtml(service || '待补充')}<br>
        价格/支付：${escapeHtml(price || '待补充')}<br>
        时间/地点：${escapeHtml(timePlace || '待补充')}<br>
        责任边界/完成标准：${escapeHtml(terms || '待补充')}<br><br>
        买方确认前可以直接说哪里要改；卖方补充后，我会重新整理。双方确认履约完成后，各自形成交易积分贡献。
      `);
    }

    function showMatchPrompt() {
      addAssistant('你可以直接说清楚要找谁、要什么服务、所在城市、预算、时间和特殊要求。我会先帮你整理需求，再提示下一步该用哪个按键。');
      input.value = '我想找本地';
      input.focus();
      sendBtn.disabled = false;
    }

    function demandStatusLabel(status) {
      const map = {
        need_info: '待补充',
        human_review: '待人工确认',
        matching: '匹配中',
        matched: '已匹配',
        closed: '已关闭'
      };
      return map[status] || status || '已记录';
    }

    function renderDemandCard(data) {
      const demand = data.demand || {};
      const missing = Array.isArray(data.missing_fields) ? data.missing_fields : [];
      const inviteUrl = data.supply_invite_url || '';
      if (inviteUrl) state.lastSupplyInviteUrl = inviteUrl;
      const summary = demand.summary || demand.raw_text || '已记录需求';
      const supplyText = Number(data.supply_count || 0) > 0
        ? `供给库暂时找到 ${Number(data.supply_count || 0)} 个可参考对象，等待人工确认。`
        : '当前供给库还没有足够匹配，我已生成协作找线索任务。你可以把邀请链接发给真实服务者。';
      const missingText = missing.length ? `<br><span class="notice">还缺：${escapeHtml(missing.join('、'))}</span>` : '';
      const actions = `
        <button class="chip primary" onclick="showMatchPrompt()">补充需求</button>
        ${inviteUrl ? '<button class="chip" onclick="shareSupplyInvite()">邀请供给方</button>' : ''}
        <button class="chip" onclick="location.href='profile.html'">个人中心</button>
      `;
      addAssistant(`
        <strong>需求确认卡</strong><br>
        ${escapeHtml(summary)}<br>
        状态：${escapeHtml(demandStatusLabel(demand.status))}<br>
        ${escapeHtml(supplyText)}${missingText}<br><br>
        供给方点开邀请链接后，完善资料并完成手机号验证，就会进入华伴供给侧；推荐关系和贡献奖励先进入后台账本，审核后确认。
      `, actions);
    }

    async function createDemandCard(text) {
      const payload = {
        text,
        requester_code: ensureFriendCode(),
        requester_phone: verifiedPhone(),
        city: state.lastLocation?.city || '',
        ...sourceContext()
      };
      const res = await fetch(apiUrl('/api/demand-cards'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(json.error || `demand-cards ${res.status}`);
      renderDemandCard(json);
      return json;
    }

    function showFeedbackPrompt() {
      addAssistant('把问题直接告诉我：哪里不好用、发生在哪一步、手机型号或浏览器是什么。我会先记录问题，再帮你整理成可修复的反馈。');
      input.value = '我要反馈：';
      input.focus();
      sendBtn.disabled = false;
    }

    function sendLocation() {
      if (!navigator.geolocation) {
        addAssistant('当前浏览器不支持定位。你可以在个人中心手动添加家、公司或服务地址。');
        return;
      }
      addAssistant('我正在请求当前位置。网页端只能拿到浏览器允许的定位结果；详细地址可以在个人中心标注为家、公司或服务地点。');
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);
        const url = `https://www.google.com/maps?q=${lat},${lng}`;
        state.lastLocation = { lat, lng, url };
        addAssistant(`当前位置已生成地图链接：<a href="${url}" target="_blank" rel="noopener">打开地图</a><br>如果这是常用地点，请到个人中心把它标注为家、公司或服务地点。`, `
          <button class="chip primary" onclick="location.href='profile.html'">去个人中心标注</button>
          <button class="chip" onclick="copyText('${url}').then(()=>addAssistant('地图链接已复制。'))">复制地图链接</button>
        `);
      }, (error) => {
        addAssistant(`定位没有完成：${escapeHtml(error.message || '浏览器没有返回位置')}。请检查浏览器定位权限，或在个人中心手动添加地址。`);
      }, { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 });
    }

    function toggleTools() {
      toolGrid.classList.toggle('open');
    }

    function handleTool(tool) {
      toolGrid.classList.remove('open');
      if (tool === 'official') location.href = 'index.html';
      if (tool === 'profile') location.href = 'profile.html';
      if (tool === 'share') shareHuaban();
      if (tool === 'match') showMatchPrompt();
      if (tool === 'contract') showContractGuide();
      if (tool === 'location') sendLocation();
      if (tool === 'points') showPoints();
      if (tool === 'feedback') showFeedbackPrompt();
    }

    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        addAssistant('这个浏览器暂不支持网页语音输入。你可以用手机键盘自带语音输入，或直接打字。');
        return;
      }
      const recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      voiceInputBtn.classList.add('active');
      recognition.onresult = (event) => {
        input.value = event.results[0][0].transcript || '';
        sendBtn.disabled = !input.value.trim();
      };
      recognition.onerror = () => addAssistant('语音识别没有成功。你可以再点一次麦克风，或直接打字。');
      recognition.onend = () => voiceInputBtn.classList.remove('active');
      recognition.start();
    }

    function toggleVoiceMode() {
      state.voiceMode = !state.voiceMode;
      voiceModeBtn.classList.toggle('active', state.voiceMode);
      input.placeholder = state.voiceMode ? '按麦克风说话，或直接输入' : '直接告诉华伴你要做什么';
      if (state.voiceMode) startVoiceInput();
    }

    function detectIntent(text) {
      if (/积分|等级|权益|奖励/.test(text)) return 'points';
      if (/分享|推荐|邀请|二维码|名片推广/.test(text)) return 'share';
      if (/个人中心|注册|登录|手机号|验证码|身份/.test(text)) return 'profile';
      if (/交易|合约|确认|履约|支付|订单|成交/.test(text)) return 'contract';
      if (/定位|地址|位置|地图|公司|家里/.test(text)) return 'location';
      if (/匹配|找人|找服务|找本地|需要.*人/.test(text)) return 'match';
      if (/反馈|不好用|bug|问题/.test(text)) return 'feedback';
      return 'chat';
    }

    async function askAi(text) {
      const system = [
        '你是华伴 AI+ 1.1 的主助手。',
        '定位：服务华人先行，再多语种服务所有人的实用 AI 工具。',
        '当前版本核心：智能匹配供需，协助交易双方整理服务内容、价格、时间、责任边界、支付方式，形成可确认的共识。',
        '不要编造已完成的系统动作；涉及积分、推荐关系、交易记录时，要说明以系统账本为准。手机号验证码通过后即完成用户身份确认，不要再增加额外身份确认阶段。',
        '保持简洁、可靠、可执行。用户要找人或服务时，先澄清需求，再引导生成确认卡或去个人中心完善身份。',
        '不要主动带出历史旧业务定位；除非用户明确提出某个具体服务，否则始终围绕智能匹配、交易确认、积分记录和个人中心。'
      ].join('\n');
      const res = await fetch(apiUrl('/api/chat'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system,
          region: 'auto',
          messages: [{ role: 'user', content: text }]
        })
      });
      if (!res.ok) throw new Error(`chat ${res.status}`);
      const data = await res.json();
      return data?.content?.[0]?.text || data?.text || '我收到了，但这次没有生成明确回复。';
    }

    async function sendCurrentMessage() {
      const text = input.value.trim();
      if (!text || state.busy) return;
      input.value = '';
      sendBtn.disabled = true;
      addUser(text);
      const intent = detectIntent(text);

      if (intent === 'points') return showPoints();
      if (intent === 'share') return shareHuaban();
      if (intent === 'profile') {
        addAssistant('身份、手机号验证、积分和好友关系都在个人中心统一查看。', `<button class="chip primary" onclick="location.href='profile.html'">打开个人中心</button>`);
        return;
      }
      if (intent === 'contract') return showContractGuide();
      if (intent === 'location') return sendLocation();
      if (intent === 'match') {
        setBusy(true);
        const pending = addAssistant('我先把这句话整理成需求卡，并检查供给库...');
        try {
          const data = await createDemandCard(text);
          const bubble = pending.querySelector('.bubble');
          if (bubble) bubble.innerHTML = `需求已进入后台：${escapeHtml(data.demand?.summary || text)}。`;
        } catch (error) {
          pending.querySelector('.bubble').innerHTML = '需求卡暂时没有写入后台。我先帮你在会话里整理，稍后可以重试。';
          console.warn(error);
          try {
            const answer = await askAi(text);
            addAssistant(escapeHtml(answer).replace(/\n/g, '<br>'));
          } catch (chatError) {
            console.warn(chatError);
          }
        } finally {
          setBusy(false);
        }
        return;
      }
      if (intent === 'feedback') {
        addAssistant('问题我先记下来。请补一句：发生在哪个页面、点了哪个按钮、手机和浏览器是什么。');
      }

      setBusy(true);
      const pending = addAssistant('我在整理...');
      try {
        const answer = await askAi(text);
        pending.querySelector('.bubble').innerHTML = escapeHtml(answer).replace(/\n/g, '<br>');
      } catch (error) {
        pending.querySelector('.bubble').innerHTML = 'AI 接口暂时没有返回。你可以继续描述需求，我会先在本页帮你整理。';
        console.warn(error);
      } finally {
        setBusy(false);
      }
    }

    function applyIncomingReferral() {
      const params = new URLSearchParams(location.search);
      const ref = params.get('ref') || params.get('friend');
      if (ref) {
        const cleanRef = String(ref).replace(/[^a-zA-Z0-9_-]/g, '').trim().toUpperCase();
        if (!cleanRef) return;
        const refName = (params.get('card_name') || '').trim();
        const refIndustry = (params.get('card_industry') || '').trim();
        const refAvatar = (params.get('card_avatar') || '').trim();
        sessionStorage.setItem('incoming_ref', cleanRef);
        sessionStorage.setItem('incoming_friend_code', cleanRef);
        localStorage.setItem('huaban_pending_referrer_code', cleanRef);
        localStorage.setItem('huaban_pending_referral', JSON.stringify({
          code: cleanRef,
          cardBy: params.get('card_by') || cleanRef,
          name: refName,
          industry: refIndustry,
          avatar: refAvatar,
          targetName: params.get('target_name') || '',
          targetIndustry: params.get('target_industry') || '',
          targetPhone: params.get('target_phone') || '',
          source: 'ai_url_referral',
          savedAt: new Date().toISOString()
        }));
        const label = refName ? `${escapeHtml(refName)} 的名片` : `身份码 ${escapeHtml(cleanRef)}`;
        addAssistant(`你是通过 ${label} 进入华伴的。我已经记录来源。先到个人中心保存姓名、手机号或行业任一项；完成手机号验证并取得身份令牌后，系统会自动绑定推荐关系，好友和积分以系统账本为准。`, `
          <button class="chip primary" onclick="location.href='profile.html'">去个人中心保存</button>
          <button class="chip" onclick="showPoints()">查看积分激励</button>
        `);
      }
    }

    function applyIncomingSupplyInvite() {
      const params = new URLSearchParams(location.search);
      if (params.get('intent') !== 'supply_invite') return;
      const service = params.get('service') || 'local_service';
      const city = params.get('city') || '';
      const demand = params.get('demand') || '';
      localStorage.setItem('huaban_pending_supply_invite', JSON.stringify({
        demand,
        service,
        city,
        ref: params.get('ref') || '',
        savedAt: new Date().toISOString()
      }));
      const serviceText = service === 'electrician' ? '电工服务' : service;
      addAssistant(`
        有人正在华伴寻找${city ? escapeHtml(city) + ' ' : ''}${escapeHtml(serviceText)}。<br>
        如果你能提供这类服务，可以先保存姓名、手机号、行业或服务内容。完成手机号验证后，你会进入华伴供给侧资源库；推荐关系和贡献奖励以后台账本为准。
      `, `
        <button class="chip primary" onclick="location.href='profile.html'">完善供给名片</button>
        <button class="chip" onclick="showPoints()">查看积分规则</button>
      `);
    }

    function bootstrapMessages() {
      addAssistant(
        '我是华伴 AI。现在我先帮你把真实需求说清楚、把能提供服务的人留下来、把推荐和贡献记进后台账本。你不用研究功能键，直接一句话指挥我：例如“我想找墨尔本电工”“帮我生成服务名片”“我要分享华伴”。我能做的会继续推进，暂时做不到的会记录成需求或协作任务，让更多人一起补上。',
        `<button class="chip primary" onclick="showMatchPrompt()">智能匹配</button>
         <button class="chip" onclick="location.href='profile.html'">创建名片</button>
         <button class="chip" onclick="showContractGuide()">交易确认</button>
         <button class="chip" onclick="shareHuaban()">分享华伴</button>
         <button class="chip" onclick="location.href='profile.html'">个人中心</button>`
      );
      applyIncomingReferral();
      applyIncomingSupplyInvite();
    }

    input.addEventListener('input', () => {
      sendBtn.disabled = state.busy || !input.value.trim();
    });
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendCurrentMessage();
      }
    });
    sendBtn.addEventListener('click', sendCurrentMessage);
    menuBtn.addEventListener('click', toggleTools);
    voiceInputBtn.addEventListener('click', startVoiceInput);
    voiceModeBtn.addEventListener('click', toggleVoiceMode);
    $('brandHome').addEventListener('click', () => { location.href = 'index.html'; });
    $('profileBtn').addEventListener('click', () => { location.href = 'profile.html'; });
    $('sheetClose').addEventListener('click', closeSheet);
    backdrop.addEventListener('click', closeSheet);
    toolGrid.addEventListener('click', (event) => {
      const btn = event.target.closest('[data-tool]');
      if (btn) handleTool(btn.dataset.tool);
    });

    window.closeSheet = closeSheet;
    window.showPoints = showPoints;
    window.shareHuaban = shareHuaban;
    window.showMatchPrompt = showMatchPrompt;
    window.showContractGuide = showContractGuide;
    window.buildContractCard = buildContractCard;
    window.shareSupplyInvite = shareSupplyInvite;
    window.copyText = copyText;
    window.addAssistant = addAssistant;

    ensureFriendCode();
    updateHeader();
    bootstrapMessages();
    loadProfileSummary();
  </script>
</body>
</html>
