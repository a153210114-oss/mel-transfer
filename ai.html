<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>华伴 AI+ | 智能匹配与交易确认</title>
  <meta name="description" content="华伴 AI+ 1.1：智能匹配供需，协助交易双方整理共识、确认履约和记录积分。">
  <link rel="icon" href="assets/brand/huaban-logo-v1.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --panel: #ffffff;
      --panel-2: #f0f2ee;
      --line: rgba(15, 23, 18, .1);
      --text: #111820;
      --muted: rgba(17, 24, 32, .55);
      --brand: #13c96b;
      --brand-2: #00a878;
      --gold: #f6d76b;
      --danger: #ff6868;
      --shadow: 0 18px 50px rgba(0,0,0,.32);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        radial-gradient(circle at 50% 4%, rgba(19,201,107,.08), transparent 30%),
        linear-gradient(180deg, #fbfcfa 0%, #f3f5f1 100%);
    }

    .topbar {
      min-height: 82px;
      padding: max(14px, env(safe-area-inset-top)) 22px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0;
      background: transparent;
      z-index: 3;
    }

    .round-nav {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(17,24,32,.06);
      background: rgba(255,255,255,.86);
      box-shadow: 0 12px 30px rgba(17,24,32,.08);
      display: grid;
      place-items: center;
      color: #141a20;
      font-size: 23px;
      font-weight: 800;
    }

    .round-nav img {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      object-fit: contain;
    }

    .brand {
      display: none;
    }

    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #fff;
      object-fit: contain;
    }

    .brand-title {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .brand-title strong {
      font-size: 16px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand-title span {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat {
      overflow-y: auto;
      padding: 0 16px 24px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .home-hero {
      min-height: calc(100dvh - 210px);
      display: grid;
      place-items: center;
      text-align: center;
      color: #1a211c;
      padding-bottom: 56px;
    }

    .home-hero.hidden {
      display: none;
    }

    .hero-inner {
      display: grid;
      place-items: center;
      gap: 14px;
    }

    .hero-inner img {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 14px 36px rgba(19,201,107,.12);
    }

    .hero-inner h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: clamp(26px, 8vw, 38px);
      font-weight: 500;
      letter-spacing: 0;
    }

    .hero-inner p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 300px;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      margin: 12px 0;
      align-items: flex-start;
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      border-radius: 9px;
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .bubble {
      max-width: min(78vw, 660px);
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      line-height: 1.58;
      font-size: 15px;
      word-break: break-word;
      box-shadow: 0 8px 22px rgba(0,0,0,.12);
    }

    .msg-row.user .bubble {
      background: #08794c;
      border-color: rgba(255,255,255,.08);
      color: #fff;
    }

    .bubble a {
      color: #6ff0ac;
      font-weight: 700;
      text-decoration: none;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(17,24,32,.05);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 13px;
      white-space: nowrap;
    }

    .chip.primary {
      background: var(--brand);
      color: #08120d;
      border-color: transparent;
      font-weight: 800;
    }

    .composer {
      padding: 10px 22px calc(14px + env(safe-area-inset-bottom));
      border-top: 0;
      background: transparent;
      display: grid;
      gap: 10px;
      z-index: 4;
    }

    .input-line {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 42px 42px 42px;
      gap: 8px;
      align-items: center;
      min-height: 70px;
      padding: 18px 10px 10px;
      border: 1px solid rgba(17,24,32,.07);
      border-radius: 24px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 18px 44px rgba(17,24,32,.1);
    }

    .composer-version {
      position: absolute;
      top: 5px;
      left: 18px;
      pointer-events: none;
      color: rgba(17,24,32,.48);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0;
      line-height: 1;
      white-space: nowrap;
    }

    .icon-btn, .send-btn {
      height: 42px;
      border-radius: 50%;
      border: 0;
      background: var(--panel-2);
      display: grid;
      place-items: center;
      font-size: 19px;
      color: var(--text);
    }

    .icon-btn.active {
      border-color: rgba(19,201,107,.75);
      color: #8dffbd;
      background: rgba(19,201,107,.14);
    }

    .send-btn {
      background: #111820;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
    }

    .send-btn:disabled {
      opacity: .42;
      cursor: default;
    }

    .text-input {
      min-width: 0;
      height: 42px;
      border-radius: 10px;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 0 2px;
      outline: none;
      font-size: 17px;
    }

    .text-input::placeholder {
      color: rgba(17,24,32,.38);
    }

    .tool-grid {
      display: none;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding-top: 2px;
    }

    .tool-grid.open {
      display: grid;
    }

    .tool {
      min-height: 72px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.055);
      display: grid;
      place-items: center;
      gap: 5px;
      padding: 10px 6px;
    }

    .tool.emergency {
      border-color: rgba(255,104,104,.46);
      background: rgba(255,104,104,.12);
    }

    .tool b {
      font-size: 22px;
      line-height: 1;
    }

    .tool span {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .sheet {
      position: fixed;
      inset: auto 0 0 0;
      transform: translateY(110%);
      transition: transform .22s ease;
      z-index: 10;
      background: #121a22;
      border-top: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 18px 18px 0 0;
      max-height: 78dvh;
      overflow-y: auto;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
    }

    .sheet.open {
      transform: translateY(0);
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .sheet h2 {
      margin: 0;
      font-size: 19px;
    }

    .close {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
    }

    .card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.055);
      border-radius: 12px;
      padding: 13px;
      margin: 10px 0;
      line-height: 1.55;
    }

    .card strong {
      color: var(--gold);
    }

    .field {
      display: grid;
      gap: 7px;
      margin: 12px 0;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
    }

    .field input, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 11px;
      outline: none;
      resize: vertical;
    }

    .sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .primary-btn, .secondary-btn {
      min-height: 44px;
      border-radius: 11px;
      font-weight: 800;
      padding: 10px 12px;
    }

    .primary-btn {
      background: var(--brand);
      color: #06130b;
    }

    .secondary-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .notice {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 9;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 39;
      background: rgba(18, 22, 20, .18);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .side-drawer {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 40;
      width: min(82vw, 348px);
      transform: translateX(-104%);
      transition: transform .24s ease;
      background: rgba(255,255,255,.96);
      color: #111820;
      box-shadow: 20px 0 60px rgba(17,24,32,.14);
      padding: max(42px, env(safe-area-inset-top)) 24px max(22px, env(safe-area-inset-bottom));
      overflow-y: auto;
    }

    .side-drawer.open {
      transform: translateX(0);
    }

    .drawer-title {
      margin: 0 0 28px;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .drawer-section {
      display: grid;
      gap: 6px;
      margin: 20px 0 26px;
    }

    .drawer-label {
      color: rgba(17,24,32,.44);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .drawer-item {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 12px;
      align-items: center;
      min-height: 48px;
      border-radius: 14px;
      background: transparent;
      color: #151b22;
      text-align: left;
      font-size: 18px;
      font-weight: 650;
    }

    .drawer-item b {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #161b20;
      font-size: 20px;
      font-weight: 700;
    }

    .drawer-item small {
      display: block;
      margin-top: 2px;
      color: rgba(17,24,32,.46);
      font-size: 12px;
      font-weight: 600;
    }

    .drawer-new {
      position: sticky;
      bottom: 0;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-top: 26px;
      padding: 13px 20px;
      border-radius: 999px;
      background: #111820;
      color: #fff;
      font-weight: 850;
      box-shadow: 0 16px 34px rgba(17,24,32,.18);
    }

    .launch-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      background: rgba(7, 10, 13, .72);
      backdrop-filter: blur(18px);
    }

    .launch-overlay.open {
      display: flex;
    }

    .launch-card {
      width: min(520px, 100%);
      border: 1px solid rgba(19,201,107,.24);
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 0%, rgba(19,201,107,.2), transparent 38%),
        linear-gradient(180deg, #f8fbf7 0%, #eef6f1 100%);
      color: #111820;
      box-shadow: 0 24px 80px rgba(0,0,0,.36);
      padding: 24px 18px 18px;
      text-align: center;
    }

    .launch-card img {
      width: 74px;
      height: 74px;
      border-radius: 20px;
      background: #fff;
      object-fit: contain;
      box-shadow: 0 12px 28px rgba(19,201,107,.16);
    }

    .launch-card h1 {
      margin: 16px 0 12px;
      font-size: clamp(24px, 7vw, 38px);
      line-height: 1.14;
      letter-spacing: 0;
    }

    .launch-copy {
      display: grid;
      gap: 10px;
      margin: 0 auto 16px;
      text-align: left;
      color: rgba(17,24,32,.82);
      line-height: 1.72;
      font-size: 16px;
      font-weight: 800;
    }

    .launch-copy p {
      margin: 0;
    }

    .launch-line {
      color: #986d16;
      text-align: center;
      font-size: 18px;
      font-weight: 950;
    }

    .launch-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .launch-actions button {
      min-height: 46px;
      border-radius: 999px;
      font-weight: 900;
      padding: 10px 12px;
    }

    .launch-primary {
      background: var(--brand);
      color: #06130b;
    }

    .launch-secondary {
      background: #fff;
      color: #15201a;
      border: 1px solid rgba(17,24,32,.12);
    }

    @media (min-width: 820px) {
      .chat { padding-inline: max(18px, calc((100vw - 880px) / 2)); }
      .composer { padding-inline: max(14px, calc((100vw - 880px) / 2)); }
      .sheet {
        left: 50%;
        width: min(680px, calc(100vw - 24px));
        transform: translate(-50%, 110%);
        border-radius: 18px;
        bottom: 14px;
      }
      .sheet.open { transform: translate(-50%, 0); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="round-nav" id="drawerBtn" type="button" aria-label="打开功能菜单">≡</button>
      <button class="round-nav" id="profileBtn" type="button" aria-label="个人中心">
        <img src="assets/brand/huaban-logo-v1.png" alt="华伴">
      </button>
    </header>

    <section class="chat" id="chat" aria-live="polite">
      <div class="home-hero" id="homeHero">
        <div class="hero-inner">
          <img src="assets/brand/huaban-logo-v1.png" alt="华伴">
          <h1 id="homeGreeting">你好，老板</h1>
          <p>一句话告诉华伴：找人、找服务、交易确认、紧急互助，都从这里开始。</p>
        </div>
      </div>
    </section>

    <footer class="composer">
      <div class="tool-grid" id="toolGrid">
        <button class="tool" type="button" data-tool="official"><b>⌂</b><span>官网</span></button>
        <button class="tool" type="button" data-tool="profile"><b>☻</b><span>个人中心</span></button>
        <button class="tool" type="button" data-tool="share"><b>↗</b><span>分享华伴</span></button>
        <button class="tool" type="button" data-tool="match"><b>◎</b><span>智能匹配</span></button>
        <button class="tool" type="button" data-tool="contract"><b>□</b><span>交易确认</span></button>
        <button class="tool emergency" type="button" data-tool="emergency"><b>!</b><span>紧急互助</span></button>
        <button class="tool" type="button" data-tool="location"><b>⌖</b><span>发送位置</span></button>
        <button class="tool" type="button" data-tool="points"><b>◇</b><span>积分规则</span></button>
        <button class="tool" type="button" data-tool="feedback"><b>!</b><span>反馈问题</span></button>
      </div>
      <div class="input-line">
        <span class="composer-version">V1.1 智能交易 · 紧急互助</span>
        <input class="text-input" id="messageInput" placeholder="直接告诉华伴你要做什么" autocomplete="off">
        <button class="icon-btn" id="menuBtn" type="button" aria-label="了解华伴">＋</button>
        <button class="icon-btn" id="voiceInputBtn" type="button" aria-label="语音输入">⌕</button>
        <button class="send-btn" id="sendBtn" type="button" disabled>▥</button>
      </div>
    </footer>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="side-drawer" id="sideDrawer" aria-label="华伴菜单">
    <h2 class="drawer-title">华伴</h2>
    <div class="drawer-section">
      <div class="drawer-label">功能菜单</div>
      <button class="drawer-item" type="button" data-drawer-tool="emergency"><b>!</b><span>紧急救助<small>快速求助，附近互助</small></span></button>
      <button class="drawer-item" type="button" data-drawer-tool="match"><b>◎</b><span>智能匹配<small>找本地需要你的人和服务</small></span></button>
      <button class="drawer-item" type="button" data-drawer-tool="contract"><b>□</b><span>交易确认<small>整理共识、确认履约</small></span></button>
      <button class="drawer-item" type="button" data-drawer-tool="social_circle"><b>○</b><span>兴趣圈子<small>附近圈骨架，暂不上线</small></span></button>
    </div>
    <div class="drawer-section">
      <div class="drawer-label">个人中心</div>
      <button class="drawer-item" type="button" data-drawer-tool="profile"><b>☻</b><span>名片<small>身份、职业和可扩展名片</small></span></button>
      <button class="drawer-item" type="button" data-drawer-tool="points"><b>◇</b><span>积分<small id="drawerPointText">读取中</small></span></button>
      <button class="drawer-item" type="button" data-drawer-tool="location"><b>⌖</b><span>地址<small>家、公司、服务地点</small></span></button>
      <button class="drawer-item" type="button" data-drawer-tool="share"><b>↗</b><span>分享<small>邀请朋友试用华伴</small></span></button>
      <button class="drawer-item" type="button" data-drawer-tool="orders"><b>▤</b><span>订单<small>交易记录和履约状态</small></span></button>
    </div>
    <button class="drawer-new" type="button" onclick="startNewChat()">＋ 新对话</button>
  </aside>

  <div class="backdrop" id="backdrop"></div>
  <section class="sheet" id="sheet" aria-modal="true" role="dialog">
    <div class="sheet-head">
      <h2 id="sheetTitle">华伴</h2>
      <button class="close" id="sheetClose" type="button">关闭</button>
    </div>
    <div id="sheetBody"></div>
  </section>

  <section class="launch-overlay" id="launchOverlay" aria-modal="true" role="dialog" aria-labelledby="launchTitle">
    <div class="launch-card">
      <img src="assets/brand/huaban-logo-v1.png" alt="华伴">
      <h1 id="launchTitle">蓄势待发，一发千钧。</h1>
      <div class="launch-copy">
        <p>错过互联网，也许只是晚了一步；错过区块链，也许只是没看懂。</p>
        <p>AI 浪潮已经来了，不投钱，不赌币，不用拉人头。</p>
        <p>只需下载、使用、分享。</p>
        <p>华伴不赚差价不抽佣；正在起飞，懂的人及早上车。不懂的永远不懂。</p>
      </div>
      <div class="launch-line">对华伴的信任，源于刻入系统规则</div>
      <div class="launch-line">点击查看积分等级奖励规则</div>
      <div class="launch-actions">
        <button class="launch-primary" type="button" onclick="openLaunchPoints()">点击查看</button>
        <button class="launch-secondary" type="button" onclick="closeLaunchPromo()">关闭</button>
      </div>
    </div>
  </section>

  <script>
    const API_ORIGIN = 'https://www.huabanapp.com';
    const LOGO = 'assets/brand/huaban-logo-v1.png';

    function parsePriceRange(text = '') {
      const raw = String(text || '').trim();
      if (!raw) return null;
      const currency = raw.match(/(?:AUD|USD|CAD|NZD|RMB|CNY|HKD|SGD|EUR|GBP|¥|\$|澳币|澳元|人民币)/i)?.[0] || '';
      const nums = (raw.match(/\d+(?:\.\d+)?/g) || []).map(Number).filter(Number.isFinite);
      if (!nums.length) return null;
      const min = Math.min(nums[0], nums[1] ?? nums[0]);
      const max = Math.max(nums[0], nums[1] ?? nums[0]);
      return { min, max, single: nums.length === 1, currency, raw };
    }

    function formatSuggestedPrice(value, currency = '') {
      const rounded = Math.round(Number(value) * 100) / 100;
      const text = Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(2).replace(/\.?0+$/, '');
      return `${currency ? `${currency} ` : ''}${text}`.trim();
    }

    function formatPriceRange(range, currency = '') {
      if (!range) return '待补充';
      const unit = currency || range.currency || '';
      return `最低 ${formatSuggestedPrice(range.min, unit)} · 最高 ${formatSuggestedPrice(range.max, unit)}`;
    }

    function buildPriceSuggestion(buyerText = '', sellerText = '') {
      const buyer = parsePriceRange(buyerText);
      const seller = parsePriceRange(sellerText);
      const currency = buyer?.currency || seller?.currency || '';
      if (!buyer || !seller) {
        return {
          text: '',
          buyerRange: formatPriceRange(buyer, currency),
          sellerRange: formatPriceRange(seller, currency),
          note: '需方预算和供方报价不完整，暂不生成建议价。'
        };
      }
      let value;
      let basis;
      const overlapMin = Math.max(buyer.min, seller.min);
      const overlapMax = Math.min(buyer.max, seller.max);
      if (overlapMin <= overlapMax) {
        value = (overlapMin + overlapMax) / 2;
        basis = '双方价格区间有交叉，取交叉区间中点。';
      } else if (buyer.max < seller.min) {
        value = (buyer.max + seller.min) / 2;
        basis = '双方区间不重叠，取最接近的两个价格平均。';
      } else {
        value = (seller.max + buyer.min) / 2;
        basis = '双方区间不重叠，取最接近的两个价格平均。';
      }
      if (buyer.single && seller.single) {
        value = (buyer.max + seller.min) / 2;
        basis = '双方都是单价，取两个价格平均。';
      }
      return {
        text: formatSuggestedPrice(value, currency),
        buyerRange: formatPriceRange(buyer, currency),
        sellerRange: formatPriceRange(seller, currency),
        note: `${basis} 仅为建议，最终价格由双方确认。`
      };
    }

    async function confirmCurrentTransaction(stage, role) {
      if (!state.lastContractOrderNo) {
        addAssistant('还没有可确认的交易卡。请先生成交易确认卡。');
        return;
      }
      const label = `${role === 'buyer' ? '买方' : '卖方'}${stage === 'agreement' ? '确认内容' : '确认履约'}`;
      const pending = addAssistant(`正在记录：${label}...`);
      try {
        const res = await fetch(apiUrl('/api/demand-cards'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'confirm_transaction',
            order_no: state.lastContractOrderNo,
            stage,
            role,
            actor_code: ensureFriendCode(),
            actor_name: localName(),
            note: label
          })
        });
        const json = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(json.error || `confirm ${res.status}`);
        const status = json.order?.status || '已记录';
        pending.querySelector('.bubble').innerHTML = `${escapeHtml(label)}已记录。当前状态：${escapeHtml(status)}。`;
        if (status === 'completed') {
          addAssistant('双方已确认履约完整。系统已标记双方各 50 分交易积分待入账，以后台积分账本为准。');
        }

    function isDetailedStreetAddress(value = '') {
      const address = String(value || '').trim();
      const hasNumber = /(\b\d{1,6}[a-zA-Z]?(?:\s*[-/]\s*\d{1,6}[a-zA-Z]?)?\b|[一二三四五六七八九十百千万0-9]+号)/.test(address);
      const hasStreetName = /(street|st\b|road|rd\b|avenue|ave\b|drive|dr\b|lane|ln\b|court|ct\b|place|pl\b|crescent|cres\b|parade|pde\b|boulevard|blvd\b|terrace|tce\b|way\b|highway|hwy\b|路|街|道|巷|弄|大道)/i.test(address);
      return hasNumber && hasStreetName;
    }

    function addressComponent(components = [], type = '') {
      const item = (components || []).find(c => (c.types || []).includes(type));
      return item ? String(item.long_name || '').trim() : '';
    }

    function cityFromAddressComponents(components = []) {
      return addressComponent(components, 'locality')
        || addressComponent(components, 'postal_town')
        || addressComponent(components, 'administrative_area_level_2')
        || addressComponent(components, 'administrative_area_level_1');
    }

    async function reverseGeocodeAddress(lat, lng) {
      try {
        const res = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${GOOGLE_GEOCODE_KEY}&language=zh-CN`);
        const json = await res.json();
        const results = Array.isArray(json.results) ? json.results : [];
        const mapped = results.map(result => {
          const components = result.address_components || [];
          const formatted = String(result.formatted_address || '').trim();
          const streetNumber = addressComponent(components, 'street_number');
          const route = addressComponent(components, 'route');
          return {
            address: formatted,
            city: cityFromAddressComponents(components),
            hasStreetAddress: Boolean(streetNumber && route) || isDetailedStreetAddress(formatted)
          };
        }).filter(item => item.address);
        return mapped.find(item => item.hasStreetAddress) || mapped[0] || null;
      } catch (error) {
        return null;
      }
    }

    function getCurrentLocationSnapshot(options = {}) {
      const silent = Boolean(options.silent);
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          if (!silent) addAssistant('当前浏览器不支持定位。你可以在个人中心手动添加家、公司或服务地址。');
          reject(new Error('当前设备不支持定位'));
          return;
        }
        if (!silent) addAssistant('我正在定位，并尝试识别门牌号和街名。');
        navigator.geolocation.getCurrentPosition(async (pos) => {
          const lat = pos.coords.latitude.toFixed(6);
          const lng = pos.coords.longitude.toFixed(6);
          const accuracy = Number(pos.coords.accuracy || 0);
          const geo = await reverseGeocodeAddress(lat, lng);
          const query = geo?.address || `${lat},${lng}`;
          const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
          const snapshot = {
            lat,
            lng,
            accuracy,
            url,
            address: geo?.address || '',
            city: geo?.city || '',
            hasStreetAddress: Boolean(geo?.hasStreetAddress)
          };
          state.lastLocation = snapshot;
          state.lastMapUrl = url;
          if (snapshot.hasStreetAddress) {
            saveReadableLocationSnapshot({
              ...snapshot,
              source: options.source || 'ai_geolocation'
            });
          }
          resolve(snapshot);
        }, (error) => {
          if (!silent) {
            addAssistant(`定位没有完成：${escapeHtml(error.message || '浏览器没有返回位置')}。请检查浏览器定位权限，或在个人中心手动添加地址。`);
          }
          reject(error);
        }, { enableHighAccuracy: true, timeout: options.timeout || 12000, maximumAge: 0 });
      });
    }

    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {

      const recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      voiceInputBtn.classList.add('active');
      recognition.onresult = (event) => {
        input.value = event.results[0][0].transcript || '';
        sendBtn.disabled = !input.value.trim();
      };
      recognition.onerror = () => addAssistant('语音识别没有成功。你可以再点一次麦克风，或直接打字。');
      recognition.onend = () => voiceInputBtn.classList.remove('active');
      recognition.start();
    }

    function toggleVoiceMode() {
      state.voiceMode = !state.voiceMode;
      voiceModeBtn?.classList.toggle('active', state.voiceMode);
      input.placeholder = state.voiceMode ? '按麦克风说话，或直接输入' : '直接告诉华伴你要做什么';
      if (state.voiceMode) startVoiceInput();
    }

    function detectIntent(text) {
      if (/加入.*(志愿|帮助者)|提供.*(帮助|互助)|我愿意.*(帮助|救助)|帮助者名录|志愿者/.test(text)) return 'emergency_helper';
      if (/紧急求助|紧急互助|求助|急需帮助|救急|帮忙|需要.*帮助|出事|危险|车坏|走失|事故/.test(text)) return 'emergency';
      if (/兴趣|社交圈|附近圈|附近的人|同城圈|圈子|发帖|发布动态|加入圈/.test(text)) return 'social_circle';
      if (/积分|等级|权益|奖励/.test(text)) return 'points';
      if (/分享|推荐|邀请|二维码|名片推广/.test(text)) return 'share';
      if (/个人中心|注册|登录|手机号|验证码|身份/.test(text)) return 'profile';
      if (/交易|合约|确认|履约|支付|订单|成交/.test(text)) return 'contract';
      if (/定位|地址|位置|地图|公司|家里/.test(text)) return 'location';
      if (/匹配|找人|找服务|找本地|需要.*人/.test(text)) return 'match';
      if (/反馈|不好用|bug|问题/.test(text)) return 'feedback';
      return 'chat';
    }

    async function askAi(text) {
      const system = [
        '你是华伴 AI+ 1.1 的主助手。',
        '定位：服务华人先行，再多语种服务所有人的实用 AI 工具。',
        '当前版本核心：智能匹配供需，协助交易双方整理服务内容、价格、时间、责任边界、支付方式，形成可确认的共识。',
        '紧急互助：用户直接用语音或文字描述求助，AI 协助整理并发送为高优先级记录；帮助者需自愿设定范围并进入帮助者名录。App 端根据 native_app_push、critical_alert、range_matched 和 helper_opt_in 标记触发强提醒、震动和响应确认。',
        '兴趣社交圈/附近圈是规划中的第三功能：先准备城市、距离、兴趣、行业、发布、加入和审核骨架；当前不要引导用户发布或加入，也不要说已经上线。',
        '价格建议规则：先列出需方最低价、需方最高价、供方最低价、供方最高价；再找双方最接近的两个价格，取平均值作为建议价；如果双方价格区间有重叠，就取重叠区间中点。所有价格只作建议，必须由双方确认。',
        '不要编造已完成的系统动作；涉及积分、推荐关系、交易记录时，要说明以系统账本为准。手机号验证码通过后即完成用户身份确认，不要再增加额外身份确认阶段。',
        '保持极简、可靠、可执行。默认最多 3 句，每句不超过 28 个字。用户没问原理时，不解释背景。',
        '用户要找人或服务时，只说：我理解的需求、还缺什么、下一步怎么做。信息足够时直接推进。',
        '不要主动带出历史旧业务定位；除非用户明确提出某个具体服务，否则始终围绕智能匹配、交易确认、积分记录和个人中心。'
      ].join('\n');
      const res = await fetch(apiUrl('/api/chat'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system,
          region: 'auto',
          messages: [{ role: 'user', content: text }]
        })
      });
      if (!res.ok) throw new Error(`chat ${res.status}`);
      const data = await res.json();
      return data?.content?.[0]?.text || data?.text || '我收到了，但这次没有生成明确回复。';
    }

    async function sendCurrentMessage() {
      const text = input.value.trim();
      if (!text || state.busy) return;
      input.value = '';
      sendBtn.disabled = true;
      addUser(text);
      const intent = detectIntent(text);

      if (intent === 'points') return showPoints();
      if (intent === 'share') return shareHuaban();
      if (intent === 'emergency_helper') return showEmergencyHelperRegistry();
      if (intent === 'emergency') {
        return showEmergencySendConfirm(text);
      }
      if (intent === 'social_circle') return showSocialCirclePreview();
      if (intent === 'profile') {
        addAssistant('身份、手机号验证、积分和好友关系都在个人中心统一查看。', `<button class="chip primary" onclick="location.href='profile.html'">打开个人中心</button>`);
        return;
      }
      if (intent === 'contract') return showContractGuide();
      if (intent === 'location') return sendLocation();
      if (intent === 'match') {
        setBusy(true);
        const pending = addAssistant('我先把这句话整理成需求卡，并检查供给库...');
        try {
          const data = await createDemandCard(text);
          const bubble = pending.querySelector('.bubble');
          if (bubble) bubble.innerHTML = `需求已进入后台：${escapeHtml(data.demand?.summary || text)}。`;
        } catch (error) {
          pending.querySelector('.bubble').innerHTML = '需求卡暂时没有写入后台。我先帮你在会话里整理，稍后可以重试。';
          console.warn(error);
          try {
            const answer = await askAi(text);
            addAssistant(escapeHtml(answer).replace(/\n/g, '<br>'));
          } catch (chatError) {
            console.warn(chatError);
          }
        } finally {
          setBusy(false);
        }
        return;
      }
      if (intent === 'feedback') {
        addAssistant('问题我先记下来。请补一句：发生在哪个页面、点了哪个按钮、手机和浏览器是什么。');
      }

      setBusy(true);
      const pending = addAssistant('我在整理...');
      try {
        const answer = await askAi(text);
        pending.querySelector('.bubble').innerHTML = escapeHtml(answer).replace(/\n/g, '<br>');
      } catch (error) {
        pending.querySelector('.bubble').innerHTML = 'AI 接口暂时没有返回。你可以继续描述需求，我会先在本页帮你整理。';
        console.warn(error);
      } finally {
        setBusy(false);
      }
    }

    function applyIncomingReferral() {
      const params = new URLSearchParams(location.search);
      const ref = params.get('ref') || params.get('friend');
      if (ref) {
        const cleanRef = String(ref).replace(/[^a-zA-Z0-9_-]/g, '').trim().toUpperCase();
        if (!cleanRef) return;
        const refName = (params.get('card_name') || '').trim();
        const refIndustry = (params.get('card_industry') || '').trim();
        const refAvatar = (params.get('card_avatar') || '').trim();
        sessionStorage.setItem('incoming_ref', cleanRef);
        sessionStorage.setItem('incoming_friend_code', cleanRef);
        localStorage.setItem('huaban_pending_referrer_code', cleanRef);
        localStorage.setItem('huaban_pending_referral', JSON.stringify({
          code: cleanRef,
          cardBy: params.get('card_by') || cleanRef,
          name: refName,
          industry: refIndustry,
          avatar: refAvatar,
          targetName: params.get('target_name') || '',
          targetIndustry: params.get('target_industry') || '',
          targetPhone: params.get('target_phone') || '',
          source: 'ai_url_referral',
          savedAt: new Date().toISOString()
        }));
        const label = refName ? `${escapeHtml(refName)} 的名片` : `身份码 ${escapeHtml(cleanRef)}`;
        addAssistant(`你是通过 ${label} 进入华伴的。我已经记录来源。先到个人中心保存姓名、手机号或行业任一项；完成手机号验证并取得身份令牌后，系统会自动绑定推荐关系，好友和积分以系统账本为准。`, `
          <button class="chip primary" onclick="location.href='profile.html'">去个人中心保存</button>
          <button class="chip" onclick="showPoints()">查看积分激励</button>
        `);
      }
    }

    function applyIncomingSupplyInvite() {
      const params = new URLSearchParams(location.search);
      if (params.get('intent') !== 'supply_invite') return;
      const service = params.get('service') || 'local_service';
      const city = params.get('city') || '';
      const demand = params.get('demand') || '';
      localStorage.setItem('huaban_pending_supply_invite', JSON.stringify({
        demand,
        service,
        city,
        ref: params.get('ref') || '',
        savedAt: new Date().toISOString()
      }));
      const serviceText = service === 'electrician' ? '电工服务' : service;
      addAssistant(`
        有人正在华伴寻找${city ? escapeHtml(city) + ' ' : ''}${escapeHtml(serviceText)}。<br>
        如果你能提供这类服务，可以先保存姓名、手机号、行业或服务内容。完成手机号验证后，你会进入华伴供给侧资源库；推荐关系和贡献奖励以后台账本为准。
      `, `
        <button class="chip primary" onclick="location.href='profile.html'">完善供给名片</button>
        <button class="chip" onclick="showPoints()">查看积分规则</button>
      `);
    }

    function bootstrapMessages() {
      const greeting = $('homeGreeting');
      if (greeting) greeting.textContent = `${dayGreeting()}，${displayName()}`;
      applyIncomingReferral();
      applyIncomingSupplyInvite();
      applyActionFromUrl();
    }

    function applyActionFromUrl() {
      const action = new URLSearchParams(location.search).get('action') || '';
      if (action === 'emergency_helper') {
        setTimeout(showEmergencyHelperRegistry, 120);
      }
      if (action === 'emergency_request') {
        setTimeout(showEmergencyHelp, 120);
      }
    }

    input.addEventListener('input', () => {
      sendBtn.disabled = state.busy || !input.value.trim();
    });
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendCurrentMessage();
      }
    });
    sendBtn.addEventListener('click', sendCurrentMessage);
    menuBtn.addEventListener('click', toggleTools);
    voiceInputBtn.addEventListener('click', startVoiceInput);
    voiceModeBtn?.addEventListener('click', toggleVoiceMode);
    drawerBtn?.addEventListener('click', openDrawer);
    drawerBackdrop?.addEventListener('click', closeDrawer);
    sideDrawer?.addEventListener('click', (event) => {
      const btn = event.target.closest('[data-drawer-tool]');
      if (btn) handleTool(btn.dataset.drawerTool);
    });
    $('profileBtn').addEventListener('click', () => { location.href = 'profile.html'; });
    $('sheetClose').addEventListener('click', closeSheet);
    backdrop.addEventListener('click', closeSheet);
    toolGrid?.addEventListener('click', (event) => {
      const btn = event.target.closest('[data-tool]');
      if (btn) handleTool(btn.dataset.tool);
    });

    window.closeSheet = closeSheet;
    window.openDrawer = openDrawer;
    window.closeDrawer = closeDrawer;
    window.startNewChat = startNewChat;
    window.showResourceHub = showResourceHub;
    window.closeLaunchPromo = closeLaunchPromo;
    window.openLaunchPoints = openLaunchPoints;
    window.showPoints = showPoints;
    window.shareHuaban = shareHuaban;
    window.showMatchPrompt = showMatchPrompt;
    window.showContractGuide = showContractGuide;
    window.buildContractCard = buildContractCard;
    window.showEmergencyHelp = showEmergencyHelp;
    window.showEmergencySendConfirm = showEmergencySendConfirm;
    window.confirmEmergencySend = confirmEmergencySend;
    window.showEmergencyHelperRegistry = showEmergencyHelperRegistry;
    window.showEmergencyHelperAppAuthorization = showEmergencyHelperAppAuthorization;
    window.showEmergencyHelperScopeForm = showEmergencyHelperScopeForm;
    window.submitEmergencyOffer = submitEmergencyOffer;
    window.openLastMap = openLastMap;
    window.openEmergencyMap = openEmergencyMap;
    window.copyLastMap = copyLastMap;
    window.shareSupplyInvite = shareSupplyInvite;
    window.copyText = copyText;
    window.addAssistant = addAssistant;

    ensureFriendCode();
    updateHeader();
    bootstrapMessages();
    loadProfileSummary();
    showLaunchPromo();
  </script>
</body>
</html>
