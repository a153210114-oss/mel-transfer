<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>支持与反馈 - 华伴</title>
  <meta name="description" content="华伴支持、反馈、举报和数据删除请求。">
  <style>
    body{margin:0;background:#f7f8f8;color:#17202a;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.8;}
    main{max-width:760px;margin:0 auto;padding:28px 18px 54px;}
    header{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
    img{width:42px;height:42px;border-radius:12px;background:#fff;}
    h1{font-size:26px;margin:0 0 8px;} h2{font-size:18px;margin:28px 0 8px;}
    p,li{font-size:15px;color:#344050;} .card{background:#fff;border:1px solid #e7ebef;border-radius:16px;padding:18px;margin:16px 0;}
    a{color:#06a06f;text-decoration:none;font-weight:700;}
    .btn{display:inline-block;padding:12px 16px;background:#07c160;color:#fff;border-radius:12px;margin-top:8px;}
  </style>
</head>
<body>
<main>
  <header>
    <img src="assets/brand/huaban-logo-v1.png" alt="华伴">
    <div>
      <h1>华伴支持与反馈</h1>
      <p>有问题，告诉华伴就行。</p>
    </div>
  </header>

  <div class="card">
    <h2>快速入口</h2>
    <p>试用感觉好，请推荐给好友；感觉不好，请告诉华伴 AI。</p>
    <a class="btn" href="/ai.html">先聊一句</a>
  </div>

  <div class="card">
    <h2>可以反馈什么</h2>
    <ul>
      <li>功能不好用、回答不自然、流程太麻烦。</li>
      <li>服务者资料可疑、名片内容不实、疑似诈骗。</li>
      <li>希望删除、更正或导出你的信息。</li>
      <li>上架、合作、城市合伙人、服务者审核问题。</li>
    </ul>
  </div>

  <div class="card">
    <h2>联系渠道</h2>
    <p>当前公测阶段，请优先在华伴 AI 内直接说“我要反馈”或“我要举报”。华伴会记录到后台，由运营人员跟进。</p>
    <p>备用邮箱：请在正式上架前补充你的支持邮箱。</p>
  </div>

  <div class="card">
    <h2>相关文件</h2>
    <p><a href="/privacy.html">隐私政策</a> · <a href="/terms.html">用户协议</a></p>
  </div>
</main>
</body>
</html>
